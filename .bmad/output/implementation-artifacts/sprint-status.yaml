  # doPost (line 51-59) correctly sets. Same gap in doPut (line 81+). ArgoCD
  # enforces Content-Type even on bodyless DELETEs. Affects every Sharko
  # DELETE/PUT to ArgoCD, not just orphan-delete; orphan-delete is just the
  # first path that was exercised after a recent ArgoCD version started
  # enforcing it. One-line addition per helper.
  V125-1-7-2-argocd-client-content-type-on-delete-and-put: done                    # commit 171fd9b7 (cherry-picked from worktree commit 569fdbab); doPut already had it, only doDelete fixed; +3 tests; live-verified the 415 is gone
  # V125-1-7.3 — discovered via direct ArgoCD API testing on 2026-05-12 after
  # V125-1-7.2 deployed and the 415 was gone but the DELETE still returned 404.
  # Root cause: Go's url.PathEscape does NOT escape ':' (allowed in path
  # segments per RFC 3986) but ArgoCD's gRPC-gateway path matcher is stricter
  # and requires colons escaped too. Verified live:
  #   url.PathEscape("https://172.18.0.3:6443") = "https:%2F%2F172.18.0.3:6443"
  #     → ArgoCD returns 404
  #   url.QueryEscape("https://172.18.0.3:6443") = "https%3A%2F%2F172.18.0.3%3A6443"
  #     → ArgoCD returns 200 ✓
  # Same bug affects internal/argocd/client_write.go DeleteCluster (line 173)
  # and UpdateClusterLabels (lines 185 GET + later PUT path). Fix: switch to
  # url.QueryEscape OR url.PathEscape + strings.ReplaceAll(":", "%3A"). Agent
  # picks the cleaner of the two patterns.
  V125-1-7-3-argocd-client-url-encoding-fix-colons: done                           # commit 99399387 — escapeServerURL helper using url.QueryEscape; applied at DeleteCluster + UpdateClusterLabels GET + PUT; +3 tests; live-verified with HTTP 204 on real kind-orphan-1 orphan after closing PR #3
