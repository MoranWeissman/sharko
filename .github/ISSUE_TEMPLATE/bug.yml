name: Bug Report
description: Report a bug or unexpected behavior in Sharko
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much of the form as you can — the more context we have, the faster we can triage.

        **Before filing, please check:**
        - [Existing issues](https://github.com/MoranWeissman/sharko/issues?q=is%3Aissue) for prior reports
        - [SECURITY.md](https://github.com/MoranWeissman/sharko/blob/main/SECURITY.md) — please do **not** file security vulnerabilities here. Use the disclosure channel in SECURITY.md instead.

  - type: input
    id: sharko-version
    attributes:
      label: Sharko version
      description: Output of `sharko version` (or the container image tag if you only have the server running).
      placeholder: "v1.24.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reproduce the bug from a clean state. Include commands, API calls, or UI actions as appropriate.
      placeholder: |
        1. Install Sharko via `helm install ...`
        2. Log in as admin
        3. Click "Add cluster" with name `foo`
        4. Observe error in the UI / server log
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Kubernetes version, ArgoCD version, deployment surface (Helm chart version, Docker, demo mode), OS / browser if UI-related.
      placeholder: |
        - Kubernetes: 1.30 (EKS)
        - ArgoCD: 2.12.0
        - Sharko Helm chart: 1.24.0
        - OS: macOS 14.5 / Linux 6.6
        - Browser (if UI): Chrome 128
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Server logs, CLI output, browser console errors, etc. Use code fences. **Redact any credentials, tokens, kubeconfig contents, or internal hostnames.**
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links to related issues, workarounds you've tried, etc.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/MoranWeissman/sharko/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
