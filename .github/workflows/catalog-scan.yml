# Catalog Scan — trusted-source scanning bot.
#
# Runs the catalog-scan plugins daily at 04:00 UTC, edits
# `catalog/addons.yaml`, and opens ONE draft PR per scan run with
# the labels `catalog-scan` + `needs-review`. Draft-to-main + label
# gating + NEVER auto-merge (human review is required for every
# proposed catalog change).
#
# ## Required one-time setup before the first run
#
# The repo MUST have these labels (otherwise `gh pr create --label`
# in the pr-open script fails):
#
#   gh label create catalog-scan --color BFD4F2 --description "Automated catalog-scan bot proposal"
#   gh label create needs-review --color FBCA04 --description "Human review required"
#
# ## Permissions
#
# `contents: write` — push the scanner branch + edit catalog/addons.yaml.
# `pull-requests: write` — open the draft PR.
#
# DO NOT add `actions: write`, automerge permissions, or merge-queue
# config — auto-merge is forbidden for this bot.

name: Catalog Scan

on:
  schedule:
    - cron: '0 4 * * *'   # daily 04:00 UTC
  workflow_dispatch:       # manual trigger for first-run + ad-hoc tests

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: catalog-scan
  cancel-in-progress: false   # let in-flight runs finish

jobs:
  scan-and-open-pr:
    name: scan + open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so `git ls-remote` sees remote branches and
          # the new branch can be pushed cleanly. Shallow clones miss
          # the `catalog-scan/<date>` collision check.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'scripts/package-lock.json'

      - name: Install scanner deps
        run: npm ci --prefix scripts

      - name: Configure git author
        # Every commit is authored by the repo owner; the PR itself is
        # opened by github-actions[bot] (gh CLI default).
        run: |
          git config user.name 'Moran Weissman'
          git config user.email 'moran.weissman@gmail.com'

      - name: Run catalog scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/catalog-scan.mjs --catalog catalog/addons.yaml

      - name: Open PR (if changeset non-empty)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s _dist/catalog-scan/changeset.json ]; then
            node scripts/catalog-scan/pr-open.mjs
          else
            echo "no proposals — skipping PR open"
          fi
