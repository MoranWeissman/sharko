name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-build-test:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 14

  ui-build-test:
    name: UI Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # To enable coverage, install @vitest/coverage-v8 and add --coverage flag
      - name: Test
        run: npm test -- --run

  swagger-check:
    name: Swagger Up To Date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Regenerate swagger docs
        run: swag init -g cmd/sharko/serve.go -o docs/swagger --parseDependency --parseInternal

      - name: Check for diff
        run: |
          if ! git diff --exit-code docs/swagger/; then
            echo "Swagger docs are out of date. Run 'swag init -g cmd/sharko/serve.go -o docs/swagger --parseDependency --parseInternal' and commit the result."
            exit 1
          fi

  helm-validate:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Helm lint and template
        run: |
          helm lint charts/sharko/
          helm template sharko charts/sharko/ --values charts/sharko/values.yaml > /dev/null

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for forbidden content
        run: |
          FORBIDDEN_PATTERNS=(
            "aap-server"
          )
          FOUND=0
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            MATCHES=$(grep -r --include="*.go" --include="*.ts" --include="*.tsx" --include="*.yaml" --include="*.yml" \
              -l "$pattern" . \
              --exclude-dir=".git" \
              --exclude-dir="node_modules" \
              --exclude-dir="vendor" \
              --exclude-dir=".github" \
              --exclude-dir="docs/superpowers/plans" \
              2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "Forbidden pattern '$pattern' found in:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "Security scan failed: forbidden content detected."
            exit 1
          fi
          echo "Security scan passed."
