name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-build-test:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 14

  ui-build-test:
    name: UI Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # To enable coverage, install @vitest/coverage-v8 and add --coverage flag
      - name: Test
        run: npm test -- --run

  swagger-check:
    name: Swagger Up To Date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Regenerate swagger docs
        run: swag init -g cmd/sharko/serve.go -o docs/swagger --parseDependency --parseInternal

      - name: Check for diff
        run: |
          if ! git diff --exit-code docs/swagger/; then
            echo "Swagger docs are out of date. Run 'swag init -g cmd/sharko/serve.go -o docs/swagger --parseDependency --parseInternal' and commit the result."
            exit 1
          fi

  # Drift gate for the Go-generated TypeScript provider-type union.
  # The generator (cmd/gen-provider-types) parses
  # internal/providers/provider.go's New() switch and writes
  # ui/src/generated/provider-types.ts. If any contributor edits the
  # backend factory without regenerating, this job fails the PR with a
  # clear remediation hint. Mirrors the swagger-check shape.
  provider-types-up-to-date:
    name: Provider Types Up To Date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Regenerate provider types
        run: make generate-provider-types

      - name: Check for diff
        run: |
          if ! git diff --exit-code -- ui/src/generated/provider-types.ts; then
            echo "ui/src/generated/provider-types.ts is out of date."
            echo "Run 'make generate-provider-types' and commit the result."
            exit 1
          fi

  # Drift gate for the JSON Schema envelope.
  # cmd/schema-gen reflects the Go envelope types
  # (internal/models.ManagedClustersSpec + internal/config.AddonCatalogSpec)
  # via invopop/jsonschema and writes the same bytes to TWO locations:
  #   docs/schemas/managed-clusters.v1.json     (human-facing copy)
  #   docs/schemas/addon-catalog.v1.json        (human-facing copy)
  #   internal/schema/managed-clusters.v1.json  (embed source)
  #   internal/schema/addon-catalog.v1.json     (embed source)
  #
  # The internal/schema/ copies exist because the runtime validator
  # (internal/schema/validator.go) loads schemas via go:embed and Go's
  # embed package rejects `..` parent-directory paths. Keeping both
  # locations in lock-step is enforced here — any contributor who
  # changes the envelope types without re-running the generator OR who
  # hand-edits one location without the other gets a red build.
  # Mirrors the swagger-check + provider-types-up-to-date shape.
  schemas-up-to-date:
    name: Schemas Up To Date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Regenerate schemas
        run: make generate-schemas

      - name: Check for diff
        run: |
          if ! git diff --exit-code -- docs/schemas/ internal/schema/managed-clusters.v1.json internal/schema/addon-catalog.v1.json; then
            echo "docs/schemas/ or internal/schema/*.v1.json is out of date."
            echo "Run 'make generate-schemas' and commit the result (both locations are written from the same source)."
            exit 1
          fi

  # PR-time Sharko YAML validation.
  # On every pull request, this job builds the sharko CLI binary and
  # runs `sharko validate-config` against every changed *.yaml / *.yml
  # file in the PR diff. The CLI itself decides which files are Sharko-
  # owned (top-level apiVersion: sharko.dev/v1) and silently skips the
  # rest, so this job stays permissive: it only blocks PRs whose
  # enveloped Sharko YAML actually fails schema validation. Helm
  # templates, kustomize, workflows, kind configs, etc. all flow
  # through untouched.
  #
  # Shape mirrors swagger-check + schemas-up-to-date so a contributor
  # reading the file sees a consistent "check + remediation hint"
  # pattern. The diff-only approach (vs validating the whole repo)
  # keeps the job O(changed-files) rather than O(repo-yaml-count),
  # which matters as the docs/ tree grows.
  validate-sharko-config:
    name: Sharko Config Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 gives us the full history so the diff range
          # `origin/${{ github.base_ref }}...HEAD` resolves cleanly.
          # The default fetch-depth (1) would fail with "fatal: bad
          # revision" on the first push to a branch that hasn't been
          # rebased onto a fresh main yet.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build sharko CLI
        # Single static binary; same recipe `make build-go` uses but
        # inlined here so the job doesn't depend on Makefile drift.
        run: go build -o sharko ./cmd/sharko

      - name: Validate changed Sharko YAML
        run: |
          set -e
          # `git diff --name-only A...HEAD` is the symmetric-difference
          # form — every commit reachable from HEAD but not from A.
          # This is what `gh pr diff` shows the reviewer, so the check
          # operates on the same set of changes the reviewer sees.
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.yaml' '*.yml' || true)
          if [ -z "$changed" ]; then
            echo "no YAML changes in this PR — skipping validation"
            exit 0
          fi
          echo "Validating changed YAML files:"
          echo "$changed"
          echo "---"
          fail=0
          while IFS= read -r f; do
            # Deleted files appear in the diff name list but no longer
            # exist on disk — skip them rather than failing the loop.
            [ -f "$f" ] || continue
            ./sharko validate-config "$f" || fail=1
          done <<< "$changed"
          if [ "$fail" -ne 0 ]; then
            echo "::error::Sharko config validation failed — see https://raw.githubusercontent.com/MoranWeissman/sharko/main/docs/schemas/ for schema URLs"
            exit 1
          fi
          echo "All changed Sharko YAML validated cleanly."

  helm-validate:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Helm lint and template
        run: |
          helm lint charts/sharko/
          helm template sharko charts/sharko/ --values charts/sharko/values.yaml > /dev/null

      - name: Bootstrap chart render regression (V2-cleanup-17)
        # The bootstrap chart turns the addon catalog into ArgoCD ApplicationSets.
        # Sharko writes the catalog under the sharko.dev/v1 envelope, so the addon
        # list lives at .Values.spec.applicationsets. A path bug (reading the
        # top-level .Values.applicationsets) rendered ZERO ApplicationSets, so no
        # addon ever deployed. Render the bootstrap chart against an enveloped
        # fixture and fail if it does not emit an addon ApplicationSet/AppProject.
        run: |
          helm lint templates/bootstrap/
          RENDERED=$(helm template testbootstrap templates/bootstrap/ \
            --values tests/bootstraprender/testdata/bootstrap-config.yaml \
            --values tests/bootstraprender/testdata/addons-catalog.yaml \
            --values tests/bootstraprender/testdata/managed-clusters.yaml)
          echo "$RENDERED" | grep -q "kind: ApplicationSet" \
            || { echo "::error::bootstrap chart rendered NO ApplicationSet from an enveloped catalog — addons would not deploy (V2-cleanup-17 regression)"; exit 1; }
          echo "$RENDERED" | grep -q "kind: AppProject" \
            || { echo "::error::bootstrap chart rendered NO AppProject from an enveloped catalog (V2-cleanup-17 regression)"; exit 1; }
          echo "bootstrap chart render guard passed: ApplicationSet + AppProject present"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for forbidden content
        run: |
          FORBIDDEN_PATTERNS=(
            "aap-server"
          )
          FOUND=0
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            MATCHES=$(grep -r --include="*.go" --include="*.ts" --include="*.tsx" --include="*.yaml" --include="*.yml" \
              -l "$pattern" . \
              --exclude-dir=".git" \
              --exclude-dir="node_modules" \
              --exclude-dir="vendor" \
              --exclude-dir=".github" \
              --exclude-dir="docs/superpowers/plans" \
              2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "Forbidden pattern '$pattern' found in:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "Security scan failed: forbidden content detected."
            exit 1
          fi
          echo "Security scan passed."
