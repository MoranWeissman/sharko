name: E2E Tests

on:
  workflow_dispatch: # manual trigger only for now
  # pull_request:     # enable later when stable
  #   branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup E2E
        run: bash tests/e2e/setup.sh

      - name: Port forward
        run: |
          kubectl port-forward svc/sharko 8080:80 -n sharko &
          sleep 5

      - name: Reset admin password and capture
        id: reset-admin
        run: |
          # Reset the admin password via the in-cluster `sharko reset-admin`
          # command so the e2e test step can authenticate with deterministic
          # credentials. The command prints `New password: <pw>` to stdout;
          # we extract it and surface it as a step output.
          POD=$(kubectl get pods -n sharko -l app.kubernetes.io/name=sharko -o jsonpath='{.items[0].metadata.name}')
          OUTPUT=$(kubectl exec -n sharko "$POD" -- sharko reset-admin)
          echo "$OUTPUT"
          PASSWORD=$(echo "$OUTPUT" | grep '^New password:' | awk '{print $3}')
          if [ -z "$PASSWORD" ]; then
            echo "ERROR: failed to extract password from reset-admin output" >&2
            exit 1
          fi
          # Mask the password in subsequent log lines and pass it to the next
          # step via the masked outputs mechanism.
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Run E2E tests
        run: go test -tags e2e ./tests/e2e/... -v -timeout 5m
        env:
          SHARKO_E2E_URL: http://localhost:8080
          SHARKO_E2E_USERNAME: admin
          SHARKO_E2E_PASSWORD: ${{ steps.reset-admin.outputs.password }}

      - name: Teardown
        if: always()
        run: bash tests/e2e/teardown.sh
