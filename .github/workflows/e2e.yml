name: E2E Tests

on:
  workflow_dispatch: # manual trigger only for now
  # pull_request:     # enable later when stable
  #   branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup E2E
        run: bash tests/e2e/setup.sh

      - name: Port forward
        run: |
          kubectl port-forward svc/sharko 8080:80 -n sharko &
          sleep 5

      - name: Run E2E tests
        run: go test ./tests/e2e/... -v -timeout 5m
        env:
          SHARKO_E2E_URL: http://localhost:8080

      - name: Teardown
        if: always()
        run: bash tests/e2e/teardown.sh
