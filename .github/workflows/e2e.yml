---
name: E2E

# V2 Epic 7-1.15 — comprehensive Go-native e2e suite. Runs the kind +
# real-argocd lane (~10-15 min) on three triggers:
#
#   1. workflow_dispatch — ad-hoc runs from the Actions tab.
#   2. pull_request labelled `e2e` — opt-in per-PR validation. Cheap PRs
#      stay on the unit/UI matrix in ci.yml; only label-tagged PRs pay
#      the e2e tax.
#   3. nightly schedule (3am UTC) — catches drift in the kind / argocd /
#      helm chart triplet between PRs.
#
# The fast in-process lane (`make test-e2e-fast`, no kind) is exercised
# implicitly by ci.yml's go test invocation only when the e2e tag is on
# — it's not part of the default unit pipeline. The intentional split:
# unit + UI on every PR; full e2e on opt-in/nightly.

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, opened, synchronize]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  # dorny/test-reporter posts a check-run with inline test results;
  # without these the action errors out on PRs.
  checks: write
  pull-requests: write

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Go E2E (kind + argocd)
    # Skip the heavy lane unless the trigger is one we care about. The
    # `labeled` event fires for every label, but contains() narrows it
    # to PRs that actually carry the `e2e` label — so adding any other
    # label is a no-op for this workflow.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind + kubectl
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          curl -Lo ./kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kind --version
          kubectl version --client=true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run E2E suite (with coverage HTML + JUnit XML)
        env:
          GOTMPDIR: /tmp
          E2E_OFFLINE: "0"
        run: make test-e2e-report

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-${{ github.run_number }}
          path: _dist/e2e-coverage.html
          retention-days: 30

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-junit-${{ github.run_number }}
          path: _dist/e2e-junit.xml
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Test Results
          path: _dist/e2e-junit.xml
          # Go's gotestsum-emitted JUnit shape is compatible with the
          # java-junit reporter; there is no first-class go reporter.
          reporter: java-junit
          fail-on-error: false

      - name: Cleanup stale kind clusters
        if: always()
        run: |
          kind get clusters 2>/dev/null | grep "^sharko-e2e-" | \
            xargs -I{} kind delete cluster --name {} || true

  # V125-1-13.8 — Helm-mode E2E subset. Unlike the heavyweight `e2e`
  # job above (label-gated, ~10-15 min, full suite), this lane runs the
  # three Wave-D Helm-install tests on EVERY pull_request push so the
  # real boot path (docker build → kind load → helm upgrade --install →
  # bootstrap admin secret → port-forward) gets exercised before merge.
  # OQ #1 resolution (maintainer 2026-05-15: "don't save runtime") —
  # PR-blocking, no opt-in label.
  #
  # The kind+ArgoCD provisioning is owned by the test harness itself
  # (tests/e2e/harness/kind.go + tests/e2e/lifecycle/*); CI just installs
  # the binaries the harness shells out to (kind, kubectl, helm, docker).
  # docker is preinstalled on ubuntu-latest.
  helm-mode-e2e:
    name: Go E2E (helm + kind + argocd)
    # Same opt-in label gate as the existing e2e lane above. Helm-mode runs
    # ~14 min and only matters when a PR touches cluster-test / provider /
    # auth wiring. Add the `e2e` label to a PR to run this job; otherwise
    # rely on unit + in-process integration tests (which run on every PR).
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind + kubectl
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          curl -Lo ./kubectl "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kind --version
          kubectl version --client=true

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      # SHARKO_E2E_IMAGE_TAG defaults to e2e-<short-sha> so a re-run of
      # the same workflow (e.g. retry after a flake) skips the docker
      # build + kind load on cache hit. Each PR push gets a fresh tag
      # because the SHA changes.
      - name: Run Helm-mode E2E subset
        env:
          GOTMPDIR: /tmp
          E2E_SHARKO_MODE: helm
          SHARKO_E2E_IMAGE_TAG: e2e-${{ github.sha }}
        run: make test-e2e-helm

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== kind clusters ==="
          kind get clusters || true
          echo "=== nodes (all clusters) ==="
          for c in $(kind get clusters 2>/dev/null); do
            echo "--- cluster: $c ---"
            kubectl --context "kind-$c" describe nodes || true
            echo "--- helm releases in $c ---"
            helm --kube-context "kind-$c" list -A || true
            echo "--- sharko deployment logs in $c ---"
            kubectl --context "kind-$c" logs -n sharko deployment/sharko --tail=200 --all-containers=true || true
            echo "--- argocd pods in $c ---"
            kubectl --context "kind-$c" get pods -n argocd -o wide || true
          done

      - name: Cleanup stale kind clusters
        if: always()
        run: |
          kind get clusters 2>/dev/null | grep "^sharko-e2e-" | \
            xargs -I{} kind delete cluster --name {} || true
