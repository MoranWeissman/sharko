name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: moranweissman/sharko
  HELM_CHART_PATH: charts/sharko

jobs:
  build-and-push:
    name: Build & Push Docker Image
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.TAG }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.TAG }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CACHE_BUST=${{ github.event.workflow_run.head_sha }}
            VERSION=${{ steps.version.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-package:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package Helm chart
        run: helm package ${{ env.HELM_CHART_PATH }} --version ${{ steps.version.outputs.VERSION }} --app-version ${{ steps.version.outputs.TAG }}

      - name: Push Helm chart to GHCR
        run: |
          CHART_FILE=$(ls sharko-*.tgz)
          helm push "$CHART_FILE" oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

  goreleaser:
    name: Release CLI Binaries
    runs-on: ubuntu-latest
    needs: [build-and-push, helm-package]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
