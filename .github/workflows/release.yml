name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: moranweissman/sharko
  HELM_CHART_PATH: charts/sharko

jobs:
  # Story V123-2.5: cosign-keyless signs every entry in catalog/addons.yaml
  # BEFORE the binary builds, so the embedded YAML inside the released image
  # and CLI archives carries `signature.bundle` URLs that point at release
  # assets uploaded later in the same workflow. Default trust policy
  # (V123-2.3) whitelists this workflow's cert SAN, so fresh installs see
  # the embedded catalog as Verified out of the box.
  sign-catalog-entries:
    name: Sign Catalog Entries
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC token for cosign keyless signing — Fulcio mints a short-lived
      # cert from this token; the cert SAN encodes the workflow ref pattern
      # the V123-2.3 default trust policy regex matches.
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Sign catalog entries (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          BASE="https://github.com/MoranWeissman/sharko/releases/download/${TAG}"
          go run ./cmd/catalog-sign --out _dist/catalog --release-base-url "${BASE}"

      - name: Upload signed catalog + bundles as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-catalog
          path: _dist/catalog/
          if-no-files-found: error
          retention-days: 7

  build-and-push:
    name: Build & Push Docker Image
    needs: sign-catalog-entries
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # id-token: write enables OIDC for cosign keyless signing — Fulcio
      # mints a short-lived cert from the GitHub Actions OIDC token, then
      # the signature is logged to the public Rekor transparency log. No
      # long-lived signing key to rotate. Story V121-8.1.
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      # Story V123-2.5: pull the signed catalog produced by the
      # sign-catalog-entries job and overwrite catalog/addons.yaml on disk
      # so `//go:embed addons.yaml` bakes the signed bytes into the image.
      # Mutation is confined to this runner workspace; never committed back.
      - name: Download signed catalog artifact
        uses: actions/download-artifact@v4
        with:
          name: signed-catalog
          path: _dist/catalog/

      - name: Use signed catalog for build
        run: cp _dist/catalog/addons.yaml.signed catalog/addons.yaml

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.TAG }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.TAG }}
            type=semver,pattern=v{{version}},value=${{ steps.version.outputs.TAG }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (cross-arch emulation)
        # buildx needs QEMU registered to cross-compile the alpine
        # final stage for arm64 on an amd64 runner. Go itself
        # cross-compiles natively (CGO_ENABLED=0) and doesn't need
        # emulation, but the alpine RUN apk does — so we register
        # all standard binfmt handlers up front.
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          # Multi-arch: amd64 for traditional cloud nodes, arm64 for
          # Graviton/Ampere/Apple Silicon. buildx assembles a manifest
          # list under the same tag; cosign signs the manifest digest
          # once and the signature covers every per-arch image (V122-2).
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CACHE_BUST=${{ github.event.workflow_run.head_sha }}
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Story V121-8.1: cosign keyless signing of the published image.
      # Pins the OIDC issuer + repo-scoped certificate identity so a
      # future `cosign verify` run can confirm the signature came from
      # *this* repo's release workflow (not some other GHA workflow).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign published image (keyless)
        env:
          # COSIGN_EXPERIMENTAL=1 is no longer required as of cosign 2.0,
          # but setting it explicitly documents the keyless flow for any
          # future maintainer reading this file.
          COSIGN_YES: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Sign by digest so each tag pointing at the same digest shares
          # one signature in Rekor. Iterate the tags only to provide
          # operator-friendly verify commands in the run log.
          for tag in $TAGS; do
            echo "Signing $tag@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

  helm-package:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write
      # OIDC token for cosign keyless signing of the OCI Helm chart.
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      # Docker login writes creds to ~/.docker/config.json — cosign reads
      # from there. helm registry login alone writes only to the helm
      # config dir, leaving cosign unauthenticated against GHCR.
      - name: Log in to GHCR (Docker — for cosign)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package Helm chart
        run: helm package ${{ env.HELM_CHART_PATH }} --version ${{ steps.version.outputs.VERSION }} --app-version ${{ steps.version.outputs.TAG }}

      - name: Push Helm chart to GHCR
        id: helm_push
        run: |
          CHART_FILE=$(ls sharko-*.tgz)
          # `helm push` writes a `.digest` companion in the working dir; we
          # capture the digest from stdout for the cosign sign step below.
          OUTPUT=$(helm push "$CHART_FILE" oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | awk '/^Digest:/ {print $2}')
          if [ -z "$DIGEST" ]; then
            echo "::error::could not extract chart digest from helm push output"
            exit 1
          fi
          echo "DIGEST=$DIGEST" >> "$GITHUB_OUTPUT"

      # Story V121-8.1: cosign-sign the OCI Helm chart so consumers can
      # `cosign verify oci://ghcr.io/moranweissman/sharko:vX.Y.Z` before
      # `helm install`. Same identity policy as the image signing step.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign published Helm chart (keyless)
        env:
          COSIGN_YES: "true"
          DIGEST: ${{ steps.helm_push.outputs.DIGEST }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/sharko:${VERSION}"
          # Sign by digest, same rationale as the image signing step.
          echo "Signing chart ${REF}@${DIGEST}"
          cosign sign --yes "${REF}@${DIGEST}"

  goreleaser:
    name: Release CLI Binaries
    runs-on: ubuntu-latest
    needs: [sign-catalog-entries, build-and-push, helm-package]
    permissions:
      contents: write
      # OIDC token for cosign keyless signing of every release archive
      # via the goreleaser `signs:` block. Story V121-8.1.
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      # Story V123-2.5: same embed-swap as build-and-push — replace the
      # on-disk catalog with the signed copy so goreleaser-built CLI
      # binaries also carry the signed bytes via //go:embed. The bundles
      # are then attached to the GitHub release via .goreleaser.yaml's
      # release.extra_files glob.
      - name: Download signed catalog artifact
        uses: actions/download-artifact@v4
        with:
          name: signed-catalog
          path: _dist/catalog/

      - name: Use signed catalog for build
        run: cp _dist/catalog/addons.yaml.signed catalog/addons.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # COSIGN_YES suppresses the interactive prompt in non-TTY mode.
          COSIGN_YES: "true"
