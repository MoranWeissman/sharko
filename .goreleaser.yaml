version: 2

builds:
  - main: ./cmd/sharko
    binary: sharko
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - format: tar.gz
    name_template: "sharko_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

# Story V121-8.1: cosign keyless signing of every release artifact
# (per-OS archives + checksums.txt). Each artifact gains a `.sig` and
# `.pem` companion in the GitHub release so consumers can verify with
#   cosign verify-blob --certificate <name>.pem --signature <name>.sig <name>
# Identity is bound to this repo's release workflow OIDC identity —
# verification regex documented in docs/site/operator/supply-chain.md.
signs:
  - cmd: cosign
    artifacts: all
    signature: ${artifact}.sig
    certificate: ${artifact}.pem
    args:
      - sign-blob
      - --yes
      - --output-signature
      - ${signature}
      - --output-certificate
      - ${certificate}
      - ${artifact}

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

release:
  github:
    owner: MoranWeissman
    name: sharko
  # Story V123-pretag-release-polish: auto-detect semver pre-release suffix
  # (`-pre.N`, `-rc.N`, etc.) and mark the GitHub release accordingly. Pre-2.0.0
  # cuts use suffixes; v2.0.0 GA omits the suffix and becomes the first
  # "Latest release". Using `auto` (not `true`) lets the same workflow handle
  # both pre-release and GA cuts without a manual flip.
  prerelease: auto
  # Story V123-2.5: attach per-entry cosign bundles produced by the
  # sign-catalog-entries job to the GitHub release. The signed catalog YAML
  # baked into the binary points `signature.bundle` URLs at these files via
  # the deterministic `<release-base>/<name>.bundle` convention. Without
  # them, runtime verification would 404.
  extra_files:
    - glob: ./_dist/catalog/*.bundle
