# ---------------------------------------------------------------------------
# Sharko catalog — curated addon metadata (v1.21+)
#
# This file is embedded into the Sharko binary via //go:embed at build time
# (see internal/catalog/embed.go). It ships the curated short-list that backs
# the Marketplace "Browse" tab. Contributions: PR into this file, CODEOWNERS-
# gated, validated by the catalog-validate CI workflow (v1.21 Epic 8).
#
# Inclusion criterion: entry appears in 2+ curation sources from §7 of the
# v1.21 design doc (CNCF landscape, AWS EKS Blueprints, Azure AKS add-ons,
# GKE Marketplace, ArtifactHub verified publishers, OpenSSF Scorecard).
#
# Refresh values:
#   - security_score: OpenSSF Scorecard aggregate 0-10; "unknown" is allowed
#     and is overwritten in-memory by the daily Scorecard refresh job
#     (internal/catalog/scorecard.go) once Sharko boots.
#   - github_stars: round-number approximations; refreshed by the same daily
#     job in-memory (not written back to this file).
#
# Schema: see catalog/schema.json (reference) and the CatalogEntry struct in
# internal/catalog/loader.go (enforced).
# ---------------------------------------------------------------------------

