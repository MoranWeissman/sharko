{{- if .Values.rbac.create }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sharko.fullname" . }}-argocd-rbac-setup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    metadata:
      labels:
        {{- include "sharko.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sharko.serviceAccountName" . }}
      restartPolicy: Never
      containers:
        - name: rbac-patch
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              SA_NAME="system:serviceaccount:{{ .Release.Namespace }}:{{ include "sharko.serviceAccountName" . }}"
              ARGOCD_NS="{{ include "sharko.argocdNamespace" . }}"

              echo "Patching ArgoCD RBAC for Sharko ServiceAccount: ${SA_NAME}"

              # Define the policy lines Sharko needs
              SHARKO_POLICY="p, role:sharko, applications, get, */*, allow
              p, role:sharko, applications, sync, */*, allow
              p, role:sharko, clusters, get, *, allow
              g, ${SA_NAME}, role:sharko"

              # Get current policy.csv (if any)
              CURRENT=$(kubectl get cm argocd-rbac-cm -n ${ARGOCD_NS} -o jsonpath='{.data.policy\.csv}' 2>/dev/null || echo "")

              # Check if Sharko policy already exists
              if echo "${CURRENT}" | grep -q "role:sharko"; then
                echo "ArgoCD RBAC already contains Sharko policy — skipping"
                exit 0
              fi

              # Append Sharko policy
              if [ -z "${CURRENT}" ]; then
                NEW_POLICY="${SHARKO_POLICY}"
              else
                NEW_POLICY="${CURRENT}
              ${SHARKO_POLICY}"
              fi

              # Patch the ConfigMap
              kubectl patch cm argocd-rbac-cm -n ${ARGOCD_NS} --type merge -p "{\"data\":{\"policy.csv\":\"${NEW_POLICY}\"}}"

              echo "ArgoCD RBAC patched successfully"
  backoffLimit: 3
{{- end }}
