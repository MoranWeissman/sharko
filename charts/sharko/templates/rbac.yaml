{{- if .Values.rbac.create }}
# ClusterRole: read access to ArgoCD resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sharko.fullname" . }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
rules:
  # ArgoCD applications
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "appprojects"]
    verbs: ["get", "list", "watch"]
  # ArgoCD clusters (stored as secrets in argocd namespace)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
    # Cluster-wide read via ClusterRoleBinding; write access in argocd namespace via argocd-secrets Role
  {{- if .Values.config.nodeAccess }}
  # Node read access (default-on; set config.nodeAccess=false to disable).
  # Used by the Dashboard node-count widget (/api/v1/cluster/nodes).
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  {{- end }}
---
# Bind to the Sharko service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sharko.fullname" . }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sharko.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sharko.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Role: write access to secrets in the ArgoCD namespace (cluster secret management)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sharko.fullname" . }}-argocd-secrets
  namespace: {{ include "sharko.argocdNamespace" . }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# RoleBinding in ArgoCD namespace — binds argocd-secrets Role to the Sharko service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sharko.fullname" . }}-argocd-secrets
  namespace: {{ include "sharko.argocdNamespace" . }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sharko.fullname" . }}-argocd-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "sharko.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Role: read/write own secret and read users ConfigMap in the release namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sharko.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ include "sharko.fullname" . | quote }}]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["sharko-migration-settings"]
    verbs: ["get", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.config.connectionSecretName | default "sharko-connections" | quote }}]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["sharko-ai-config"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]  # needed to create new secrets (resourceNames can't restrict create)
  # V124-6.3 / BUG-023: dedicated bootstrap secret (mirrors ArgoCD's
  # argocd-initial-admin-secret). Sharko writes it on auto-generated bootstrap
  # and deletes it on `sharko reset-admin` so it doesn't outlive the rotated
  # password. Get is needed for the idempotent create-or-update path; delete
  # is needed for the rotation cleanup.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["sharko-initial-admin-secret"]
    verbs: ["get", "update", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "delete"]  # migration state stored in ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ printf "%s-users" (include "sharko.fullname" .) | quote }}]
    verbs: ["get"]
  # V3 E1: Kubernetes events for Sharko operational failures/successes
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
---
# Bind auth role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sharko.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sharko.fullname" . }}-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "sharko.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Role: ClusterAddons operator permissions (Operator Phase 1)
# DECISION: Role (namespaced), not ClusterRole.
# JUSTIFICATION: ClusterAddons CRs are Namespaced (scope in CRD is Namespaced),
# and the generator/controller only manages CRs in the release namespace where
# Sharko is installed. There is no cross-namespace or cluster-wide CR management.
# A namespaced Role is sufficient and follows least-privilege.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sharko.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
rules:
  # ClusterAddons CRs: controller reads (get/list/watch) + generator writes (create/update/patch/delete).
  # The generator auto-generates CRs from managed-clusters.yaml and prunes orphans (delete).
  - apiGroups: ["sharko.dev"]
    resources: ["clusteraddons"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ClusterAddons status subresource: controller writes status projection (update/patch).
  - apiGroups: ["sharko.dev"]
    resources: ["clusteraddons/status"]
    verbs: ["get", "update", "patch"]
  # Leader election: the manager uses Lease resources for HA leader election.
  # Leases live in the release namespace. The manager creates/updates a lease named
  # "sharko-operator" but never deletes it (standard controller-runtime behavior).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Events: the controller emits events for operator lifecycle/errors.
  # Events create permission is already present in the -auth Role above; no duplication needed here.
  # The manager will have both roles bound, so events create is covered.
---
# RoleBinding for ClusterAddons operator permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sharko.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sharko.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "sharko.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
