{{- if .Values.rbac.create }}
# ClusterRole: read access to ArgoCD resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sharko.fullname" . }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
rules:
  # ArgoCD applications
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "appprojects"]
    verbs: ["get", "list", "watch"]
  # ArgoCD clusters (stored as secrets in argocd namespace)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
    # Restricted to ArgoCD namespace via the RoleBinding below
  {{- if .Values.config.nodeAccess }}
  # Node read access (opt-in via config.nodeAccess)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  {{- end }}
---
# Bind to the Sharko service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sharko.fullname" . }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sharko.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sharko.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# RoleBinding in ArgoCD namespace for secret read access (cluster connection info)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sharko.fullname" . }}-argocd-reader
  namespace: {{ include "sharko.argocdNamespace" . }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sharko.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sharko.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Role: read/write own secret and read users ConfigMap in the release namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sharko.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ include "sharko.fullname" . | quote }}]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["sharko-migration-settings"]
    verbs: ["get", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.config.connectionSecretName | default "sharko-connections" | quote }}]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["sharko-ai-config"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]  # needed to create new secrets (resourceNames can't restrict create)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "delete"]  # migration state stored in ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ printf "%s-users" (include "sharko.fullname" .) | quote }}]
    verbs: ["get"]
---
# Bind auth role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sharko.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sharko.fullname" . }}-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "sharko.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
