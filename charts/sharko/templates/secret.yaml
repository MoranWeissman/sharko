{{- $secretName := include "sharko.fullname" . }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
{{- /*
  Bootstrap admin credential handling (V124-3.8 / BUG-013):
  ------------------------------------------------------------
  Three paths, mutually exclusive:

    1. .Values.bootstrapAdmin.existingSecret.name set
       — Skip writing admin.password / admin.initialPassword entirely.
         The deployment wires SHARKO_BOOTSTRAP_ADMIN_PASSWORD from the
         operator's Secret via valueFrom.secretKeyRef. Sharko consumes
         it on startup and writes admin.password into THIS Secret.
         The plaintext is NEVER baked into the chart-rendered Secret
         and NEVER logged.

    2. .Values.bootstrapAdmin.password set (inline value)
       — Bcrypt the operator-supplied value into admin.password and
         do NOT set admin.initialPassword (so MaybeLogBootstrapCredential
         in Sharko stays silent). The plaintext is NEVER logged.

    3. Neither set — auto-generated path (default)
       — Generate a random 16-char password on first install, bcrypt it
         into admin.password, and store the plaintext in
         admin.initialPassword. Sharko reads admin.initialPassword on
         startup, logs it ONCE in a clearly-marked block, then deletes
         the marker so the credential is not re-emitted on restart.
*/}}
{{- $bootstrap := .Values.bootstrapAdmin | default dict }}
{{- $existingBootstrapSecret := $bootstrap.existingSecret | default dict }}
{{- $useExistingSecret := and $existingBootstrapSecret.name (ne $existingBootstrapSecret.name "") }}
{{- $operatorInlinePassword := default "" $bootstrap.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
type: Opaque
{{- if and $existingSecret (index ($existingSecret.data | default dict) "admin.password") }}
{{/* Secret already has admin.password — preserve existing data, only update non-auth keys */}}
data:
  admin.password: {{ index $existingSecret.data "admin.password" }}
  {{- if index ($existingSecret.data | default dict) "admin.initialPassword" }}
  admin.initialPassword: {{ index $existingSecret.data "admin.initialPassword" }}
  {{- end }}
  {{- if index ($existingSecret.data | default dict) "SHARKO_ENCRYPTION_KEY" }}
  SHARKO_ENCRYPTION_KEY: {{ index $existingSecret.data "SHARKO_ENCRYPTION_KEY" }}
  {{- end }}
stringData:
  {{- if not (index ($existingSecret.data | default dict) "SHARKO_ENCRYPTION_KEY") }}
  SHARKO_ENCRYPTION_KEY: {{ randAlphaNum 32 | quote }}
  {{- end }}
{{- else if $useExistingSecret }}
{{/* Operator supplied an existing Secret — Sharko seeds admin.password from
     SHARKO_BOOTSTRAP_ADMIN_PASSWORD env on startup. Do NOT bake the password
     into this Secret. */}}
stringData:
  SHARKO_ENCRYPTION_KEY: {{ randAlphaNum 32 | quote }}
{{- else if ne $operatorInlinePassword "" }}
{{/* Operator supplied an inline password via .Values.bootstrapAdmin.password.
     Bcrypt it directly into admin.password. Do NOT set admin.initialPassword
     so Sharko's MaybeLogBootstrapCredential stays silent (operator-supplied
     passwords are NEVER logged). */}}
stringData:
  admin.password: {{ $operatorInlinePassword | bcrypt | quote }}
  SHARKO_ENCRYPTION_KEY: {{ randAlphaNum 32 | quote }}
{{- else }}
{{/* First install, no operator-supplied password — generate a random
     bootstrap password. Sharko logs admin.initialPassword once on first
     boot and removes the marker so subsequent restarts do not re-emit. */}}
{{- $initialPass := randAlphaNum 16 }}
stringData:
  admin.password: {{ $initialPass | bcrypt | quote }}
  admin.initialPassword: {{ $initialPass | quote }}
  SHARKO_ENCRYPTION_KEY: {{ randAlphaNum 32 | quote }}
{{- end }}
  {{- if and .Values.ai.enabled .Values.ai.apiKey }}
  AI_API_KEY: {{ .Values.ai.apiKey | quote }}
  {{- end }}
