{{- if not .Values.existingSecret }}
{{- $secretName := include "sharko.fullname" . }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sharko.labels" . | nindent 4 }}
type: Opaque
{{- if and $existingSecret (index ($existingSecret.data | default dict) "admin.password") }}
{{/* Secret already has admin.password — preserve existing data, only update non-auth keys */}}
data:
  admin.password: {{ index $existingSecret.data "admin.password" }}
  {{- if index ($existingSecret.data | default dict) "admin.initialPassword" }}
  admin.initialPassword: {{ index $existingSecret.data "admin.initialPassword" }}
  {{- end }}
  {{- if index ($existingSecret.data | default dict) "SHARKO_ENCRYPTION_KEY" }}
  SHARKO_ENCRYPTION_KEY: {{ index $existingSecret.data "SHARKO_ENCRYPTION_KEY" }}
  {{- end }}
stringData:
  {{- if not (index ($existingSecret.data | default dict) "SHARKO_ENCRYPTION_KEY") }}
  SHARKO_ENCRYPTION_KEY: {{ randAlphaNum 32 | quote }}
  {{- end }}
{{- else }}
{{/* First install or no admin.password yet — generate initial password */}}
{{- $initialPass := randAlphaNum 16 }}
stringData:
  admin.password: {{ $initialPass | bcrypt | quote }}
  admin.initialPassword: {{ $initialPass | quote }}
  SHARKO_ENCRYPTION_KEY: {{ randAlphaNum 32 | quote }}
{{- end }}
  {{- range $key, $val := .Values.secrets }}
  {{- if $val }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.ai.enabled .Values.ai.apiKey }}
  AI_API_KEY: {{ .Values.ai.apiKey | quote }}
  {{- end }}
{{- end }}
