# ArgoCD Addons Platform - Helm Values
# See README for full documentation of all options.

replicaCount: 1

image:
  repository: ghcr.io/moranweissman/argocd-addons-platform
  tag: ""  # Defaults to appVersion from Chart.yaml
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Service Account & RBAC
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Grant read access to ArgoCD resources (required for in-cluster mode)
rbac:
  create: true
  # The namespace where ArgoCD is installed
  argocdNamespace: argocd

# ---------------------------------------------------------------------------
# Connection Configuration
# ---------------------------------------------------------------------------
config:
  # Connections are managed via the Settings UI and stored in an encrypted K8s Secret.
  # The Secret name can be customized below. On first deploy, open the UI to configure.
  connectionSecretName: "aap-connections"
  # Dev mode: enables env var fallback for credentials (GITHUB_TOKEN, ARGOCD_TOKEN, etc.)
  # In production, set to false — credentials must be configured via Settings UI.
  devMode: false
  # Enable read access to Kubernetes Nodes (get/list).
  # Adds a ClusterRole rule allowing AAP to fetch node count and status.
  # Requires cluster-level permissions — opt-in.
  nodeAccess: false
  # Comma-separated list of environment keywords to extract from cluster names.
  # e.g. "dev,qa,staging,prod" — cluster "nms-core-dev-eks" → env "dev"
  environments: ""

# ---------------------------------------------------------------------------
# Secrets
# ---------------------------------------------------------------------------
# Existing secret with env vars (GITHUB_TOKEN, AI_API_KEY, DATADOG_API_KEY, etc.)
# If set, the chart will NOT create a secret — use your own.
existingSecret: ""

# If existingSecret is empty, these values are used to create one.
# In production, use existingSecret or sealed-secrets instead.
secrets:
  GITHUB_TOKEN: ""
  # ARGOCD_TOKEN: ""  # Not needed in in-cluster mode with RBAC

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# Authentication is managed via K8s-native resources:
# - ConfigMap (aap-users): user accounts (auto-created by Helm)
# - Secret: bcrypt password hashes (auto-generated on first install)
#
# On first install, an admin account is created with a random password.
# Retrieve it with: kubectl get secret <release-name> -o jsonpath='{.data.admin\.initialPassword}' | base64 -d
#
# For local development (outside K8s), set these env vars:
# auth:
#   username: ""   # maps to AAP_AUTH_USER env var
#   password: ""   # maps to AAP_AUTH_PASSWORD env var

# ---------------------------------------------------------------------------
# GitOps Actions (v2 — PR creation from UI/AI)
# ---------------------------------------------------------------------------
gitops:
  actions:
    enabled: false  # Set to true to enable write operations (PR creation)

# ---------------------------------------------------------------------------
# AI Provider (optional)
# ---------------------------------------------------------------------------
ai:
  enabled: false
  # One of: ollama, claude, openai, gemini, custom-openai
  provider: ""
  apiKey: ""       # For claude/openai/gemini (stored in secret)
  cloudModel: ""   # e.g., claude-sonnet-4-20250514, gpt-4o, gemini-2.5-flash
  # Custom OpenAI-compatible provider (e.g., enterprise LLM gateways)
  baseURL: ""       # e.g., https://your-gateway.example.com/api
  authHeader: ""    # Custom auth header (default: "Authorization")
  maxIterations: 8  # Agent tool-calling loop limit (increase for migration workflows)
  # Ollama settings
  ollama:
    # Deploy an Ollama pod alongside AAP (set to true to auto-deploy)
    deploy: false
    image: "ollama/ollama:latest"  # ~1.2GB compressed, ~3GB on disk
    # URL is auto-set when deploy=true, override for external Ollama
    url: ""
    # Model for simple queries. See resource requirements:
    #   llama3.2 (3B)    — 2-4 GB RAM, weak tool calling
    #   llama3.1:8b      — 6-8 GB RAM, moderate tool calling
    #   qwen2.5 (7B)     — 4-6 GB RAM, good tool calling for its size
    #   mistral (7B)     — 4-6 GB RAM, fast but moderate tool calling
    #   llama3.1:70b     — 40+ GB RAM, strong tool calling (needs GPU)
    #   mixtral (8x7B)   — 26+ GB RAM, strong reasoning
    model: "llama3.2"
    # Separate model for agent (tool calling). Larger models handle tools better.
    # Leave empty to use the same as 'model'.
    agentModel: ""
    # GPU support (requires nvidia device plugin on the cluster)
    gpu: false
    # Persist downloaded models across restarts (STRONGLY RECOMMENDED)
    # Without persistence, models are re-downloaded on every pod restart (multi-GB)
    persistence: false
    storageClassName: ""  # Leave empty for cluster default, or set e.g. "gp3", "ebs-sc"
    storageSize: "10Gi"   # 10Gi fits 1-2 small models, 50Gi+ for larger models
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"

# ---------------------------------------------------------------------------
# Datadog Metrics (optional)
# ---------------------------------------------------------------------------
datadog:
  enabled: false
  apiKey: ""       # Stored in secret
  appKey: ""       # Stored in secret
  site: "datadoghq.com"  # or datadoghq.eu

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: aap.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: aap-tls
  #    hosts:
  #      - aap.example.com

# ---------------------------------------------------------------------------
# Data Persistence (for migration state)
# ---------------------------------------------------------------------------
persistence:
  enabled: false
  storageClassName: ""  # Leave empty for cluster default
  size: 1Gi

# Host aliases (for private DNS resolution)
hostAliases: []

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# Extra environment variables (name/value pairs)
extraEnv: []
#  - name: MY_VAR
#    value: "my-value"
