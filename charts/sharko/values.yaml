# Sharko - Helm Values
# See README for full documentation of all options.

replicaCount: 1

image:
  repository: ghcr.io/moranweissman/sharko
  tag: ""  # Defaults to appVersion from Chart.yaml
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Service Account & RBAC
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Grant read access to ArgoCD resources (required for in-cluster mode)
rbac:
  create: true
  # The namespace where ArgoCD is installed
  argocdNamespace: argocd

# ---------------------------------------------------------------------------
# Cluster-Test Provider
# ---------------------------------------------------------------------------
# Configures the backend Sharko uses to fetch CONNECTIVITY credentials for a
# target cluster — i.e. the kubeconfig used to verify a cluster is reachable
# and auth works (POST /api/v1/clusters/{name}/test, the dashboard "Verified"
# state). Today only the "argocd" backend is supported: it reads ArgoCD's
# cluster Secret from the namespace where ArgoCD is installed.
#
# See: docs/site/operator/configuration.md and cluster-connectivity-model.md
#
# Precedence for the ArgoCD namespace:
#   1. clusterTest.argocdNamespace (this value, when non-empty)
#   2. SHARKO_ARGOCD_NAMESPACE env var — DEPRECATED, emits slog.Warn at startup
#   3. hardcoded "argocd" default (matches the standard ArgoCD install location)
#
# NOTE: rbac.argocdNamespace below is a SEPARATE knob — it controls the
# Role/RoleBinding the chart creates in the ArgoCD namespace so Sharko's
# in-cluster service account can read ArgoCD Secrets. The two namespaces are
# almost always the same value on standard installs.
clusterTest:
  # K8s namespace where ArgoCD stores its cluster Secrets. Leave empty to fall
  # back to SHARKO_ARGOCD_NAMESPACE env var (deprecated) or the "argocd" default.
  argocdNamespace: ""

# ---------------------------------------------------------------------------
# Connection Configuration
# ---------------------------------------------------------------------------
config:
  # Connections are managed via the Settings UI and stored in an encrypted K8s Secret.
  # The Secret name can be customized below. On first deploy, open the UI to configure.
  connectionSecretName: "sharko-connections"
  # Enable read access to Kubernetes Nodes (get/list) on the host cluster.
  # Adds a ClusterRole rule allowing Sharko to fetch node count and status
  # for the Dashboard node-count widget. Node metadata (capacity, ready
  # status, instance type, architecture, OS) is low-sensitivity — no pod,
  # secret, or workload data is exposed. Enabled by default because the
  # Dashboard polls /api/v1/cluster/nodes every 30s; disabling it causes
  # the widget to show a degraded empty state.
  # Set to false for environments where nodes read access is restricted.
  nodeAccess: true
  # Comma-separated list of environment keywords to extract from cluster names.
  # e.g. "dev,qa,staging,prod" — cluster "nms-core-dev-eks" → env "dev"
  environments: ""

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# Authentication is managed via K8s-native resources:
# - ConfigMap (sharko-users): user accounts (auto-created by Helm)
# - Secret: bcrypt password hashes (auto-generated on first install)
#
# Bootstrap admin credential. If both bootstrapAdmin fields are empty,
# Sharko generates a random password on first boot and logs it ONCE to
# stdout. To capture:
#   kubectl logs -n sharko deployment/sharko | grep -A4 "BOOTSTRAP ADMIN"
# (You can also still retrieve the same value while it is in the Secret:
#   kubectl get secret <release-name> -o jsonpath='{.data.admin\.initialPassword}' | base64 -d
#  Sharko removes that key after logging it once, so subsequent restarts
#  do not re-emit the credential.)
#
# To set the bootstrap password explicitly, populate either:
#   - bootstrapAdmin.password: inline value (insecure for production —
#     the plaintext lives in your values file / Helm release)
#   - bootstrapAdmin.existingSecret.name: name of a Secret in the same
#     namespace with a key holding the plaintext password (recommended
#     for production; rotate by updating the Secret + restarting the pod)
#
# Operator-supplied passwords are NEVER logged — see
# internal/auth/store.go SeedBootstrapAdminFromEnv.
#
# For local development (outside K8s), set these env vars:
# auth:
#   username: ""   # maps to SHARKO_AUTH_USER env var
#   password: ""   # maps to SHARKO_AUTH_PASSWORD env var
bootstrapAdmin:
  # Inline plaintext password. Insecure for production — prefer existingSecret.
  password: ""
  # Reference an existing Secret holding the bootstrap password.
  existingSecret:
    name: ""        # Secret name in the release namespace
    key: "password" # Key within the Secret holding the plaintext password
  # When auto-generating the bootstrap admin password (no `password` and no
  # `existingSecret` supplied), also write a dedicated
  # `sharko-initial-admin-secret` Secret carrying the plaintext for kubectl
  # retrieval — mirrors ArgoCD's `argocd-initial-admin-secret` pattern.
  #
  # Set to false to keep the plaintext only in the transient pod log line
  # ("BOOTSTRAP ADMIN CREDENTIAL"). The dedicated secret has NO effect when
  # `password` or `existingSecret.name` is set — Sharko never writes it on
  # the operator-supplied paths.
  #
  # Retrieve with:
  #   kubectl get secret sharko-initial-admin-secret -n <release-namespace> \
  #     -o jsonpath='{.data.password}' | base64 -d
  #
  # The secret persists across `sharko reset-admin` rotations: each rotation
  # rewrites `data.password` to the new plaintext (replace, not patch — old
  # plaintext does NOT survive). Operators can re-fetch with the same kubectl
  # command above to read the current bootstrap password. To remove the
  # secret permanently (e.g. once stored in a vault), delete it manually:
  #   kubectl delete secret sharko-initial-admin-secret -n <release-namespace>
  # The next reset-admin will recreate it. To prevent recreation entirely,
  # set this value to false — in opt-out mode reset-admin only deletes any
  # stale secret and does NOT recreate one.
  writeInitialSecret: true

# ---------------------------------------------------------------------------
# GitOps Actions (v2 — PR creation from UI/AI)
# ---------------------------------------------------------------------------
gitops:
  actions:
    enabled: false  # Set to true to enable write operations (PR creation)

# ---------------------------------------------------------------------------
# Cluster Registration Source
# ---------------------------------------------------------------------------
# Pre-wire for the cluster reconciler. No consumer today; safe defaults.
# When enabled, setting `type: argocd` causes Sharko to write ArgoCD cluster
# Secrets into `argocdNamespace` based on the contents of
# managed-clusters.yaml. Leaving both empty preserves today's behavior
# (operators register clusters via ArgoCD UI or `kubectl apply` directly).
#
# Conceptually distinct from clusterTest.argocdNamespace above: clusterTest
# READS from the ArgoCD namespace (where ArgoCD's own cluster Secrets live);
# clusterRegSource WRITES to it (where Sharko's reconciler will create
# registration Secrets). On standard installs both values point at "argocd".
# See docs/site/operator/configuration.md for details.
clusterRegSource:
  type: ""              # "" → no reconciler; "argocd" → write to ArgoCD cluster Secrets
  argocdNamespace: ""   # "" → defaults to "argocd"

# ---------------------------------------------------------------------------
# AI Provider (optional)
# ---------------------------------------------------------------------------
ai:
  enabled: false
  # One of: ollama, claude, openai, gemini, custom-openai
  provider: ""
  apiKey: ""       # For claude/openai/gemini (stored in secret)
  cloudModel: ""   # e.g., claude-sonnet-4-20250514, gpt-4o, gemini-2.5-flash
  # Custom OpenAI-compatible provider (e.g., enterprise LLM gateways)
  baseURL: ""       # e.g., https://your-gateway.example.com/api
  authHeader: ""    # Custom auth header (default: "Authorization")
  maxIterations: 8  # Agent tool-calling loop limit (increase for migration workflows)
  # Ollama settings
  ollama:
    # Deploy an Ollama pod alongside Sharko (set to true to auto-deploy)
    deploy: false
    image: "ollama/ollama:latest"  # ~1.2GB compressed, ~3GB on disk
    # URL is auto-set when deploy=true, override for external Ollama
    url: ""
    # Model for simple queries. See resource requirements:
    #   llama3.2 (3B)    — 2-4 GB RAM, weak tool calling
    #   llama3.1:8b      — 6-8 GB RAM, moderate tool calling
    #   qwen2.5 (7B)     — 4-6 GB RAM, good tool calling for its size
    #   mistral (7B)     — 4-6 GB RAM, fast but moderate tool calling
    #   llama3.1:70b     — 40+ GB RAM, strong tool calling (needs GPU)
    #   mixtral (8x7B)   — 26+ GB RAM, strong reasoning
    model: "llama3.2"
    # Separate model for agent (tool calling). Larger models handle tools better.
    # Leave empty to use the same as 'model'.
    agentModel: ""
    # GPU support (requires nvidia device plugin on the cluster)
    gpu: false
    # Persist downloaded models across restarts (STRONGLY RECOMMENDED)
    # Without persistence, models are re-downloaded on every pod restart (multi-GB)
    persistence: false
    storageClassName: ""  # Leave empty for cluster default, or set e.g. "gp3", "ebs-sc"
    storageSize: "10Gi"   # 10Gi fits 1-2 small models, 50Gi+ for larger models
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: sharko.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: sharko-tls
  #    hosts:
  #      - sharko.example.com

# ---------------------------------------------------------------------------
# Data Persistence (for migration state)
# ---------------------------------------------------------------------------
persistence:
  enabled: false
  storageClassName: ""  # Leave empty for cluster default
  size: 1Gi

# Host aliases (for private DNS resolution)
hostAliases: []

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# Extra environment variables (name/value pairs)
extraEnv: []
#  - name: MY_VAR
#    value: "my-value"

# ---------------------------------------------------------------------------
# Corporate TLS MITM / SSL inspection — informational only
# ---------------------------------------------------------------------------
# On networks that intercept TLS with a corporate root CA, argocd-repo-server
# fails to fetch public Git repos with "x509: certificate signed by unknown
# authority". The fix lives in your ArgoCD Helm values (Sharko does not own
# the ArgoCD release), not in this file. Full runbook:
#   docs/site/operator/corporate-mitm-tls.md

# ---------------------------------------------------------------------------
# E2E TEST HARNESS ONLY — DO NOT SET IN PRODUCTION DEPLOYMENTS.
#
# These keys exist to wire test-only behavior. They MUST remain empty/default
# in any non-test installation. Setting them in production is unsupported and
# may expose internal test surfaces.
# ---------------------------------------------------------------------------
e2e:
  # SHARKO_E2E_GIT_HOSTS_ALLOWLIST — comma-separated list of additional git
  # hosts that Sharko's connection validator accepts. Used by helm-mode e2e
  # tests to allowlist the in-cluster gitfake service hostname (e.g.
  # gitfake.default.svc.cluster.local). Leave empty for production.
  gitHostsAllowlist: ""
