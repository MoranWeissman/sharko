# ArgoCD Addons Platform - Connection Configuration
# Copy this to config.yaml and fill in your values.
# Environment variables (e.g., ${GITHUB_TOKEN}) are expanded at runtime.

connections:
  - name: dev
    default: true
    git:
      provider: github
      owner: merck-ahtl
      repo: argocd-cluster-addons
      token: ${GITHUB_TOKEN}
    argocd:
      server_url: https://devops-argocd-addons-none-prod.mahi-techlabs.com
      token: ${ARGOCD_TOKEN}
      namespace: argocd
      insecure: true  # Skip TLS verification for self-signed certs

  # Example: additional connection for prod
