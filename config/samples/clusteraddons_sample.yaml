# ClusterAddons sample — defines addon assignments for a managed cluster
#
# This is the ASSIGNMENT layer only. It specifies which addons are enabled/disabled
# and their versions for a specific cluster. The addon catalog (addons-catalog.yaml)
# holds the chart definitions, Helm repos, and default values.
#
# One ClusterAddons CR per managed cluster. The cluster name must match an entry
# in managed-clusters.yaml.

apiVersion: sharko.dev/v1alpha1
kind: ClusterAddons
metadata:
  name: prod-eu
  namespace: sharko
spec:
  # The target cluster (must match a cluster name in managed-clusters.yaml)
  cluster: prod-eu

  # List of addon assignments for this cluster
  addons:
    - name: cert-manager
      # Optional version override (if not specified, uses catalog default)
      version: v1.13.0
      # Optional enabled flag (defaults to true if not specified)
      enabled: true

    - name: external-secrets
      version: 0.9.9
      enabled: true

    - name: ingress-nginx
      # Enabled field can be used to temporarily disable an addon
      enabled: false
