# Perf Baselines — machine-readable copy (V2-1.4).
#
# This file is the canonical input to the V2-1.4 CI regression gate
# (cmd/perf-baseline-compare). The sibling perf-baselines.md is the
# human-facing rendering of the same data; both are regenerated
# together by .github/workflows/perf-baseline-refresh.yml so they
# never drift.
#
# Do NOT hand-edit. To update: trigger the perf-baseline-refresh
# workflow (workflow_dispatch only, NEVER auto on merge — drift
# would be invisible). The workflow runs the harness, recomputes
# p50/p95/p99 per phase per path, rewrites this file + the .md
# sibling, and opens a chore PR for review.
#
# Schema:
#   environment:
#     date: <YYYY-MM-DD>
#     sharko_version: <semver>
#     runner: <free text — developer workstation OR ci runner spec>
#     sample_count: <int — default iterations per phase per path>
#   paths:
#     <path_id>:
#       phases:
#         <phase_id>:
#           n: <samples actually captured (may be less than sample_count for skip-graceful)>
#           p50_ms: <float64>
#           p95_ms: <float64>
#           p99_ms: <float64>
#           min_ms: <float64>
#           max_ms: <float64>
#
# Path + phase identifiers are LOCKED — see tests/e2e/harness/phases.go.
# Renaming either field invalidates baselines and breaks the CI gate.
