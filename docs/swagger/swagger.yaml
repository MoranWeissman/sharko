  /webhooks/git:
    post:
      consumes:
      - application/json
      description: |-
        Receives GitHub push event webhooks. Verifies HMAC-SHA256 signature
        when SHARKO_WEBHOOK_SECRET is set, then triggers a cache refresh on
        pushes to the configured base branch.
      parameters:
      - description: GitHub HMAC-SHA256 signature
        in: header
        name: X-Hub-Signature-256
        type: string
      - description: GitHub event type (push, ping, etc.)
        in: header
        name: X-GitHub-Event
        type: string
      - description: GitHub push event payload
        in: body
        name: body
        schema:
          $ref: '#/definitions/internal_api.gitHubPushEvent'
      produces:
      - application/json
      responses:
        "200":
          description: Webhook accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad request or unreadable body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid signature
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Git webhook receiver
      tags:
      - system
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
