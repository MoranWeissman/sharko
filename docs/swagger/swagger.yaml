  /prs:
    get:
      description: Returns all tracked pull requests with optional filters
      parameters:
      - description: Filter by status (open, merged, closed)
        in: query
        name: status
        type: string
      - description: Filter by cluster name
        in: query
        name: cluster
        type: string
      - description: Filter by addon name
        in: query
        name: addon
        type: string
      - description: Filter by user
        in: query
        name: user
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of tracked PRs
          schema:
            $ref: '#/definitions/internal_api.PRListResponse'
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List tracked pull requests
      tags:
      - prs
  /prs/{id}:
    delete:
      description: Removes a PR from tracking (admin only)
      parameters:
      - description: PR ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: PR removed from tracking
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid PR ID
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Stop tracking a pull request
      tags:
      - prs
    get:
      description: Returns details for a single tracked PR
      parameters:
      - description: PR ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: PR details
          schema:
            $ref: '#/definitions/internal_api.PRItem'
        "400":
          description: Invalid PR ID
          schema:
            additionalProperties: true
            type: object
        "404":
          description: PR not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get a tracked pull request
      tags:
      - prs
  /prs/{id}/refresh:
    post:
      description: Immediately polls the Git provider for this PR's current status
      parameters:
      - description: PR ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Updated PR details
          schema:
            $ref: '#/definitions/internal_api.PRItem'
        "400":
          description: Invalid PR ID
          schema:
            additionalProperties: true
            type: object
        "404":
          description: PR not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Force refresh a tracked PR
      tags:
      - prs
  /repo/status:
    get:
      description: Checks whether the GitOps repository has been bootstrapped (bootstrap/Chart.yaml
        exists on the base branch)
      produces:
      - application/json
      responses:
        "200":
          description: Repo status
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get repo initialization status
      tags:
      - system
  /secrets/reconcile:
    post:
      description: |-
        Manually triggers a full secret reconciliation pass across all registered clusters.
        Returns immediately with 202 Accepted; reconciliation runs in the background.
      produces:
      - application/json
      responses:
        "202":
          description: Reconcile triggered
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Secrets reconciler not configured
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Trigger secret reconciliation
      tags:
      - secrets
  /secrets/status:
    get:
      description: |-
        Returns statistics from the most recent secret reconciliation run,
        including counts of checked, created, updated, deleted, and skipped secrets,
        error count, duration, and the timestamp of the last run.
      produces:
      - application/json
      responses:
        "200":
          description: Reconciliation stats
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Secrets reconciler not configured
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get secret reconciliation status
      tags:
      - secrets
  /tokens:
    get:
      description: Returns all active API tokens without their secret values (admin
        only)
      produces:
      - application/json
      responses:
        "200":
          description: Token list
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List API tokens
      tags:
      - auth
    post:
      consumes:
      - application/json
      description: Creates a new long-lived API token for programmatic access (admin
        only)
      parameters:
      - description: Token name and role
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created token (shown only once)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create API token
      tags:
      - auth
  /tokens/{name}:
    delete:
      description: Permanently revokes an API token by name (admin only)
      parameters:
      - description: Token name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token revoked
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Revoke API token
      tags:
      - auth
  /upgrade/{addonName}/recommendations:
    get:
      description: 'Returns smart upgrade recommendations for an addon: next patch,
        next minor, and latest stable version'
      parameters:
      - description: Addon name
        in: path
        name: addonName
        required: true
