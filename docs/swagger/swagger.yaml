      - observability
  /operations/{id}:
    get:
      description: Returns the current status and step progress of a long-running
        operation
      parameters:
      - description: Operation session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Operation session
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Operation not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get operation status
      tags:
      - system
  /operations/{id}/cancel:
    post:
      description: Cancels a pending or waiting operation. Running operations may
        not stop immediately.
      parameters:
      - description: Operation session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Operation cancelled
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Operation not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cancel an operation
      tags:
      - system
  /operations/{id}/heartbeat:
    post:
      description: |-
        Records a client heartbeat so the server knows the client is still polling.
        Without heartbeats, a waiting operation may be abandoned.
      parameters:
      - description: Operation session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Heartbeat recorded
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Operation not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Send operation heartbeat
      tags:
      - system
  /providers:
    get:
