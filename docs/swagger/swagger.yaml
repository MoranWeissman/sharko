  /audit:
    get:
      description: |-
        Returns recent audit log entries (webhook pushes, cluster registrations, secret reconciliations, init runs).
        Entries are ordered newest-first. Supports filtering by user, action, source, result, cluster, and time range.
      parameters:
      - description: Filter by user
        in: query
        name: user
        type: string
      - description: Filter by action
        in: query
        name: action
        type: string
      - description: Filter by source (api, webhook, reconciler, etc.)
        in: query
        name: source
        type: string
      - description: Filter by result (success, failure, partial)
        in: query
        name: result
        type: string
      - description: Filter entries after this RFC3339 timestamp
        in: query
        name: since
        type: string
      - description: Filter by cluster name (matches cluster:NAME in resource)
        in: query
        name: cluster
        type: string
      - description: Maximum number of entries to return (default 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Audit log entries
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List audit log entries
      tags:
      - system
  /audit/stream:
    get:
      description: |-
        Opens a Server-Sent Events stream that pushes each new audit entry as it is recorded.
        The connection stays open until the client disconnects.
      produces:
