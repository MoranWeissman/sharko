          description: Existing waiting session returned (already in progress)
          schema:
            additionalProperties: true
            type: object
        "202":
          description: Operation accepted — poll operation_id for progress
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
