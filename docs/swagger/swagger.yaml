  /catalog/addons:
    get:
      description: Returns the Sharko-native curated catalog of addons that ships
        embedded in the binary. The list is filterable by category, curated_by tag,
        license, minimum OpenSSF Scorecard score, and by free-text over name/description/maintainers.
        Read-only; requires authentication.
      parameters:
      - description: Primary category (e.g. security, observability)
        in: query
        name: category
        type: string
      - description: Comma-separated curation tags; entry must carry ALL tags
        in: query
        name: curated_by
        type: string
      - description: SPDX license identifier (exact match, case-insensitive)
        in: query
        name: license
        type: string
      - description: Free-text substring match on name/description/maintainers
        in: query
        name: q
        type: string
      - description: Minimum OpenSSF Scorecard aggregate score (0-10); entries with
          unknown score are excluded when > 0
        in: query
        name: min_score
        type: number
      - description: Caller's Kubernetes version; entries requiring a newer cluster
          are excluded
        in: query
        name: min_k8s_version
        type: string
      - description: Include deprecated entries (default false)
        in: query
        name: include_deprecated
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Filtered curated catalog
          schema:
            $ref: '#/definitions/internal_api.catalogListResponse'
        "503":
          description: Catalog not loaded
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List curated catalog addons
      tags:
      - catalog
  /catalog/addons/{name}:
    get:
      description: Returns the full curated catalog entry for a single addon, including
        its OpenSSF Scorecard security score + derived tier label (Strong / Moderate
        / Weak) and last-refresh date. Read-only; requires authentication.
      parameters:
      - description: Addon name (case-sensitive, matches catalog.name)
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Curated catalog entry
          schema:
            $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_catalog.CatalogEntry'
        "404":
          description: Addon not found in curated catalog
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Catalog not loaded
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get a curated catalog addon by name
      tags:
      - catalog
  /catalog/addons/{name}/readme:
    get:
      description: 'Resolves a curated catalog entry to its ArtifactHub package and
        returns the README markdown for the in-page Marketplace detail view (v1.21
        QA Bundle 2). The lookup uses the chart name (case-insensitive) against ArtifactHub''s
        `/packages/search`, prefers verified-publisher hits, and tie-breaks by stars.
        Returns 200 with `readme: ""` when the chart was found but didn''t ship a
        README. Returns 404 only when no ArtifactHub package matches the curated chart
        name. Read-only; requires authentication.'
      parameters:
      - description: Curated addon name (case-sensitive, matches catalog.name)
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: README content + ArtifactHub coordinates
          schema:
            $ref: '#/definitions/internal_api.catalogReadmeResponse'
        "400":
          description: Missing addon name
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not in curated catalog or no ArtifactHub match
          schema:
            additionalProperties: true
            type: object
        "502":
          description: ArtifactHub unreachable and no cached value available
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Catalog not loaded
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get the README markdown for a curated catalog addon
      tags:
      - catalog
  /catalog/addons/{name}/versions:
    get:
      description: Returns the chart versions reported by the upstream Helm repo `index.yaml`
        for the curated catalog entry identified by `name`. Versions are sorted newest-first
        and tagged with `prerelease=true` when the SemVer build/prerelease segment
        is present. The first non-prerelease version is returned in `latest_stable`.
        Responses are cached server-side for 15 minutes per repo+chart pair. Read-only;
        requires authentication.
      parameters:
      - description: Curated catalog addon name
        in: path
        name: name
        required: true
        type: string
      - description: Include prerelease versions in the response (default true; the
          UI filters by the per-entry prerelease flag)
        in: query
        name: include_prereleases
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Sorted chart versions for the addon
          schema:
            $ref: '#/definitions/internal_api.catalogVersionsResponse'
        "404":
          description: Addon not found in curated catalog
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Upstream Helm repo unreachable
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Catalog not loaded
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List chart versions for a curated catalog addon
      tags:
      - catalog
  /catalog/remote/{repo}/{name}:
    get:
      description: 'Proxies the ArtifactHub package detail endpoint for one Helm chart
        so the browser does not call ArtifactHub directly (avoids CORS issues and
        lets Sharko apply rate-limit handling). Returns the trimmed package shape
        (description, maintainers, available_versions, links, license, repo metadata).
        Responses are cached server-side for 1 hour; on upstream failure the last
        cached value is served (stale up to 24 h) with `stale: true`. The `{repo}`
        path segment is the ArtifactHub repository name, `{name}` is the chart name.'
      parameters:
      - description: ArtifactHub repository name (e.g. jetstack)
        in: path
        name: repo
        required: true
        type: string
      - description: Chart name (e.g. cert-manager)
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Package detail
          schema:
            $ref: '#/definitions/internal_api.catalogRemotePackageResponse'
        "400":
          description: Missing repo or name
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Package not found on ArtifactHub
          schema:
            additionalProperties: true
            type: object
        "502":
          description: ArtifactHub unreachable and no cached value available
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: ArtifactHub package detail proxy
      tags:
      - catalog
  /catalog/repo-charts:
    get:
      description: 'v1.21 QA Bundle 1 — given a Helm repo URL, fetches `<repo>/index.yaml`
        and returns the chart names listed under `entries:`. Powers the chart-name
        dropdown in the manual "Add Addon" form so operators can pick from real chart
        names instead of typing blind. On failure returns HTTP 200 with `valid: false`
        and a structured `error_code` (invalid_input, repo_unreachable, index_parse_error,
        ssrf_blocked, timeout) so the UI''s existing switch table can be reused. Responses
        are cached server-side for 15 minutes per repo URL. Read-only; requires authentication.'
      parameters:
      - description: Helm repository base URL (e.g. https://charts.jetstack.io)
        in: query
        name: repo
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Chart list — `valid` distinguishes success vs structured failure
          schema:
            $ref: '#/definitions/internal_api.repoChartsResponse'
        "400":
          description: Missing or malformed repo query parameter
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List chart names available in an arbitrary Helm repository
      tags:
      - catalog
  /catalog/reprobe:
    post:
      description: Resets the in-memory backoff/circuit-breaker for ArtifactHub, purges
        the search and package-detail caches, and issues a probe against the ArtifactHub
        API root. Returns whether ArtifactHub is currently reachable from this Sharko
        process. Used by the UI's "Retry" button on the search-unreachable banner.
        Tier 1 (operational); audit-logged.
      produces:
      - application/json
      responses:
        "200":
          description: Probe result
          schema:
            $ref: '#/definitions/internal_api.catalogReprobeResponse'
        "401":
          description: Unauthenticated
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Force ArtifactHub connectivity re-check
      tags:
      - catalog
  /catalog/search:
    get:
      description: 'Returns curated catalog matches and ArtifactHub Helm chart matches
        for the same query in one envelope. Curated hits are returned as full catalog
        entries; ArtifactHub hits are slimmed to the fields the marketplace UI renders.
        When the upstream ArtifactHub call fails, curated hits are still returned
        and `artifacthub_error` is set with a classification (rate_limited / server_error
        / timeout / not_found / malformed). Search results are cached server-side
        for 10 minutes; on upstream failure the last cached value is served (stale
        up to 24 h) with `stale: true`.'
      parameters:
      - description: Search term (case-insensitive substring on curated; full-text
          on ArtifactHub)
        in: query
        name: q
        required: true
        type: string
      - description: Maximum ArtifactHub hits to return (default 20, max 60)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Blended search response
          schema:
            $ref: '#/definitions/internal_api.catalogSearchResponse'
        "400":
          description: Empty query
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Catalog not loaded
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Blended catalog search (curated + ArtifactHub)
      tags:
      - catalog
  /catalog/validate:
    get:
      description: 'Power-user "Paste Helm URL" validator: fetches `<repo>/index.yaml`,
        parses it, and confirms the named chart exists. On success returns the available
        versions, the latest stable version, and a few metadata fields (description,
        icon) for the Configure modal to pre-fill. On failure returns HTTP 200 with
        `valid: false` and a structured `error_code` (invalid_input, repo_unreachable,
        index_parse_error, chart_not_found, timeout) so the UI can render an inline
        message without HTTP-status branching. Responses are cached server-side for
        15 minutes per (repo, chart) pair — the same TTL semantics as `/catalog/addons/{name}/versions`.
        Read-only; requires authentication.'
      parameters:
      - description: Helm repository base URL (e.g. https://charts.jetstack.io)
        in: query
        name: repo
        required: true
        type: string
      - description: Chart name as listed in the repo's index.yaml entries (e.g. cert-manager)
        in: query
        name: chart
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Validation result — `valid` distinguishes success vs structured
            failure
          schema:
            $ref: '#/definitions/internal_api.catalogValidateResponse'
        "400":
          description: Missing or malformed repo / chart query parameter
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Validate a Helm chart at an arbitrary repo URL
      tags:
      - catalog
  /cluster/nodes:
    get:
      description: Returns Kubernetes node capacity, allocatable resources, and readiness
        status (in-cluster only)
      produces:
