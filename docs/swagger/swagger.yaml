      pr_id:
        type: integer
      pr_url:
        type: string
    type: object
  internal_api.catalogListResponse:
    properties:
      addons:
        items:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_catalog.CatalogEntry'
        type: array
      total:
        type: integer
    type: object
  internal_api.catalogReadmeResponse:
    properties:
      ah_chart:
        type: string
      ah_repo:
        type: string
      cached_at:
        type: string
      readme:
        type: string
      source:
        type: string
      stale:
        type: boolean
    type: object
  internal_api.catalogRemotePackageResponse:
    properties:
      cached_at:
        type: string
      package:
        $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_catalog.AHPackage'
      stale:
        type: boolean
    type: object
  internal_api.catalogReprobeResponse:
    properties:
      last_error:
        type: string
      probed_at:
        type: string
      reachable:
        type: boolean
    type: object
  internal_api.catalogSearchResponse:
    properties:
      artifacthub:
        items:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_catalog.AHSearchPackage'
        type: array
      artifacthub_error:
        type: string
      cached_at:
        type: string
      curated:
        items:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_catalog.CatalogEntry'
        type: array
      query:
        type: string
      stale:
        type: boolean
    type: object
  internal_api.catalogValidateResponse:
    properties:
      cached_at:
        type: string
      chart:
        type: string
      description:
        type: string
      error_code:
        $ref: '#/definitions/internal_api.validateErrorCode'
      icon_url:
        type: string
      latest_stable:
        type: string
      message:
        type: string
      repo:
        type: string
      valid:
        type: boolean
      versions:
        items:
          $ref: '#/definitions/internal_api.catalogVersionEntry'
        type: array
    type: object
  internal_api.catalogVersionEntry:
    properties:
      app_version:
        type: string
      created:
        type: string
      prerelease:
        type: boolean
      version:
        type: string
    type: object
  internal_api.catalogVersionsResponse:
    properties:
      addon:
        type: string
      cached_at:
        type: string
      chart:
        type: string
      latest_stable:
        type: string
      repo:
        type: string
      versions:
        items:
          $ref: '#/definitions/internal_api.catalogVersionEntry'
        type: array
    type: object
  internal_api.discoverEKSRequest:
    properties:
      provider:
        type: string
      region:
        type: string
      role_arns:
        items:
          type: string
        type: array
    type: object
  internal_api.discoverEKSResponse:
    properties:
      clusters:
        items:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_providers.DiscoveredCluster'
        type: array
      error:
        type: string
    type: object
  internal_api.embeddedDashboard:
    properties:
      id:
        type: string
      name:
        type: string
      provider:
        description: '"datadog", "grafana", "custom"'
        type: string
      url:
        type: string
    type: object
  internal_api.fleetClusterSummary:
    properties:
      connection_status:
        type: string
      degraded_addons:
        type: integer
      healthy_addons:
        type: integer
      name:
        type: string
      total_addons:
        type: integer
    type: object
  internal_api.fleetStatusResponse:
    properties:
      addon_data_unavailable:
        type: boolean
      argo_unavailable:
        type: boolean
      clusters:
        items:
          $ref: '#/definitions/internal_api.fleetClusterSummary'
        type: array
      degraded_clusters:
        type: integer
      degraded_deployments:
        type: integer
      disconnected_clusters:
        type: integer
      git_unavailable:
        type: boolean
      healthy_clusters:
        type: integer
      healthy_deployments:
        type: integer
      out_of_sync_deployments:
        type: integer
      server_version:
        type: string
      total_addons:
        type: integer
      total_clusters:
        type: integer
      total_deployments:
        type: integer
      uptime:
        type: string
    type: object
  internal_api.gitHubPushEvent:
    properties:
      commits:
        items:
          properties:
            id:
              type: string
            message:
              type: string
          type: object
        type: array
      pusher:
        properties:
          name:
            type: string
        type: object
      ref:
        type: string
    type: object
  internal_api.meResponse:
    properties:
      has_github_token:
        type: boolean
      role:
        type: string
      username:
        type: string
    type: object
  internal_api.recentPRsEntry:
    properties:
      author:
        type: string
      merged_at:
        type: string
      pr_id:
        type: integer
      title:
        type: string
      url:
        type: string
    type: object
  internal_api.recentPRsResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/internal_api.recentPRsEntry'
        type: array
      values_file:
        type: string
      view_all_url:
        type: string
    type: object
  internal_api.repoChartsResponse:
    properties:
      cached_at:
        type: string
      charts:
        items:
          type: string
        type: array
      error_code:
        $ref: '#/definitions/internal_api.validateErrorCode'
      message:
        type: string
      repo:
        type: string
      valid:
        type: boolean
    type: object
  internal_api.saveAIConfigRequest:
    properties:
      annotate_on_seed:
        description: |-
          AnnotateOnSeed (V121-7.3) is a tri-state via the *bool sentinel:
            nil  → caller didn't pass the field; preserve the current value
                   (or fall through to default-true if no current value exists).
            *false → explicit OFF.
            *true  → explicit ON.
          Once any save sets the field, AnnotateOnSeedSet flips to true and
          the explicit value is authoritative on subsequent reads.
        type: boolean
      api_key:
        type: string
      base_url:
        type: string
      model:
        type: string
      ollama_url:
        type: string
      provider:
        type: string
    type: object
  internal_api.setAIOptOutRequest:
    properties:
      opt_out:
        type: boolean
    type: object
  internal_api.setAddonValuesRequest:
    properties:
      refresh_from_upstream:
        description: |-
          RefreshFromUpstream, when true, regenerates the global values file
          from the chart's upstream values.yaml at the catalog-pinned version.
          The audit event for this path is `values_refreshed_from_upstream`
          (overriding the default `values_set`) so audit consumers can
          distinguish manual edits from upstream refreshes.
        type: boolean
      values:
        description: |-
          Values is the full YAML file content. Sharko commits this verbatim
          as the new global default values for the addon. Ignored when
          RefreshFromUpstream is true.
        type: string
    type: object
  internal_api.setClusterAddonValuesRequest:
    properties:
      values:
        type: string
    type: object
  internal_api.setMyGitHubTokenRequest:
    properties:
      token:
        type: string
    type: object
  internal_api.testClusterRequest:
    properties:
      deep:
        type: boolean
    type: object
  internal_api.testClusterResponse:
    properties:
      details:
        additionalProperties: true
        type: object
      duration_ms:
        type: integer
      error_code:
        $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_verify.ErrorCode'
      error_message:
        type: string
      name:
        type: string
      reachable:
        type: boolean
      result:
        $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_verify.Result'
      server_version:
        type: string
      stage:
        type: string
      steps:
        items:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_verify.Step'
        type: array
      success:
        type: boolean
      suggestions:
        items:
          type: string
        type: array
    type: object
  internal_api.validateErrorCode:
    enum:
    - invalid_input
    - repo_unreachable
    - index_parse_error
    - chart_not_found
    - timeout
    - ssrf_blocked
    type: string
    x-enum-varnames:
    - validateErrInvalidInput
    - validateErrRepoUnreachable
    - validateErrIndexParseError
    - validateErrChartNotFound
    - validateErrTimeout
    - validateErrSSRFBlocked
host: localhost:8080
info:
  contact: {}
  description: Addon management server for Kubernetes clusters, built on ArgoCD.
  title: Sharko API
  version: 1.0.0
paths:
  /addon-secrets:
    get:
      description: Returns all registered addon secret definitions
      produces:
      - application/json
      responses:
        "200":
          description: Addon secret definitions
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List addon secret definitions
      tags:
      - addons
    post:
      consumes:
      - application/json
      description: Registers a new addon secret definition for remote cluster secret
        propagation
      parameters:
      - description: Addon secret definition
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.AddonSecretDefinition'
      produces:
      - application/json
      responses:
        "201":
          description: Secret definition created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create addon secret definition
      tags:
      - addons
  /addon-secrets/{addon}:
    delete:
      description: Removes the secret definition for a specific addon
      parameters:
      - description: Addon name
        in: path
        name: addon
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Secret definition deleted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete addon secret definition
      tags:
      - addons
  /addons:
    post:
      consumes:
      - application/json
      description: Adds a new addon to the catalog by creating its ApplicationSet
        in the GitOps repo
      parameters:
      - description: Add addon request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.AddAddonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Addon created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Addon already exists in catalog
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Add addon
      tags:
      - addons
  /addons/{name}:
    delete:
      description: Removes an addon from the catalog. Without ?confirm=true returns
        a dry-run impact report.
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Set to 'true' to confirm destructive removal
        in: query
        name: confirm
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Addon removed
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Confirmation required or bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Remove addon
      tags:
      - addons
    get:
      description: Returns detailed information for a specific addon including deployment
        status across clusters
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Addon detail
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get addon detail
      tags:
      - addons
    patch:
      consumes:
      - application/json
      description: Updates an addon's catalog configuration. Only provided fields
        are modified (merge semantics).
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Configuration update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.ConfigureAddonRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Addon configured
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Configure addon
      tags:
      - addons
  /addons/{name}/changelog:
    get:
      description: Returns chart versions between two semver versions for comparison.
        When ?ai_summary=true and an AI provider is configured, an AI-generated summary
        is included.
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Starting version (current) — exclusive lower bound
        in: query
        name: from
        type: string
      - description: Target version — inclusive upper bound
        in: query
        name: to
        type: string
      - description: Set to 'true' to include an AI-generated summary (requires AI
          provider)
        in: query
        name: ai_summary
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Changelog between versions
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get addon version changelog
      tags:
      - addons
  /addons/{name}/upgrade:
    post:
      consumes:
      - application/json
      description: Upgrades an addon to a new version globally or for a specific cluster
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Upgrade request with version and optional cluster
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Upgrade result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Upgrade addon
      tags:
      - addons
  /addons/{name}/values:
    get:
      description: Returns the default Helm values file for a specific addon
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Addon values
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get addon values
      tags:
      - addons
    put:
      consumes:
      - application/json
      description: 'Replaces the global default Helm values YAML for an addon and
        opens a PR. Tier 2 (configuration) — prefers the caller''s personal GitHub
        PAT for proper Git authorship; otherwise falls back to the service token with
        a `Co-authored-by:` trailer and surfaces `attribution_warning: "no_per_user_pat"`
        in the response.'
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Full YAML payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.setAddonValuesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: PR created (or merged if auto-merge is on)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid YAML or missing field
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Git or ArgoCD failure
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Edit global addon values
      tags:
      - addons
  /addons/{name}/values-schema:
    get:
      description: Returns the addon's current global values YAML and an optional
        JSON Schema (read from `<addon>.schema.json` next to the values file). The
        schema is omitted when none has been published; the UI then falls back to
        plain YAML mode.
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Current values + optional schema
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Git failure
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get addon global values + schema
      tags:
      - addons
  /addons/{name}/values/ai-opt-out:
    put:
      consumes:
      - application/json
      description: 'Sets or clears the `# sharko: ai-annotate=off` directive in the
        addon''s global values file header. When opt-out is true, future addon-add
        and refresh-from-upstream runs skip the AI annotate pass for this addon. The
        directive is the only persistence (no Sharko-side store). Idempotent.'
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: opt_out flag
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.setAIOptOutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: PR opened (or merged) with header-only change
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Git error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Toggle per-addon AI annotation opt-out
      tags:
      - addons
  /addons/{name}/values/annotate:
    post:
      description: Fetches the chart's upstream values.yaml at the catalog-pinned
        version, runs the V121-7 AI annotate pass (one-line `# description` comments
        + LLM-suggested cluster-specific paths unioned with the heuristic), and opens
        a Tier 2 PR with the result. Hard-blocked when the secret-leak guard matches;
        in that case returns 422 with redacted matches and no PR. Skipped when AI
        is not configured or the addon is opted out.
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: PR opened (or merged if auto-merge is on)
          schema:
            $ref: '#/definitions/internal_api.annotateAddonValuesResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "422":
          description: Secret-leak guard blocked the LLM call
          schema:
            $ref: '#/definitions/internal_api.aiAnnotateBlockedResponse'
        "502":
          description: Git or upstream fetch error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: AI not configured
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Re-annotate an addon's global values via AI
      tags:
      - addons
  /addons/{name}/values/recent-prs:
    get:
      description: Returns up to `limit` (default 5, max 20) recently-merged PRs that
        modified the addon's global values file. Backed by a 5-minute in-memory cache.
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Maximum entries (default 5, max 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.recentPRsResponse'
      security:
      - BearerAuth: []
      summary: Recent PRs that touched an addon's global values
      tags:
      - addons
  /addons/catalog:
    get:
      description: Returns the full addon catalog with per-cluster deployment status
      produces:
      - application/json
      responses:
        "200":
          description: Addon catalog
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get addon catalog
      tags:
      - addons
  /addons/list:
    get:
      description: Returns all addon ApplicationSets defined in the GitOps repository
      produces:
      - application/json
      responses:
        "200":
          description: Addon list
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List addons
      tags:
      - addons
  /addons/upgrade-batch:
    post:
      consumes:
      - application/json
      description: Upgrades multiple addons in a single atomic GitOps commit
      parameters:
      - description: Batch upgrade request with upgrades map of addon->version
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
