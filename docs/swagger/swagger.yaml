      security:
      - BearerAuth: []
      summary: Check upgrade impact
      tags:
      - upgrade
  /users:
    get:
      description: Returns all configured users (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: User list
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - auth
    post:
      consumes:
      - application/json
      description: Creates a new user with a generated temporary password (admin only)
      parameters:
      - description: Create user request with username and role
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: User created with temp password
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - auth
  /users/{username}:
    delete:
      description: Permanently deletes a user account (admin only)
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User deleted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - auth
    put:
      consumes:
      - application/json
      description: Updates a user's role and enabled status (admin only)
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      - description: Update user request with enabled flag and role
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Updated user
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - auth
  /users/{username}/reset-password:
    post:
      description: Resets a user's password and returns a new temporary password (admin
        only)
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Temp password
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Reset user password
      tags:
      - auth
  /users/me:
    get:
      description: Returns the authenticated caller's profile. `has_github_token`
        indicates whether a per-user GitHub PAT is configured for tiered attribution.
      produces:
      - application/json
      responses:
        "200":
          description: Current user
          schema:
            $ref: '#/definitions/internal_api.meResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - auth
  /users/me/github-token:
    delete:
      description: Removes the authenticated user's personal GitHub PAT. After clearing,
        Tier 2 actions fall back to the service token with a co-author trailer for
        attribution.
      produces:
      - application/json
      responses:
        "200":
          description: Token cleared
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Clear personal GitHub token
      tags:
      - auth
    put:
      consumes:
      - application/json
      description: Stores an encrypted personal GitHub PAT for the authenticated user.
        The PAT is preferred over the service token when the user performs Tier 2
        (configuration) actions, so the resulting Git commit is authored by the user
        rather than the Sharko service account.
      parameters:
      - description: Token payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.setMyGitHubTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token saved
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Set personal GitHub token
      tags:
      - auth
  /users/me/github-token/test:
    post:
      description: Validates the authenticated user's stored personal GitHub PAT by
        calling GitHub's `/user` endpoint. Returns the GitHub login on success.
      produces:
      - application/json
      responses:
        "200":
          description: Token valid
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Token invalid or not set
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Test personal GitHub token
      tags:
      - auth
  /webhooks/git:
    post:
      consumes:
      - application/json
      description: |-
        Receives GitHub push event webhooks. Verifies HMAC-SHA256 signature
        when SHARKO_WEBHOOK_SECRET is set, then triggers a cache refresh on
        pushes to the configured base branch.
      parameters:
      - description: GitHub HMAC-SHA256 signature
        in: header
        name: X-Hub-Signature-256
        type: string
      - description: GitHub event type (push, ping, etc.)
        in: header
        name: X-GitHub-Event
        type: string
      - description: GitHub push event payload
        in: body
        name: body
        schema:
          $ref: '#/definitions/internal_api.gitHubPushEvent'
      produces:
      - application/json
      responses:
        "200":
          description: Webhook accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad request or unreadable body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid signature
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Git webhook receiver
      tags:
      - system
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
