basePath: /api/v1
definitions:
  github_com_MoranWeissman_sharko_internal_models.AddonSource:
    properties:
      chart:
        type: string
      parameters:
        additionalProperties:
          type: string
        type: object
      path:
        type: string
      repoURL:
        type: string
      valueFiles:
        items:
          type: string
        type: array
      version:
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_models.ArgocdConfig:
    properties:
      insecure:
        type: boolean
      namespace:
        type: string
      server_url:
        type: string
      token:
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_models.CreateConnectionRequest:
    properties:
      argocd:
        $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_models.ArgocdConfig'
      description:
        type: string
      git:
        $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_models.GitRepoConfig'
      gitops:
        $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_models.GitOpsSettings'
      name:
        type: string
      provider:
        $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_models.ProviderConfig'
      set_as_default:
        type: boolean
    type: object
  github_com_MoranWeissman_sharko_internal_models.GitOpsSettings:
    properties:
      base_branch:
        description: 'default: "main"'
        type: string
      branch_prefix:
        description: 'default: "sharko/"'
        type: string
      commit_prefix:
        description: 'default: "sharko:"'
        type: string
      default_addons:
        description: comma-separated addon names
        type: string
      host_cluster_name:
        description: cluster running ArgoCD (in-cluster)
        type: string
      pr_auto_merge:
        description: 'default: false'
        type: boolean
    type: object
  github_com_MoranWeissman_sharko_internal_models.GitProviderType:
    enum:
    - github
    - azuredevops
    type: string
    x-enum-varnames:
    - GitProviderGitHub
    - GitProviderAzureDevOps
  github_com_MoranWeissman_sharko_internal_models.GitRepoConfig:
    properties:
      organization:
        description: Azure DevOps fields
        type: string
      owner:
        description: GitHub fields
        type: string
      pat:
        type: string
      project:
        type: string
      provider:
        $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_models.GitProviderType'
      repo:
        type: string
      repo_url:
        description: URL-based input (parsed into owner/repo or org/project/repo)
        type: string
      repository:
        type: string
      token:
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_models.ProviderConfig:
    properties:
      namespace:
        description: K8s namespace (k8s-secrets only)
        type: string
      prefix:
        description: Secret name prefix, e.g. "clusters/"
        type: string
      region:
        description: AWS region (aws-sm only)
        type: string
      type:
        description: '"aws-sm" or "k8s-secrets"'
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_models.SetActiveConnectionRequest:
    properties:
      connection_name:
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_models.UpgradeCheckRequest:
    properties:
      addon_name:
        type: string
      target_version:
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_orchestrator.AddAddonRequest:
    properties:
      additional_sources:
        items:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_models.AddonSource'
        type: array
      chart:
        type: string
      extra_helm_values:
        additionalProperties:
          type: string
        type: object
      ignore_differences:
        items:
          additionalProperties: true
          type: object
        type: array
      name:
        type: string
      namespace:
        type: string
      repo_url:
        type: string
      self_heal:
        type: boolean
      sync_options:
        items:
          type: string
        type: array
      sync_wave:
        type: integer
      version:
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_orchestrator.AddonSecretDefinition:
    properties:
      addon_name:
        type: string
      keys:
        additionalProperties:
          type: string
        description: secret data key → provider path (e.g. "api-key" → "secrets/datadog/api-key")
        type: object
      namespace:
        type: string
      secret_name:
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_orchestrator.ConfigureAddonRequest:
    properties:
      additional_sources:
        items:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_models.AddonSource'
        type: array
      extra_helm_values:
        additionalProperties:
          type: string
        type: object
      ignore_differences:
        items:
          additionalProperties: true
          type: object
        type: array
      name:
        type: string
      self_heal:
        type: boolean
      sync_options:
        items:
          type: string
        type: array
      sync_wave:
        type: integer
      version:
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_orchestrator.InitRepoRequest:
    properties:
      auto_merge:
        type: boolean
      bootstrap_argocd:
        type: boolean
      git_token:
        type: string
      git_username:
        type: string
    type: object
  github_com_MoranWeissman_sharko_internal_orchestrator.RegisterClusterRequest:
    properties:
      addons:
        additionalProperties:
          type: boolean
        type: object
      name:
        type: string
      region:
        type: string
      secret_path:
        type: string
    type: object
  internal_api.aiConfigResponse:
    properties:
      available_providers:
        items:
          $ref: '#/definitions/internal_api.aiProviderInfo'
        type: array
      current_provider:
        type: string
    type: object
  internal_api.aiProviderInfo:
    properties:
      configured:
        type: boolean
      id:
        type: string
      model:
        type: string
      name:
        type: string
    type: object
  internal_api.embeddedDashboard:
    properties:
      id:
        type: string
      name:
        type: string
      provider:
        description: '"datadog", "grafana", "custom"'
        type: string
      url:
        type: string
    type: object
  internal_api.fleetClusterSummary:
    properties:
      connection_status:
        type: string
      degraded_addons:
        type: integer
      healthy_addons:
        type: integer
      name:
        type: string
      total_addons:
        type: integer
    type: object
  internal_api.fleetStatusResponse:
    properties:
      addon_data_unavailable:
        type: boolean
      argo_unavailable:
        type: boolean
      clusters:
        items:
          $ref: '#/definitions/internal_api.fleetClusterSummary'
        type: array
      degraded_clusters:
        type: integer
      degraded_deployments:
        type: integer
      disconnected_clusters:
        type: integer
      git_unavailable:
        type: boolean
      healthy_clusters:
        type: integer
      healthy_deployments:
        type: integer
      out_of_sync_deployments:
        type: integer
      server_version:
        type: string
      total_addons:
        type: integer
      total_clusters:
        type: integer
      total_deployments:
        type: integer
      uptime:
        type: string
    type: object
  internal_api.gitHubPushEvent:
    properties:
      commits:
        items:
          properties:
            id:
              type: string
            message:
              type: string
          type: object
        type: array
      pusher:
        properties:
          name:
            type: string
        type: object
      ref:
        type: string
    type: object
  internal_api.saveAIConfigRequest:
    properties:
      api_key:
        type: string
      base_url:
        type: string
      model:
        type: string
      ollama_url:
        type: string
      provider:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Addon management server for Kubernetes clusters, built on ArgoCD.
  title: Sharko API
  version: 1.0.0
paths:
  /addon-secrets:
    get:
      description: Returns all registered addon secret definitions
      produces:
      - application/json
      responses:
        "200":
          description: Addon secret definitions
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List addon secret definitions
      tags:
      - addons
    post:
      consumes:
      - application/json
      description: Registers a new addon secret definition for remote cluster secret
        propagation
      parameters:
      - description: Addon secret definition
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.AddonSecretDefinition'
      produces:
      - application/json
      responses:
        "201":
          description: Secret definition created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create addon secret definition
      tags:
      - addons
  /addon-secrets/{addon}:
    delete:
      description: Removes the secret definition for a specific addon
      parameters:
      - description: Addon name
        in: path
        name: addon
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Secret definition deleted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete addon secret definition
      tags:
      - addons
  /addons:
    post:
      consumes:
      - application/json
      description: Adds a new addon to the catalog by creating its ApplicationSet
        in the GitOps repo
      parameters:
      - description: Add addon request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.AddAddonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Addon created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Add addon
      tags:
      - addons
  /addons/{name}:
    delete:
      description: Removes an addon from the catalog. Without ?confirm=true returns
        a dry-run impact report.
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Set to 'true' to confirm destructive removal
        in: query
        name: confirm
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Addon removed
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Confirmation required or bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Remove addon
      tags:
      - addons
    get:
      description: Returns detailed information for a specific addon including deployment
        status across clusters
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Addon detail
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get addon detail
      tags:
      - addons
    patch:
      consumes:
      - application/json
      description: Updates an addon's catalog configuration. Only provided fields
        are modified (merge semantics).
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Configuration update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.ConfigureAddonRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Addon configured
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Configure addon
      tags:
      - addons
  /addons/{name}/changelog:
    get:
      description: Returns chart versions between two semver versions for comparison
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Starting version (current) — exclusive lower bound
        in: query
        name: from
        type: string
      - description: Target version — inclusive upper bound
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Changelog between versions
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Addon not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get addon version changelog
      tags:
      - addons
  /addons/{name}/upgrade:
    post:
      consumes:
      - application/json
      description: Upgrades an addon to a new version globally or for a specific cluster
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      - description: Upgrade request with version and optional cluster
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Upgrade result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Upgrade addon
      tags:
      - addons
  /addons/{name}/values:
    get:
      description: Returns the default Helm values file for a specific addon
      parameters:
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Addon values
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get addon values
      tags:
      - addons
  /addons/catalog:
    get:
      description: Returns the full addon catalog with per-cluster deployment status
      produces:
      - application/json
      responses:
        "200":
          description: Addon catalog
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get addon catalog
      tags:
      - addons
  /addons/list:
    get:
      description: Returns all addon ApplicationSets defined in the GitOps repository
      produces:
      - application/json
      responses:
        "200":
          description: Addon list
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List addons
      tags:
      - addons
  /addons/upgrade-batch:
    post:
      consumes:
      - application/json
      description: Upgrades multiple addons in a single atomic GitOps commit
      parameters:
      - description: Batch upgrade request with upgrades map of addon->version
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Batch upgrade result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Batch upgrade addons
      tags:
      - addons
  /addons/version-matrix:
    get:
      description: Returns a matrix of addon versions deployed across all clusters
      produces:
      - application/json
      responses:
        "200":
          description: Version matrix
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get version matrix
      tags:
      - addons
  /agent/chat:
    post:
      consumes:
      - application/json
      description: Sends a message to the AI agent and returns a response with tool-call
        capabilities
      parameters:
      - description: Chat request with session_id, message, and optional page_context
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Agent response with session_id
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: AI agent chat
      tags:
      - ai
  /agent/reset:
    post:
      consumes:
      - application/json
      description: Clears the conversation history for the specified agent session
      parameters:
      - description: Reset request with session_id
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Session reset
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Reset agent session
      tags:
      - ai
  /ai/config:
    get:
      description: Returns the current AI provider configuration and available providers
      produces:
      - application/json
      responses:
        "200":
          description: AI configuration
          schema:
            $ref: '#/definitions/internal_api.aiConfigResponse'
      security:
      - BearerAuth: []
      summary: Get AI configuration
      tags:
      - ai
    post:
      consumes:
      - application/json
      description: Saves and applies new AI provider configuration (admin only)
      parameters:
      - description: AI config to save
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.saveAIConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Configuration saved
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request or unsupported provider
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Save AI configuration
      tags:
      - ai
  /ai/provider:
    post:
      consumes:
      - application/json
      description: Switches the active AI provider without changing other configuration
        (admin only)
      parameters:
      - description: Provider selection with provider name
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Provider set
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request or unsupported provider
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Set AI provider
      tags:
      - ai
  /ai/test:
    post:
      description: Tests the currently active AI provider by sending a simple prompt
      produces:
      - application/json
      responses:
        "200":
          description: Test result with status and response
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: AI not configured
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Test active AI connection
      tags:
      - ai
  /ai/test-config:
    post:
      consumes:
      - application/json
      description: Tests an AI provider configuration without saving it
      parameters:
      - description: AI config to test
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.saveAIConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Test result with status and response
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Test AI configuration
      tags:
      - ai
  /auth/hash:
    post:
      consumes:
      - application/json
      description: Generates a bcrypt hash from a plaintext password. Only available
        when auth is disabled.
      parameters:
      - description: Password to hash
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Bcrypt hash
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden when auth is enabled
          schema:
            additionalProperties: true
            type: object
      summary: Hash password
