      tags:
      - system
  /init:
    post:
      consumes:
      - application/json
      description: |-
        Creates the GitOps repository structure and bootstraps ArgoCD with initial addon ApplicationSets.
        Returns immediately with an operation_id; poll GET /api/v1/operations/{id} for progress.
        If an existing "waiting" init session is found, returns that session (idempotent resume).
      parameters:
      - description: Init request (defaults to bootstrap mode)
        in: body
        name: body
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.InitRepoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Existing waiting session returned (already in progress)
          schema:
            additionalProperties: true
            type: object
        "202":
          description: Operation accepted — poll operation_id for progress
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Initialize addons repository
      tags:
      - init
  /notifications:
    get:
      description: Returns recent notifications (upgrades, drift, security)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List notifications
      tags:
      - notifications
  /notifications/read-all:
    post:
      description: Marks all notifications as read
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Mark all notifications as read
      tags:
      - notifications
  /observability/overview:
