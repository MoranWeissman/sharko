      description: |-
        Registers a new cluster in ArgoCD and creates its GitOps configuration.
        Pass "dry_run": true to preview what would happen without making changes.
      parameters:
      - description: Cluster registration request (supports dry_run field)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.RegisterClusterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Dry-run preview
          schema:
            additionalProperties: true
            type: object
        "201":
          description: Cluster registered
          schema:
            additionalProperties: true
            type: object
        "207":
          description: Partial success
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Cluster already exists
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Register cluster
      tags:
      - clusters
  /clusters/{cluster}/addons/{name}/values:
    get:
      description: Returns the YAML for a single addon's section in a cluster's overrides
        file, plus an optional JSON Schema. `current_overrides` is empty when no overrides
        are configured for this addon yet.
      parameters:
      - description: Cluster name
        in: path
        name: cluster
        required: true
        type: string
      - description: Addon name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Current overrides + optional schema
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Git failure
          schema:
            additionalProperties: true
