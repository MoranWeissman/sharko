host: localhost:8080
info:
  contact: {}
  description: Addon management server for Kubernetes clusters, built on ArgoCD.
  title: Sharko API
  version: 1.0.0
paths:
  /addon-secrets:
    get:
      description: Returns all registered addon secret definitions
      produces:
      - application/json
      responses:
        "200":
          description: Addon secret definitions
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List addon secret definitions
      tags:
      - addons
    post:
      consumes:
      - application/json
      description: Registers a new addon secret definition for remote cluster secret
        propagation
      parameters:
      - description: Addon secret definition
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.AddonSecretDefinition'
      produces:
      - application/json
      responses:
        "201":
          description: Secret definition created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create addon secret definition
      tags:
      - addons
  /addon-secrets/{addon}:
    delete:
      description: Removes the secret definition for a specific addon
      parameters:
      - description: Addon name
        in: path
        name: addon
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Secret definition deleted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete addon secret definition
      tags:
      - addons
  /addons:
    post:
      consumes:
      - application/json
      description: Adds a new addon to the catalog by creating its ApplicationSet
        in the GitOps repo
      parameters:
      - description: Add addon request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_MoranWeissman_sharko_internal_orchestrator.AddAddonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Addon created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Gateway error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Add addon
      tags:
      - addons
