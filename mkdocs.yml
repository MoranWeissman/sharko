markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Build hooks (pure-stdlib, no pip dependency). copy_openapi copies the
# swag-generated docs/swagger/swagger.json (which lives outside docs_dir) into
# the built site so api/reference.md can render it with Redoc — always in sync,
# no committed duplicate.
hooks:
  - docs/hooks/copy_openapi.py

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: false
      type: date
      fallback_to_build_date: true
  - redirects:
      redirect_maps: {}
