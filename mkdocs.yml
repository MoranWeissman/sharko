site_name: Sharko - Addon management for Kubernetes clusters
site_description: Addon management for Kubernetes clusters, built on ArgoCD
site_url: https://sharko.readthedocs.io/
repo_url: https://github.com/MoranWeissman/sharko
repo_name: MoranWeissman/sharko
docs_dir: docs/site

theme:
  name: material
  logo: assets/sharko-icon-256.png
  favicon: assets/sharko-mascot.png
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.tabs.link
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Release Notes: release-notes.md
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
    - Installation: getting-started/installation.md
    - First Run: getting-started/first-run.md
  - User Guide:
    - Managing Connections: user-guide/connections.md
    - Managing Clusters: user-guide/clusters.md
    - Managing Addons: user-guide/addons.md
    - Marketplace: user-guide/marketplace.md
    - Editing Values: user-guide/values-editing.md
    - Smart Values Layer: user-guide/smart-values.md
    - Editing ArgoCD App Options: user-guide/argocd-app-options.md
    - Upgrades: user-guide/upgrades.md
    - Dashboard: user-guide/dashboard.md
    - Notifications: user-guide/notifications.md
    - Git Attribution: user-guide/attribution.md
  - Operator Manual:
    - Installation: operator/installation.md
    - Configuration: operator/configuration.md
    - AI Configuration: operator/ai-config.md
    - Security: operator/security.md
    - Supply Chain: operator/supply-chain.md
    - Troubleshooting: operator/troubleshooting.md
  - CLI Reference:
    - Overview: cli/overview.md
    - Commands: cli/commands.md
  - API Reference:
    - Overview: api/overview.md
    - Endpoints: api/endpoints.md
  - Architecture:
    - Overview: architecture/overview.md
    - Repository Structure: architecture/repo-structure.md
  - Developer Guide: developer-guide.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: false
      type: date
      fallback_to_build_date: true
  - redirects:
      redirect_maps: {}
