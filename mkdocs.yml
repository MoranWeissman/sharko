site_name: Sharko - Addon management for Kubernetes clusters
site_description: Addon management for Kubernetes clusters, built on ArgoCD
site_url: https://sharko.readthedocs.io/
repo_url: https://github.com/MoranWeissman/sharko
repo_name: MoranWeissman/sharko
docs_dir: docs/site

theme:
  name: material
  logo: assets/sharko-icon-256.png
  favicon: assets/sharko-mascot.png
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.tabs.link
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Release Notes: release-notes.md
  - Getting Started:
