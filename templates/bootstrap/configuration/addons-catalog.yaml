# ================================================================ #
# Addons Catalog — Single Source of Truth
# ================================================================ #
# This file defines all available addons. ArgoCD ApplicationSets read
# from this file to deploy addons to clusters. Sharko manages it via
# the UI, CLI, or API — or edit directly and push.
#
# Required fields:
#   name:      Addon name (used as ArgoCD app suffix and label key)
#   repoURL:   Helm repository URL
#   chart:     Helm chart name
#   version:   Chart version (semver)
#
# Optional fields:
#   namespace:         Target namespace (defaults to addon name)
#   syncWave:          ArgoCD sync wave ordering (default: 0)
#                      Negative = deploy first, positive = deploy last
#   selfHeal:          Auto-revert manual changes (default: false)
#   syncOptions:       ArgoCD sync options list
#                      e.g. ["ServerSideApply=true", "CreateNamespace=true"]
#   ignoreDifferences: Fields to ignore during diff (for CRD-heavy addons)
#   additionalSources: Extra Helm sources for multi-source apps
#   extraHelmValues:   Additional Helm value overrides
#
# Sharko CLI:
#   sharko add-addon nginx-ingress --repo https://kubernetes.github.io/ingress-nginx --chart ingress-nginx --version 4.11.0
#   sharko configure-addon cert-manager --sync-wave -1 --self-heal true
#   sharko remove-addon nginx-ingress
#
# Full example with all fields:
#   - name: kyverno
#     repoURL: https://kyverno.github.io/kyverno/
#     chart: kyverno
#     version: "3.3.4"
#     namespace: kyverno
#     syncWave: -1
#     selfHeal: true
#     syncOptions:
#       - ServerSideApply=true
#     ignoreDifferences:
#       - group: kyverno.io
#         kind: ClusterPolicy
#         jsonPointers:
#           - /spec/rules
# ================================================================ #

applicationsets:
  - name: cert-manager
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    version: "1.16.3"
    namespace: cert-manager
    syncWave: -1

  - name: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    version: "1.15.0"
    namespace: external-dns

  - name: external-secrets
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    version: "0.12.1"
    namespace: external-secrets
    syncWave: -1

  - name: keda
    repoURL: https://kedacore.github.io/charts
    chart: keda
    version: "2.16.1"
    namespace: keda

  - name: kyverno
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    version: "3.3.4"
    namespace: kyverno
    syncOptions:
      - ServerSideApply=true

  - name: argo-rollouts
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    version: "2.38.2"
    namespace: argo-rollouts

  - name: datadog
    repoURL: https://helm.datadoghq.com
    chart: datadog
    version: "3.82.6"
    namespace: datadog

  # Istio service mesh — deploy in order: istio-base → istio-cni → istiod → istio-ingress
  - name: istio-base
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    version: "1.24.3"
    namespace: istio-system
    syncWave: -2

  - name: istio-cni
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: cni
    version: "1.24.3"
    namespace: istio-system
    syncWave: -1

  - name: istiod
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    version: "1.24.3"
    namespace: istio-system

  - name: istio-ingress
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    version: "1.24.3"
    namespace: istio-ingress
    syncWave: 1
