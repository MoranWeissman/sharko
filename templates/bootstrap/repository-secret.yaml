---
# This creates a  repository secret that ArgoCD recognizes
# Update credentials via ArgoCD UI or CLI after applying
apiVersion: v1
kind: Secret
metadata:
  name: github-repo-credentials
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
  annotations:
    # Managed manually during bootstrap, later managed by ESO
    managed-by: manual-bootstrap
type: Opaque
stringData:
  type: git
  url: {{ .Values.repoURL }}
  username: {{ .Values.githubUsername }}
  password: "YOUR_GITHUB_TOKEN"
