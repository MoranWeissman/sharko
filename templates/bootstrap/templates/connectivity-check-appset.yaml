# ----------------------------------------------------------------------------------------------------
# Sharko Connectivity-Check ApplicationSet + AppProject
#
# Purpose:
#   A freshly-registered cluster with ZERO addons enabled matches NO ApplicationSet
#   generated by addons-appset.yaml → ArgoCD never connects → cluster shows "Unknown"
#   with no actionable signal. This ApplicationSet deploys a single harmless ConfigMap
#   to any cluster carrying the label  sharko.io/connectivity-check: enabled.
#   "Synced + Healthy" is end-to-end proof that ArgoCD can reach and deploy to that
#   cluster ("Connectivity verified"). A failed deploy surfaces a real, diagnosable
#   reason. When the first addon is enabled, the operator removes the check label from
#   the cluster Secret; ArgoCD cascades-deletes the Application.
#
# Bootstrap-empty guard:
#   addons-appset.yaml renders ONLY when there is at least one catalog entry.
#   With an empty catalog, the bootstrap Application renders zero resources and ArgoCD's
#   "auto-sync will wipe out all resources" guard fires. This template is ALWAYS rendered
#   (no conditional gate), so the bootstrap Application always has at least one resource
#   and the wipe-out guard never fires.
#
# Selection:
#   The clusters generator selects Secrets carrying BOTH:
#     argocd.argoproj.io/secret-type: cluster
#     sharko.io/connectivity-check: enabled
#   Sharko sets that second label at secret-build time for newly-registered clusters
#   (zero addon labels with value "enabled") when SHARKO_CONNECTIVITY_CHECK is not
#   disabled. Adopted clusters never receive this label.
# ----------------------------------------------------------------------------------------------------

---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: connectivity-check
  namespace: argocd
spec:
  # Destinations: allow deployment to sharko-system on any cluster server.
  destinations:
  - namespace: sharko-system
    server: '*'
  # Source repos: the GitOps repo that Sharko writes to.
  sourceRepos:
  - '{{ $.Values.repoURL }}'
  # Namespace resource whitelist: only ConfigMap is needed for the check.
  namespaceResourceWhitelist:
  - group: ''
    kind: ConfigMap
  # Cluster resource whitelist: Namespace is required because CreateNamespace=true
  # instructs ArgoCD to ensure the target namespace exists. Without this entry,
  # ArgoCD cannot create the sharko-system namespace and the sync fails with
  # "namespace … is not permitted in project … clusterResourceWhitelist".
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  clusterResourceBlacklist: []

---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: connectivity-check
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    # Single clusters generator: no per-cluster values file needed — the check
    # manifest is static and the same for every cluster.
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
            sharko.io/connectivity-check: enabled
  template:
    metadata:
      name: 'connectivity-check-{{`{{.name}}`}}'
      labels:
        cluster-name: '{{`{{.name}}`}}'
        app-type: connectivity-check
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: connectivity-check
      source:
        repoURL: {{ $.Values.repoURL }}
        targetRevision: {{ $.Values.targetRevision }}
        path: configuration/connectivity-check
        directory:
          recurse: false
      destination:
        # Route to the in-cluster API server for the host cluster; external URL for all others.
        server: '{{`{{if eq .name "SHARKO_HOST_CLUSTER_NAME"}}https://kubernetes.default.svc{{else}}{{.server}}{{end}}`}}'
        namespace: sharko-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
