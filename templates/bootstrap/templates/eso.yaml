---
# External Secrets Operator - Bootstrap Infrastructure
# This deploys ESO to the ArgoCD control plane cluster for bootstrapping.
# This is NOT a managed addon - it's part of the bootstrap process.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: external-secrets-operator
  namespace: argocd
spec:
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  destinations:
  - namespace: '*'
    server: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  sourceRepos:
  - '*'
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  labels:
    cluster-name: {{ .Values.hostCluster.name }}
    app-type: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-2"  # Install before cluster registration
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: external-secrets-operator
  sources:
    # Source 1: ESO Helm chart
    - repoURL: https://charts.external-secrets.io
      targetRevision: {{ .Values.bootstrap.eso.version }}
      chart: external-secrets
      helm:
        # Use fixed release name to prevent resource recreation on Application rename
        releaseName: external-secrets-bootstrap
        valuesObject:
          # Bootstrap-specific ESO configuration (from bootstrap-config.yaml only)
          {{- if .Values.bootstrap.eso.namespace }}
          namespaceOverride: {{ .Values.bootstrap.eso.namespace }}
          {{- end }}
          {{- if .Values.bootstrap.eso.serviceaccount.name }}
          serviceAccount:
            name: {{ .Values.bootstrap.eso.serviceaccount.name }}
            annotations:
              eks.amazonaws.com/role-arn: {{ .Values.bootstrap.eso.serviceaccount.roleArn }}
          {{- end }}
          # Datadog Autodiscovery — scrape ESO Prometheus metrics on the host cluster
          podAnnotations:
            ad.datadoghq.com/external-secrets.checks: |
              {
                "openmetrics": {
                  "instances": [{
                    "openmetrics_endpoint": "http://%%host%%:8080/metrics",
                    "namespace": "external_secrets",
                    "metrics": [
                      "externalsecret_status_condition",
                      "externalsecret_sync_calls_total",
                      "externalsecret_sync_calls_error",
                      "externalsecret_reconcile_duration",
                      "externalsecret_provider_api_calls_count",
                      "secretstore_status_condition",
                      "clustersecretstore_status_condition",
                      "controller_runtime_reconcile_errors_total",
                      "workqueue_depth"
                    ],
                    "tags": ["kube_cluster_name:{{ .Values.hostCluster.name }}"]
                  }]
                }
              }
    # Source 2: ESO configuration (ClusterSecretStore)
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      path: charts/eso-configuration
      helm:
        valuesObject:
          secretManagerRegion: {{ .Values.bootstrap.region }}
          esoNamespace: {{ .Values.bootstrap.eso.namespace }}
          esoServiceAccount: {{ .Values.bootstrap.eso.serviceaccount.name }}
    # Source 3: Values reference
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    # Deploy to ArgoCD's own cluster (in-cluster)
    server: https://kubernetes.default.svc
    namespace: {{ .Values.bootstrap.eso.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
