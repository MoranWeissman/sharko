# Addon Deployment Health dashboard — per-addon drill-down for debugging.
# Created by the Datadog Operator when this CRD is applied.
# Engineer selects an addon namespace from the filter dropdown,
# then sees pods, resources, events, and logs for that addon.
{{- if .Values.dashboards.addonDeployment.enabled }}
{{- $c := .Values.clusterName }}
apiVersion: datadoghq.com/v1alpha1
kind: DatadogDashboard
metadata:
  name: addon-deployment-health
  namespace: datadog
spec:
  title: "Addon Deployment Health — {{ $c }}"
  description: "Per-addon debugging view: select an addon namespace to see pods, resources, events, and logs"
  layoutType: ordered
  templateVariables:
    - name: namespace
      prefix: kube_namespace
      {{- $raw := .Values.addonNamespaces | trimPrefix "," }}
      {{- $namespaces := splitList "," $raw | uniq }}
      {{- if $namespaces }}
      availableValues:
        {{- range $namespaces }}
        - {{ . | quote }}
        {{- end }}
      # Default to first addon — engineer drills down by switching the filter
      defaults:
        - {{ index $namespaces 0 | quote }}
      {{- else }}
      availableValues: []
      {{- end }}
  widgets: |
    [
      {"definition":{"title":"Pod Status","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"definition":{"title":"Running","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.pod.status_phase{kube_cluster_name:{{ $c }},$namespace,pod_phase:running}","aggregator":"last"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":">","value":0,"palette":"white_on_green"}]}],"conditional_formats":[{"comparator":">","value":0,"palette":"white_on_green"}]}],"autoscale":true,"precision":0},"layout":{"x":0,"y":0,"width":2,"height":2}},
        {"definition":{"title":"Pending","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.pod.status_phase{kube_cluster_name:{{ $c }},$namespace,pod_phase:pending}","aggregator":"last"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_yellow"}]}],"conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_yellow"}]}],"autoscale":true,"precision":0},"layout":{"x":2,"y":0,"width":2,"height":2}},
        {"definition":{"title":"Failed","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.pod.status_phase{kube_cluster_name:{{ $c }},$namespace,pod_phase:failed}","aggregator":"last"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}],"conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}],"autoscale":true,"precision":0},"layout":{"x":4,"y":0,"width":2,"height":2}},
        {"definition":{"title":"CrashLoop","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.container.waiting.reason{kube_cluster_name:{{ $c }},$namespace,reason:crashloopbackoff}","aggregator":"last"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}],"conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}],"autoscale":true,"precision":0},"layout":{"x":6,"y":0,"width":2,"height":2}},
        {"definition":{"title":"OOMKilled","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.container.status_report.count.terminated{kube_cluster_name:{{ $c }},$namespace,reason:oomkilled}","aggregator":"last"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}],"conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}],"autoscale":true,"precision":0},"layout":{"x":8,"y":0,"width":4,"height":2}}
      ]},"layout":{"x":0,"y":0,"width":12,"height":4}},

      {"definition":{"title":"Pods","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"definition":{"title":"Pod Details","type":"query_table","requests":[{"response_format":"scalar","queries":[
          {"data_source":"metrics","name":"cpu","query":"avg:kubernetes.cpu.usage.total{kube_cluster_name:{{ $c }},$namespace} by {pod_name}","aggregator":"last"},
          {"data_source":"metrics","name":"mem","query":"avg:kubernetes.memory.usage{kube_cluster_name:{{ $c }},$namespace} by {pod_name}","aggregator":"last"},
          {"data_source":"metrics","name":"restarts","query":"max:kubernetes_state.container.restarts{kube_cluster_name:{{ $c }},$namespace} by {pod_name}","aggregator":"last"}
        ],"formulas":[
          {"alias":"CPU (m)","cell_display_mode":"bar","formula":"cpu / 1000000"},
          {"alias":"Memory (MB)","cell_display_mode":"bar","formula":"mem / 1048576"},
          {"alias":"Restarts","formula":"restarts","conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}
        ]}]},"layout":{"x":0,"y":0,"width":12,"height":5}}
      ]},"layout":{"x":0,"y":4,"width":12,"height":7}},

      {"definition":{"title":"Resource Usage","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"definition":{"title":"CPU — Usage vs Requests vs Limits","show_legend":true,"legend_layout":"auto","type":"timeseries","requests":[{"response_format":"timeseries","queries":[
          {"name":"usage","data_source":"metrics","query":"sum:kubernetes.cpu.usage.total{kube_cluster_name:{{ $c }},$namespace}"},
          {"name":"reqs","data_source":"metrics","query":"sum:kubernetes.cpu.requests{kube_cluster_name:{{ $c }},$namespace}"},
          {"name":"lims","data_source":"metrics","query":"sum:kubernetes.cpu.limits{kube_cluster_name:{{ $c }},$namespace}"}
        ],"formulas":[
          {"alias":"Usage (m)","formula":"usage / 1000000"},
          {"alias":"Requests (m)","formula":"reqs * 1000"},
          {"alias":"Limits (m)","formula":"lims * 1000"}
        ],"style":{"palette":"dog_classic","line_type":"solid","line_width":"normal"},"display_type":"line"}],"yaxis":{"include_zero":true,"min":"0"}},"layout":{"x":0,"y":0,"width":6,"height":3}},
        {"definition":{"title":"Memory — Usage vs Requests vs Limits","show_legend":true,"legend_layout":"auto","type":"timeseries","requests":[{"response_format":"timeseries","queries":[
          {"name":"usage","data_source":"metrics","query":"sum:kubernetes.memory.usage{kube_cluster_name:{{ $c }},$namespace}"},
          {"name":"reqs","data_source":"metrics","query":"sum:kubernetes.memory.requests{kube_cluster_name:{{ $c }},$namespace}"},
          {"name":"lims","data_source":"metrics","query":"sum:kubernetes.memory.limits{kube_cluster_name:{{ $c }},$namespace}"}
        ],"formulas":[
          {"alias":"Usage (MB)","formula":"usage / 1048576"},
          {"alias":"Requests (MB)","formula":"reqs / 1048576"},
          {"alias":"Limits (MB)","formula":"lims / 1048576"}
        ],"style":{"palette":"dog_classic","line_type":"solid","line_width":"normal"},"display_type":"line"}],"yaxis":{"include_zero":true,"min":"0"}},"layout":{"x":6,"y":0,"width":6,"height":3}},
        {"definition":{"title":"Pod Restarts Over Time","show_legend":false,"type":"timeseries","time":{"live_span":"1d"},"requests":[{"response_format":"timeseries","queries":[
          {"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.container.restarts{kube_cluster_name:{{ $c }},$namespace} by {pod_name}"}
        ],"formulas":[{"alias":"Restarts","formula":"q1"}],"style":{"palette":"warm","line_type":"solid","line_width":"normal"},"display_type":"bars"}],"yaxis":{"include_zero":true,"min":"0"}},"layout":{"x":0,"y":3,"width":12,"height":3}}
      ]},"layout":{"x":0,"y":11,"width":12,"height":8}},

      {"definition":{"title":"Kubernetes Events","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"definition":{"title":"Events","requests":[{"response_format":"event_list","query":{"data_source":"event_stream","query_string":"source:kubernetes kube_cluster_name:{{ $c }} $namespace","event_size":"s"},"columns":[]}],"type":"list_stream","time":{"live_span":"4h"}},"layout":{"x":0,"y":0,"width":12,"height":5}}
      ]},"layout":{"x":0,"y":19,"width":12,"height":7}},

      {"definition":{"title":"Logs","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"definition":{"title":"All Logs","type":"log_stream","query":"kube_cluster_name:{{ $c }} $namespace -\"use of closed network connection\" -\"connection refused\" -\"connection reset by peer\"","indexes":["*"],"columns":["core_service","status"],"show_date_column":true,"show_message_column":true,"message_display":"expanded-md","sort":{"column":"time","order":"desc"},"time":{"live_span":"4h"}},"layout":{"x":0,"y":0,"width":12,"height":6}}
      ]},"layout":{"x":0,"y":26,"width":12,"height":8}}
    ]
{{- end }}
