# ESO Health dashboard — runtime visibility into External Secrets Operator.
# Shows pod status, resource usage, K8s events, and logs for the external-secrets namespace.
# ESO is critical infrastructure — if it's down, secrets stop syncing across all clusters.
{{- if .Values.dashboards.esoHealth.enabled }}
{{- $c := .Values.clusterName }}
apiVersion: datadoghq.com/v1alpha1
kind: DatadogDashboard
metadata:
  name: eso-health
  namespace: datadog
spec:
  title: "ESO Health — {{ $c }}"
  description: "External Secrets Operator health and performance on {{ $c }}"
  layoutType: ordered
  widgets: |
    [
      {"definition":{"title":"ESO Pod Status","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"definition":{"title":"Running","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.pod.status_phase{kube_cluster_name:{{ $c }},kube_namespace:external-secrets,pod_phase:running}","aggregator":"last"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":">","value":0,"palette":"white_on_green"}]}],"conditional_formats":[{"comparator":">","value":0,"palette":"white_on_green"}]}],"autoscale":true,"precision":0},"layout":{"x":0,"y":0,"width":3,"height":2}},
        {"definition":{"title":"Pending","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.pod.status_phase{kube_cluster_name:{{ $c }},kube_namespace:external-secrets,pod_phase:pending}","aggregator":"last"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_yellow"}]}],"conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_yellow"}]}],"autoscale":true,"precision":0},"layout":{"x":3,"y":0,"width":3,"height":2}},
        {"definition":{"title":"Failed","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.pod.status_phase{kube_cluster_name:{{ $c }},kube_namespace:external-secrets,pod_phase:failed}","aggregator":"last"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}],"conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}],"autoscale":true,"precision":0},"layout":{"x":6,"y":0,"width":3,"height":2}},
        {"definition":{"title":"Restarts","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:kubernetes_state.container.restarts{kube_cluster_name:{{ $c }},kube_namespace:external-secrets}","aggregator":"last"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_yellow"}]}],"conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_yellow"}]}],"autoscale":true,"precision":0},"layout":{"x":9,"y":0,"width":3,"height":2}}
      ]},"layout":{"x":0,"y":0,"width":12,"height":4}},

      {"definition":{"title":"Resource Usage","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"definition":{"title":"CPU Usage","show_legend":true,"legend_layout":"auto","type":"timeseries","requests":[{"response_format":"timeseries","queries":[
          {"name":"usage","data_source":"metrics","query":"sum:kubernetes.cpu.usage.total{kube_cluster_name:{{ $c }},kube_namespace:external-secrets} by {pod_name}"}
        ],"formulas":[{"alias":"CPU (m)","formula":"usage / 1000000"}],"style":{"palette":"dog_classic","line_type":"solid","line_width":"normal"},"display_type":"line"}],"yaxis":{"include_zero":true,"min":"0"}},"layout":{"x":0,"y":0,"width":6,"height":3}},
        {"definition":{"title":"Memory Usage","show_legend":true,"legend_layout":"auto","type":"timeseries","requests":[{"response_format":"timeseries","queries":[
          {"name":"usage","data_source":"metrics","query":"sum:kubernetes.memory.usage{kube_cluster_name:{{ $c }},kube_namespace:external-secrets} by {pod_name}"}
        ],"formulas":[{"alias":"Memory (MB)","formula":"usage / 1048576"}],"style":{"palette":"dog_classic","line_type":"solid","line_width":"normal"},"display_type":"line"}],"yaxis":{"include_zero":true,"min":"0"}},"layout":{"x":6,"y":0,"width":6,"height":3}}
      ]},"layout":{"x":0,"y":4,"width":12,"height":5}},

      {"definition":{"title":"Kubernetes Events","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"definition":{"title":"Events","requests":[{"response_format":"event_list","query":{"data_source":"event_stream","query_string":"source:kubernetes kube_cluster_name:{{ $c }} kube_namespace:external-secrets","event_size":"s"},"columns":[]}],"type":"list_stream","time":{"live_span":"4h"}},"layout":{"x":0,"y":0,"width":12,"height":5}}
      ]},"layout":{"x":0,"y":9,"width":12,"height":7}},

      {"definition":{"title":"Logs","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"definition":{"title":"All Logs","type":"log_stream","query":"kube_cluster_name:{{ $c }} kube_namespace:external-secrets","indexes":["*"],"columns":["core_service","status"],"show_date_column":true,"show_message_column":true,"message_display":"expanded-md","sort":{"column":"time","order":"desc"},"time":{"live_span":"4h"}},"layout":{"x":0,"y":0,"width":12,"height":6}}
      ]},"layout":{"x":0,"y":16,"width":12,"height":8}}
    ]
{{- end }}
