# Alert when addon CPU usage approaches the configured limits.
# Sustained high CPU indicates the addon needs more resources or has a performance issue.
{{- if and .Values.monitors.addonDeployment.enabled .Values.addonNamespaces }}
{{- $c := .Values.clusterName }}
apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: addon-cpu-pressure-{{ $c }}
  namespace: datadog
spec:
  name: "[{{ $c }}] Addon CPU near limits in {{`{{kube_namespace.name}}`}}"
  type: "query alert"
  query: "avg(last_15m):( avg:kubernetes.cpu.usage.total{kube_cluster_name:{{ $c }},{{ include "monitors.namespaceIn" . }}} by {kube_namespace} / avg:kubernetes.cpu.limits{kube_cluster_name:{{ $c }},{{ include "monitors.namespaceIn" . }}} by {kube_namespace} ) * 100 > 90"
  message: |-
    Addon in namespace {{`{{kube_namespace.name}}`}} on cluster {{ $c }} is using more than 90% of its CPU limit for 15 minutes.

    Consider increasing CPU limits or investigating high CPU usage.
    Check the Addon Deployment Health dashboard → Resource Usage section.
    {{- include "monitors.notificationHandles" . | nindent 4 }}
  tags:
    - "cluster:{{ $c }}"
    - "source:addon-monitoring"
    - "severity:warning"
  options:
    thresholds:
      critical: "90"
      warning: "80"
    notifyNoData: false
    includeTags: true
    newGroupDelay: 300
{{- end }}
