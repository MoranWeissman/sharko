# Alert when addon pods are stuck in CrashLoopBackOff.
# Multi-alert: fires separately per namespace so you know which addon is affected.
{{- if and .Values.monitors.addonDeployment.enabled .Values.addonNamespaces }}
{{- $c := .Values.clusterName }}
apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: addon-crashloop-{{ $c }}
  namespace: datadog
spec:
  name: "[{{ $c }}] Addon pod CrashLoopBackOff in {{`{{kube_namespace.name}}`}}"
  type: "query alert"
  query: "max(last_5m):max:kubernetes_state.container.waiting.reason{kube_cluster_name:{{ $c }},reason:crashloopbackoff,{{ include "monitors.namespaceIn" . }}} by {kube_namespace} >= 1"
  message: |-
    Addon pod in namespace {{`{{kube_namespace.name}}`}} is in CrashLoopBackOff on cluster {{ $c }}.

    Check the Addon Deployment Health dashboard for details.
    {{- include "monitors.notificationHandles" . | nindent 4 }}
  tags:
    - "cluster:{{ $c }}"
    - "source:addon-monitoring"
    - "severity:critical"
  options:
    thresholds:
      critical: "1"
    notifyNoData: false
    includeTags: true
    newGroupDelay: 300
    renotifyInterval: 60
{{- end }}
