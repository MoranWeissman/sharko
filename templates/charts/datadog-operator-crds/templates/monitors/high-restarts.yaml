# Alert when addon containers restart frequently.
# Triggers when restart count increases by more than 5 in 10 minutes.
{{- if and .Values.monitors.addonDeployment.enabled .Values.addonNamespaces }}
{{- $c := .Values.clusterName }}
apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: addon-high-restarts-{{ $c }}
  namespace: datadog
spec:
  name: "[{{ $c }}] Addon high restart rate in {{`{{kube_namespace.name}}`}}"
  type: "query alert"
  query: "change(avg(last_10m),last_10m):max:kubernetes_state.container.restarts{kube_cluster_name:{{ $c }},{{ include "monitors.namespaceIn" . }}} by {kube_namespace} > 5"
  message: |-
    Containers in namespace {{`{{kube_namespace.name}}`}} on cluster {{ $c }} have restarted more than 5 times in the last 10 minutes.

    Check the Addon Deployment Health dashboard → Pod Restarts Over Time for details.
    {{- include "monitors.notificationHandles" . | nindent 4 }}
  tags:
    - "cluster:{{ $c }}"
    - "source:addon-monitoring"
    - "severity:warning"
  options:
    thresholds:
      critical: "5"
      warning: "3"
    notifyNoData: false
    includeTags: true
    newGroupDelay: 300
{{- end }}
