# Alert on any OOMKilled container in addon namespaces.
# Uses change detection to alert on new OOM events, not historical count.
{{- if and .Values.monitors.addonDeployment.enabled .Values.addonNamespaces }}
{{- $c := .Values.clusterName }}
apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: addon-oomkilled-{{ $c }}
  namespace: datadog
spec:
  name: "[{{ $c }}] Addon container OOMKilled in {{`{{kube_namespace.name}}`}}"
  type: "query alert"
  query: "change(max(last_5m),last_5m):max:kubernetes_state.container.status_report.count.terminated{kube_cluster_name:{{ $c }},reason:oomkilled,{{ include "monitors.namespaceIn" . }}} by {kube_namespace} > 0"
  message: |-
    A container in namespace {{`{{kube_namespace.name}}`}} was OOMKilled on cluster {{ $c }}.

    This usually means the container's memory limit is too low or there is a memory leak.
    Check the Addon Deployment Health dashboard for memory usage trends.
    {{- include "monitors.notificationHandles" . | nindent 4 }}
  tags:
    - "cluster:{{ $c }}"
    - "source:addon-monitoring"
    - "severity:critical"
  options:
    thresholds:
      critical: "0"
    notifyNoData: false
    includeTags: true
    newGroupDelay: 300
    renotifyInterval: 60
{{- end }}
