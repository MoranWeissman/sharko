# Alert when addon pods are stuck in Pending state for more than 10 minutes.
# Usually indicates scheduling issues (node capacity, taints, affinity).
{{- if and .Values.monitors.addonDeployment.enabled .Values.addonNamespaces }}
{{- $c := .Values.clusterName }}
apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: addon-pending-pods-{{ $c }}
  namespace: datadog
spec:
  name: "[{{ $c }}] Addon pods stuck Pending in {{`{{kube_namespace.name}}`}}"
  type: "query alert"
  query: "min(last_10m):sum:kubernetes_state.pod.status_phase{kube_cluster_name:{{ $c }},pod_phase:pending,{{ include "monitors.namespaceIn" . }}} by {kube_namespace} > 0"
  message: |-
    Addon pods in namespace {{`{{kube_namespace.name}}`}} on cluster {{ $c }} have been stuck in Pending state for more than 10 minutes.

    Common causes: insufficient node capacity, node taints, pod affinity/anti-affinity rules, PVC binding issues.
    Check the Addon Deployment Health dashboard → Pod Status section.
    {{- include "monitors.notificationHandles" . | nindent 4 }}
  tags:
    - "cluster:{{ $c }}"
    - "source:addon-monitoring"
    - "severity:warning"
  options:
    thresholds:
      critical: "0"
    notifyNoData: false
    includeTags: true
    newGroupDelay: 300
{{- end }}
