# All values come from configuration/ files loaded by the ApplicationSet.
# This values.yaml only defines the structure — actual data comes from:
#   - configuration/addons-clusters-values/<cluster>.yaml (clusterGlobalValues)
#   - configuration/datadog-project-mappings.yaml (datadogProjectMappings)
#   - ApplicationSet parameter (appKey.enabled)

clusterGlobalValues:
  clusterName: ""

secretStore:
  name: global-secret-store
  kind: ClusterSecretStore

# Controlled by the ApplicationSet — automatically set to true
# when datadog.datadog.operator.enabled is true in the cluster values.
# Do not set this manually.
appKey:
  enabled: false

# Loaded from configuration/datadog-project-mappings.yaml by the ApplicationSet.
# Do not set this manually.
datadogProjectMappings: {}
