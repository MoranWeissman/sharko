{{- /*
NodePool Template for Karpenter v1
Supports all NodePool features including static/dynamic modes, disruption policies, and comprehensive configuration
*/ -}}
{{- range .Values.nodepools }}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .name | required "NodePool name is required" }}
  namespace: {{ .namespace | default "karpenter" }}

spec:
  {{- /*
  Static NodePool mode - when replicas is set, maintains fixed number of nodes
  Note: weight cannot be used when replicas is specified
  */ -}}
  {{- if .replicas }}
  replicas: {{ .replicas }}
  {{- end }}

  # Template describing how nodes created by this NodePool should look
  template:
    metadata:
      {{- /*
      Labels applied to every node created by this NodePool
      Commonly used for workload targeting (nodeSelector / affinity)
      */ -}}
      {{- if .template.metadata.labels }}
      labels:
        {{- toYaml .template.metadata.labels | nindent 8 }}
      {{- end }}

      {{- /*
      Annotations applied to every node created by this NodePool
      Useful for ownership, cost allocation, or tooling
      */ -}}
      {{- if .template.metadata.annotations }}
      annotations:
        {{- toYaml .template.metadata.annotations | nindent 8 }}
      {{- end }}

    spec:
      # Reference to the cloud-provider-specific NodeClass
      # For EKS Auto Mode, this is typically an EC2NodeClass
      nodeClassRef:
        {{- if .template.spec.nodeClassRef }}
        {{- toYaml .template.spec.nodeClassRef | nindent 8 }}
        {{- else }}
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
        {{- end }}

      {{- /*
      Taints applied to provisioned nodes
      Pods must tolerate these taints to schedule on these nodes
      */ -}}
      {{- with .template.spec.taints }}
      taints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- /*
      Startup taints are temporary taints applied at node launch
      Expected to be removed by another component (e.g. DaemonSet)
      */ -}}
      {{- with .template.spec.startupTaints }}
      startupTaints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- /*
      Maximum lifetime of nodes created by this NodePool
      Helps with security patching and long-lived node issues
      Can be set to 'Never' to disable expiration
      */ -}}
      {{- if .template.spec.expireAfter }}
      expireAfter: {{ .template.spec.expireAfter }}
      {{- end }}

      {{- /*
      Maximum time allowed for graceful node draining before forced deletion
      If pod terminationGracePeriodSeconds > this value, pod may be forcibly deleted
      */ -}}
      {{- if .template.spec.terminationGracePeriod }}
      terminationGracePeriod: {{ .template.spec.terminationGracePeriod }}
      {{- end }}

      {{- /*
      Requirements that constrain the parameters of provisioned nodes
      Combined with pod scheduling constraints (affinity, nodeSelector, etc.)
      Supports operators: In, NotIn, Exists, DoesNotExist, Gt, Lt
      */ -}}
      {{- with .template.spec.requirements }}
      requirements:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  {{- /*
  Disruption configuration controls how aggressively Karpenter can disrupt nodes
  Includes consolidation policies and budgets for controlled scale-down
  */ -}}
  {{- with .disruption }}
  disruption:
    {{- /*
    Consolidation policy determines when nodes are considered for consolidation
    - WhenEmptyOrUnderutilized: Considers all nodes, removes/replaces when empty or underutilized
    - WhenEmpty: Only considers nodes with no workload pods
    */ -}}
    {{- if .consolidationPolicy }}
    consolidationPolicy: {{ .consolidationPolicy }}
    {{- end }}

    {{- /*
    Time to wait before consolidating a node after pod changes
    Can be set to 'Never' to disable consolidation
    */ -}}
    {{- if .consolidateAfter }}
    consolidateAfter: {{ .consolidateAfter }}
    {{- end }}

    {{- /*
    Budgets control the speed of node scale-down operations
    Karpenter respects the minimum of currently active budgets
    */ -}}
    {{- with .budgets }}
    budgets:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}

  {{- /*
  Resource limits constrain the total size of the NodePool
  Prevents Karpenter from creating new instances once limits are exceeded
  */ -}}
  {{- with .limits }}
  limits:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- /*
  Priority weight for NodePool selection
  Higher weights indicate higher priority when comparing NodePools
  Cannot be used when replicas is specified (static mode)
  */ -}}
  {{- if and .weight (not .replicas) }}
  weight: {{ .weight }}
  {{- end }}

{{- end }}
