# ================================================================ #
# Addons Catalog - Available Helm Charts
# ================================================================ #
# See docs/VALUES_GUIDE.md for full documentation
#
# Example:
#   - appName: keda                    # Required: addon name
#     repoURL: https://kedacore.io     # Required: Helm repo
#     chart: keda                      # Required: chart name
#     version: 2.14.2                  # Required: version
#     namespace: kube-system           # Optional: custom namespace (defaults to appName)
#     ignoreDifferences: []            # Optional: ArgoCD ignore rules
# ================================================================ #

applicationsets:
  # Uses multi-source: Official Datadog chart
  - appName: datadog
    repoURL: https://helm.datadoghq.com
    chart: datadog
    version: 3.160.1
    inMigration: true

  - appName: keda
    repoURL: https://kedacore.github.io/charts
    chart: keda
    version: 2.14.2
    inMigration: true

  - appName: redisinsight
    repoURL: http://mahtl-redis-insight-helm-chart.s3-website-eu-west-1.amazonaws.com
    chart: redisinsight
    version: 1.14.0
    inMigration: true

  - appName: redisinsight-v2
    repoURL: http://mahtl-redis-insight-v2-helm-chart.s3-website-eu-west-1.amazonaws.com
    chart: redisinsight-v2
    version: 1.0.12
    inMigration: true

  - appName: kafka-ui
    repoURL: https://provectus.github.io/kafka-ui-charts
    chart: kafka-ui
    version: 0.7.5
    inMigration: true

  - appName: external-secrets
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    version: 0.19.2
    inMigration: true

  - appName: secrets-store-csi-driver
    repoURL: https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
    chart: secrets-store-csi-driver
    namespace: kube-system
    version: 1.5.0
    inMigration: true

  - appName: sscdp-aws
    repoURL: https://aws.github.io/secrets-store-csi-driver-provider-aws
    chart: secrets-store-csi-driver-provider-aws
    namespace: kube-system
    version: 0.3.11
    inMigration: true
# | -- Both Istio apps: istio-base and istiod have to be managed, updated and deployed on a cluster -- |
# | -- Istio-base app deploys CRD's, istiod app deploys istio mesh itself -- | #

  - appName: istio-base
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    version: 1.28.0
    namespace: istio-system
    inMigration: true

  - appName: istiod
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    version: 1.28.0
    namespace: istio-system
    inMigration: false

  - appName: istio-cni
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: cni
    version: 1.28.0
    namespace: istio-system
    inMigration: true

  - appName: istio-ingress
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway          # this is the Istio ingress gateway chart name in 1.22
    version: 1.28.0
    namespace: istio-system
    inMigration: true

# | -- End of Istio apps -- | #

  - appName: anodot
    repoURL: https://pileus-cloud.github.io/charts
    chart: anodot-cost-k8s-cw-agent
    version: 0.1.9
    namespace: anodot
    inMigration: false

  - appName: kyverno
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    version: 3.3.4
    inMigration: true

  - appName: argo-rollouts
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    version: 2.39.5 # https://artifacthub.io/packages/helm/argo/argo-rollouts/2.39.5
    inMigration: true

  - appName: karpenter
    repoURL: https://aic.jfrog.io/artifactory/aic-helm-charts/
    chart: karpenter-crds-helm-chart
    version: 1.0.2
    ignoreDifferences:
    - group: karpenter.sh
      kind: NodePool
      jsonPointers:
      - /spec/limits/cpu
    inMigration: true

  - appName: cert-manager
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    version: 1.17.1
    inMigration: false

  - appName: argo-events
    repoURL: https://argoproj.github.io/argo-helm
    namespace: argo-workflows
    chart: argo-events
    version: 2.4.14
    inMigration: true

  - appName: argo-workflows
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    version: 0.45.12
    inMigration: true

  - appName: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns
    chart: external-dns
    version: 1.17.0
    inMigration: true

  # Connectivity test — deploys a ConfigMap to verify ArgoCD can reach the cluster
  - appName: hello-world
    repoURL: https://github.com/merck-ahtl/argocd-cluster-addons.git
    path: charts/hello-world
    version: main

# ================================================================ #
# Migration / Adoption Mode Configuration
# ================================================================ #
migrationIgnoreDifferences:
- group: apps
  kind: Deployment
  jsonPointers:
    - /spec/template

- group: apps
  kind: StatefulSet
  jsonPointers:
    - /spec/template

- group: apps
  kind: DaemonSet
  jsonPointers:
    - /spec/template

- group: batch
  kind: Job
  jsonPointers:
    - /spec/template

- group: batch
  kind: CronJob
  jsonPointers:
    - /spec/jobTemplate/spec/template