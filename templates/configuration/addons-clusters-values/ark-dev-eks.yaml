# ================================================================ #
# Global Values (used by all addons)
# Define YAML anchors with & for reuse across addon configurations
# ================================================================ #
clusterGlobalValues:
  env: &env dev
  clusterName: &clusterName ark-dev-eks
  region: &region us-east-1
  projectName: ark-dev-eks

# ================================================================ #
# Addon-specific overrides
# These override the default values from global.yaml
# Use YAML anchors (*clusterName, *region, etc.) to reference clusterGlobalValues
# ================================================================ #

# ================================================================ #
# ------------------- Datadog Configuration ------------------- #
# ================================================================ #
datadog:
  datadog:
    # Project namespaces for log collection (addon namespaces are added automatically)
    projectNamespaces: 'datadog|iot-device-registration|service-sensehub|service-sensehub-lt|user-management|ark|codeflex-cloud-api|cloudinfra-notification-service-api|trnsfrmr|api-transformer-operator-is|cis-iot-gw-registration|cloudinfra-iot-bulk-downlink|white-dove|cloudinfra-iot-device-provisioning|cloudinfra-iot-gw-provisioning|akuity|provisioning-hub-api'
    apm:
      portEnabled: true
      instrumentation:
        enabled: true
        enabledNamespaces:
        - service-sensehub
    profiling:
      enabled: true

# ================================================================ #
# ------------------- Anodot Configuration ----------------------- #
# ================================================================ #
anodot:
  config:
    clusterName: *clusterName
    clusterRegion: *region
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::056822611329:role/anodot-ark-dev-eks-eu-west-1

# ================================================================ #
# ------------------- Argo Workflows Configuration --------------- #
# ================================================================ #
argo-workflows:
  server:
    authModes:
      - server
      - client
    ingress:
      enabled: true
      pathType: Prefix
      annotations:
        alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": {"Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
        alb.ingress.kubernetes.io/healthcheck-protocol: HTTPS
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/success-codes: 200-399
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/group.name: private
        alb.ingress.kubernetes.io/security-groups: sg_ark_alb_dev_private
      ingressClassName: alb
      hosts:
        - ark-dev-workflows.mahi-techlabs.com
      paths:
        - /
  workflow:
    serviceAccount:
      create: true
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::056822611329:role/ark-dev-argo-workflows
  controller:
    configMap:
      create: true
    nodeEvents:
      enabled: true
    workflowEvents:
      enabled: true
    workflowDefaults:
      spec:
        serviceAccountName: workflow-runner-sa
        ttlStrategy:
          secondsAfterSuccess: 604800
          secondsAfterFailure: 1209600
  useStaticCredentials: false
  artifactRepository:
    archiveLogs: true
    s3:
      bucket: ark-dev-argo-workflows-repository
      endpoint: s3.amazonaws.com
      region: eu-west-1
      keyFormat: "artifacts/{{workflow.namespace}}/{{workflow.name}}/{{pod.name}}"

# ================================================================ #
# ------------------- External DNS Configuration ----------------- #
# ================================================================ #
external-dns:
  provider:
    name: aws
  env:
    - name: AWS_DEFAULT_REGION
      value: eu-west-1
  policy: upsert-only
  txtOwnerId: external-dns
  sources:
    - ingress
  interval: 5m
  registry: noop
  extraArgs:
    - --aws-zone-type=private
    - --aws-prefer-cname
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::056822611329:role/ark-dev-external-dns

# ================================================================ #
# ------------------- KEDA Configuration ------------------------- #
# ================================================================ #
keda:
  serviceAccount:
    operator:
      name: keda-operator-sa
    metricServer:
      name: keda-metrics-server-sa
    webhooks:
      name: keda-webhook-sa
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::056822611329:role/ark-dev-keda"
  podIdentity:
    aws:
      irsa:
        enabled: true
        roleArn: "arn:aws:iam::056822611329:role/ark-dev-keda"
  crds:
    additionalAnnotations:
      argocd.argoproj.io/sync-options: ServerSideApply=true

# ================================================================ #
# ------------------- Redis Insight V2 Configuration ------------- #
# ================================================================ #
redis-insight-v2:
  ingress:
    oldClusterVersionSupport: false
    host: "ark-redisinsight-v2-dev.mahi-techlabs.com"
    sgGroupName: "sg_ark_alb_dev_private"
    svcPort: 38001
