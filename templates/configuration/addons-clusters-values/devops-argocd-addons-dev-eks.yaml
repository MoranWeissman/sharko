# =================================================================================== #
# Global Values (used by all addons)
# Define YAML anchors with & for reuse across addon configurations
# Use YAML anchors (*clusterName, *region, etc.) to reference a complete value object
# (as a standalone value and not part of a string)
# =================================================================================== #
clusterGlobalValues:
  env: &env dev  # Required for API key lookup
  clusterName: &clusterName devops-argocd-addons-dev-eks
  projectName: devops  # Used for Datadog API key lookup in AWS Secrets Manager

# ================================================================ #
# Addon-specific overrides
# These override the default values from global.yaml
# Uncomment and customize as needed for your addons
# ================================================================ #

# ================================================================ #
# ------------------- Datadog Configuration ---------------------- #
# ================================================================ #
datadog:
  datadog:
    operator:
      enabled: true
    clusterName: *clusterName
    # Project namespaces for log collection (addon namespaces are added automatically)
    projectNamespaces: 'argocd'
    logLevel: INFO

  # IRSA for Cluster Agent
  clusterAgent:
    logLevel: INFO
    rbac:
      serviceAccountAnnotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::627176949220:role/Datadog-Agent-devops

  # IRSA for Node Agents DaemonSet
  agents:
    rbac:
      serviceAccountAnnotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::627176949220:role/Datadog-Agent-devops
      
