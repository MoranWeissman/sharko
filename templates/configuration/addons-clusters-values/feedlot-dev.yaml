# ================================================================ #
# Global Values (used by all addons)
# Define YAML anchors with & for reuse across addon configurations
# ================================================================ #
clusterGlobalValues:
  env: &env dev
  clusterName: &clusterName feedlot-dev
  region: &region eu-west-1
  projectName: &projectName feedlot  # Used for Datadog API key lookup in AWS Secrets Manager
  awsAccountId: &awsAccountId 298685015100

# ================================================================ #
# Addon-specific overrides
# These override the default values from global.yaml
# Use YAML anchors (*clusterName, *region, etc.) to reference clusterGlobalValues
# Uncomment and customize as needed for your addons
# ================================================================ #

# ================================================================ #
# ------------------- Anodot Configuration ----------------------- #
# ================================================================ #
anodot:
  config:
    clusterName: *clusterName
    clusterRegion: *region
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::*awsAccountId:role/anodot-*clusterName-*region
      
# ================================================================ #
# ------------------- Datadog Configuration ---------------------- #
# ================================================================ #
datadog:
  datadog:
    clusterName: *clusterName
    # Project namespaces for log collection (addon namespaces are added automatically)
    projectNamespaces: 'feedlot|feedlot-web|feedlot-mobile'

# ================================================================ #
# ------------------- External Secrets Configuration ------------- #
# ================================================================ #
external-secrets:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::*awsAccountId:role/feedlot-secretsmanager-sa-*env"    

# ================================================================ #
# ------------------- Redis Insight V2 Configuration ------------- #
# ================================================================ #
redis-insight-v2:
  ingress:
    oldClusterVersionSupport: false
    host: "feedlot-redisinsight-v2-dev.mahi-techlabs.com"
    sgGroupName: "feedlot-alb-offices"
    svcPort: 38001
