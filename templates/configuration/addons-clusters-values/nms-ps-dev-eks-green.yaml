# ================================================================ #
# Global Values (used by all addons)
# Define YAML anchors with & for reuse across addon configurations
# ================================================================ #
clusterGlobalValues:
  env: &env dev
  clusterName: &clusterName nms-ps-dev-eks-green
  region: &region us-east-1
  projectName: nms-ps-dev-eks-green

# ================================================================ #
# Addon-specific overrides
# These override the default values from global.yaml
# Use YAML anchors (*clusterName, *region, etc.) to reference clusterGlobalValues
# ================================================================ #

# ================================================================ #
# ------------------- Datadog Configuration ------------------- #
# ================================================================ #
datadog:
  datadog:
    # Project namespaces for log collection (addon namespaces are added automatically)
    projectNamespaces: 'ps-nms'

# ================================================================ #
# ------------------- Anodot Configuration ----------------------- #
# ================================================================ #
anodot:
  config:
    clusterName: *clusterName
    clusterRegion: *region
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::242212801364:role/anodot-nms-ps-dev-eks-green-eu-west-1
