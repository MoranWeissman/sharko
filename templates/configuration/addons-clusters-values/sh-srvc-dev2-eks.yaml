# ================================================================ #
# Global Values (used by all addons)
# Define YAML anchors with & for reuse across addon configurations
# ================================================================ #
clusterGlobalValues:
  env: &env dev
  clusterName: &clusterName sh-srvc-dev2-eks
  region: &region us-east-1
  projectName: sh-srvc-dev2-eks

# ================================================================ #
# Addon-specific overrides
# These override the default values from global.yaml
# Use YAML anchors (*clusterName, *region, etc.) to reference clusterGlobalValues
# ================================================================ #

# ================================================================ #
# ------------------- Datadog Configuration ------------------- #
# ================================================================ #
datadog:
  datadog:
    # Project namespaces for log collection (addon namespaces are added automatically)
    projectNamespaces: 'cps-service-dev2|sh-idm-cloud-manager|data-fetcher-service-dev|cattle-fleet-system'

# ================================================================ #
# ------------------- Anodot Configuration ----------------------- #
# ================================================================ #
anodot:
  config:
    clusterName: *clusterName
    clusterRegion: *region
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::552292662766:role/anodot-sh-srvc-dev2-eks-eu-west-1

# ================================================================ #
# ------------------- Redis Insight V2 Configuration ------------- #
# ================================================================ #
redis-insight-v2:
  ingress:
    oldClusterVersionSupport: true
    host: "cps-redisinsight-v2-dev2.mahi-techlabs.com"
    sgGroupName: "SG-sh-srvc-dev2-monitoring-alb"
    svcPort: 38001
