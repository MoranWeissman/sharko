# ================================================================ #
# Global Values (used by all addons)
# Define YAML anchors with & for reuse across addon configurations
# ================================================================ #
clusterGlobalValues:
  env: &env dev
  clusterName: &clusterName swine-dev
  region: &region us-east-1
  projectName: swine-dev

# ================================================================ #
# Addon-specific overrides
# These override the default values from global.yaml
# Use YAML anchors (*clusterName, *region, etc.) to reference clusterGlobalValues
# ================================================================ #

# ================================================================ #
# ------------------- Datadog Configuration ------------------- #
# ================================================================ #
datadog:
  clusterAgent:
    admissionController:
      enabled: false
  datadog:
    # Project namespaces for log collection (addon namespaces are added automatically)
    projectNamespaces: 'swine'

# ================================================================ #
# ------------------- Anodot Configuration ----------------------- #
# ================================================================ #
anodot:
  config:
    clusterName: *clusterName
    clusterRegion: *region
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::223595378141:role/anodot-swine-dev-eu-west-1

# ================================================================ #
# ------------------- KEDA Configuration ------------------------- #
# ================================================================ #
keda:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::298685015100:role/swine-sa-keda-dev"

# ================================================================ #
# ------------------- Redis Insight V2 Configuration ------------- #
# ================================================================ #
redis-insight-v2:
  ingress:
    oldClusterVersionSupport: false
    host: "swine-redisinsight-v2-dev.mahi-techlabs.com"
    sgGroupName: ""
    svcPort: 38001
