# ================================================================ #
# Global Values (used by all addons)
# Define YAML anchors with & for reuse across addon configurations
# ================================================================ #
clusterGlobalValues:
  env: &env dev
  clusterName: &clusterName vence-dev
  region: &region us-east-1
  projectName: vence-dev

# ================================================================ #
# Addon-specific overrides
# These override the default values from global.yaml
# Use YAML anchors (*clusterName, *region, etc.) to reference clusterGlobalValues
# ================================================================ #

# ================================================================ #
# ------------------- Datadog Configuration ------------------- #
# ================================================================ #
datadog:
  datadog:
    logLevel: INFO
    logs:
      enabled: 'true'
      containerCollectAll: 'true'
      autoMultiLineDetection: 'true'
    containerExcludeLogs: 'kube_namespace:.*'
    # Project namespaces for log collection (addon namespaces are added automatically)
    projectNamespaces: 'vence|datadog'
    otlp:
      receiver:
        protocols:
          grpc:
            enabled: true
            endpoint: "0.0.0.0:4317"
          http:
            enabled: true
            endpoint: "0.0.0.0:4318"

# ================================================================ #
# ------------------- Anodot Configuration ----------------------- #
# ================================================================ #
anodot:
  config:
    clusterName: *clusterName
    clusterRegion: *region
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::012886244013:role/anodot-vence-dev-eu-west-1

# ================================================================ #
# ------------------- KEDA Configuration ------------------------- #
# ================================================================ #
keda:
  serviceAccount:
    operator:
      name: keda-operator-sa
    metricServer:
      name: keda-metrics-server-sa
    webhooks:
      name: keda-webhook-sa
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::012886244013:role/vence-sa-keda-dev"
  podIdentity:
    aws:
      irsa:
        enabled: true
  crds:
    additionalAnnotations:
      argocd.argoproj.io/sync-options: ServerSideApply=true

# ================================================================ #
# ------------------- Redis Insight V2 Configuration ------------- #
# ================================================================ #
redis-insight-v2:
  ingress:
    oldClusterVersionSupport: false
    host: "vence-redisinsight-v2-dev.mahi-techlabs.com"
    sgGroupName: "vence-alb-offices"
    svcPort: 38001
