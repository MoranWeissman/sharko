# ---- Anodot Configuration ---- #
# Chart: anodot-cost-k8s-cw-agent
# Repo: https://pileus-cloud.github.io/charts
# Namespace: anodot
# Description: Anodot cost monitoring agent for Kubernetes cloud cost optimization
#
# These values apply to ALL clusters unless overridden per-cluster
# in addons-clusters-values/<cluster-name>.yaml

config:
  clusterName: "eks-dev"
  clusterRegion: "us-east-1"
  tagService: false
  collectionInterval: 120

resources:
  limits:
    cpu: 200m
    memory: 200Mi
  requests:
    cpu: 200m
    memory: 200Mi

nameOverride: ""
# This is the name of the deployment in the Kubernetes cluster. Only set if we have a problem with length limit on the resource name.
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

serviceAccount:
  # Annotations to add to the service account
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::111122223333:role/iam-role-name

hostNetwork: false
nodeSelector: {}

tolerations: []

affinity: {}

# For bottlerocket OS (https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/ContainerInsights-troubleshooting.html#ContainerInsights-troubleshooting-bottlerocket)
# containerdSockPath: /run/dockershim.sock
containerdSockPath: /run/containerd/containerd.sock

## Assign a PriorityClassName to pods if set
priorityClassName: ""

# ====================================================================== #
# Cluster-Specific Overrides Reference
# ====================================================================== #
# Copy the relevant sections below into your cluster values file:
#   addons-clusters-values/<cluster-name>.yaml
#
# anodot:
#   config:
#     clusterName: <cluster-name>
#     clusterRegion: <aws-region>
#   serviceAccount:
#     annotations:
#       eks.amazonaws.com/role-arn: arn:aws:iam::<accountId>:role/anodot-<clusterName>-<region>