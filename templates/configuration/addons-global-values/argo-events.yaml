# ====================================================================== #
# Argo Events Global Values
# ====================================================================== #
# Chart: argo-events
# Repo: https://argoproj.github.io/argo-helm
# Namespace: argo-workflows
# Docs: https://argoproj.github.io/argo-events/
#
# These values apply to ALL clusters unless overridden per-cluster
# in addons-clusters-values/<cluster-name>.yaml
#
# Argo Events provides event-driven workflow automation —
# triggers Argo Workflows based on webhooks, S3 events, Kafka, etc.
# ====================================================================== #

# ---- CRDs ---- #
crds:
  # Install CRDs with the chart
  install: true
  # Keep CRDs when uninstalling
  keep: true

# ---- Controller ---- #
controller:
  # Number of controller replicas
  replicas: 1

  rbac:
    enabled: true
    # false = cluster-wide, true = single namespace only
    namespaced: false

  # Resources (based on upstream chart recommendations)
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 512Mi

  # Pod scheduling
  # nodeSelector: {}
  # tolerations: []
  # affinity: {}
  # topologySpreadConstraints: []
  # priorityClassName: ""

  # Container security
  # containerSecurityContext:
  #   capabilities:
  #     drop:
  #       - ALL
  #   readOnlyRootFilesystem: true
  #   runAsNonRoot: true

  # Metrics (enable for Prometheus scraping)
  metrics:
    enabled: false
    # service:
    #   servicePort: 8082

  # Pod Disruption Budget
  pdb:
    enabled: false
    # minAvailable: 1

  serviceAccount:
    create: true
    annotations: {}

# ---- Event Bus (JetStream / NATS) ---- #
# Default config for the JetStream-based event bus
# Can be overridden per EventBus CR
configs:
  jetstream:
    settings:
      # Max memory storage (-1 = unlimited)
      maxMemoryStore: -1
      # Max file storage (-1 = unlimited)
      maxFileStore: -1
    streamConfig:
      # Max messages before expiring oldest
      maxMsgs: 1000000
      # Max age of messages
      maxAge: 72h
      # Max total size of messages (0 = unlimited)
      maxBytes: 1GB
      # Number of replicas (min 3 for durability)
      replicas: 3
      # Dedup window
      duplicates: 300s
      # 0: Limits, 1: Interest, 2: WorkQueue
      retention: 0
      # 0: DiscardOld, 1: DiscardNew
      discard: 0

# ---- Admission Webhook ---- #
webhook:
  # Enable validation webhook (cluster-wide install only)
  enabled: false
  # replicas: 1
  # resources: {}

# ---- Global Security ---- #
# global:
#   securityContext:
#     runAsNonRoot: true
#     runAsUser: 9731
#     runAsGroup: 9731
#     fsGroup: 9731

# ====================================================================== #
