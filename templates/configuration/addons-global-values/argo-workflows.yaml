# ====================================================================== #
# Argo Workflows Global Values
# ====================================================================== #
# Chart: argo-workflows
# Repo: https://argoproj.github.io/argo-helm
# Docs: https://argo-workflows.readthedocs.io/
#
# These values apply to ALL clusters unless overridden per-cluster
# in addons-clusters-values/<cluster-name>.yaml
#
# Argo Workflows is a container-native workflow engine for K8s.
# Runs DAG and step-based workflows as Kubernetes pods.
# ====================================================================== #

# ---- CRDs ---- #
crds:
  install: true
  keep: true

# ---- Scope ---- #

# false = cluster-wide, true = namespaced (strict access clusters)
singleNamespace: false

# Aggregate ClusterRoles for kubectl access to Workflow CRDs
createAggregateRoles: true

# ---- Workflow Service Account ---- #
# SA used to run workflows (not the controller SA)
workflow:
  serviceAccount:
    create: false           # Typically pre-created by teams
    name: "argo-workflow"   # Referenced by workflows
  rbac:
    create: true

# ---- Controller ---- #
controller:
  replicas: 1

  # Max concurrent workflows (unset = unlimited)
  # parallelism:

  # Namespaces the controller manages (cluster-wide mode)
  workflowNamespaces:
    - default

  # Security context
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Resources (based on Argo project recommendations)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

  # Pod scheduling
  nodeSelector:
    kubernetes.io/os: linux
  # tolerations: []
  # affinity: {}
  # topologySpreadConstraints: []
  # priorityClassName: ""

  logging:
    level: info       # debug, info, warn, error
    format: "text"    # text, json

  # Metrics (enable for Prometheus)
  metricsConfig:
    enabled: false
    # port: 9090
    # path: /metrics

  # Pod Disruption Budget
  pdb:
    enabled: false
    # minAvailable: 1

  # Workflow archive (persist completed workflows to DB)
  # persistence: {}
  #   postgresql:
  #     host: localhost
  #     port: 5432
  #     database: postgres

  # Workflow retention policy
  # retentionPolicy:
  #   completed: 10
  #   failed: 3
  #   errored: 3

  # Emit K8s events on workflow/node completion (can fill etcd on busy clusters)
  nodeEvents:
    enabled: true
  workflowEvents:
    enabled: true

  serviceAccount:
    create: true

# ---- Server (UI) ---- #
server:
  enabled: true
  replicas: 1

  # Security context
  securityContext:
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Service
  serviceType: ClusterIP
  servicePort: 2746

  # Resources (server is stateless, lighter than controller)
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

  # Pod scheduling
  nodeSelector:
    kubernetes.io/os: linux
  # tolerations: []
  # affinity: {}
  # priorityClassName: ""

  # Authentication (server = no auth, client = kubeconfig, sso = OIDC)
  # authModes: []

  # Ingress
  # ingress:
  #   enabled: false
  #   ingressClassName: ""
  #   hosts: []

  # SSO / OIDC
  # sso:
  #   enabled: false
  #   issuer: https://accounts.google.com

  logging:
    level: info
    format: "text"

  pdb:
    enabled: false

  serviceAccount:
    create: true

# ---- Artifact Storage ---- #
# Where workflow outputs/logs are stored
useStaticCredentials: true
artifactRepository:
  archiveLogs: false
  # s3:
  #   bucket: my-bucket
  #   endpoint: s3.amazonaws.com
  #   region: eu-west-1
  #   useSDKCreds: true

# ---- Executor (init/wait containers in workflow pods) ---- #
# executor:
#   resources: {}

# ====================================================================== #
# Cluster-Specific Overrides Reference
# ====================================================================== #
# Copy the relevant sections below into your cluster values file:
#   addons-clusters-values/<cluster-name>.yaml
#
# argo-workflows:
#   controller:
#     # Override resources per cluster
#     resources:
#       requests:
#         cpu: 100m
#         memory: 128Mi
#       limits:
#         memory: 512Mi
#     # Limit workflow parallelism on smaller clusters
#     parallelism: 50
#     # Manage specific namespaces
#     workflowNamespaces:
#       - default
#       - my-team
#   server:
#     # Override resources per cluster
#     resources: {}
#     # Enable ingress on specific clusters
#     ingress:
#       enabled: true
#       hosts:
#         - argo-workflows.<cluster>.example.com
#     # Authentication
#     authModes:
#       - sso
