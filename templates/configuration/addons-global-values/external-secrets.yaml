# ====================================================================== #
# External Secrets Operator (ESO) Global Values
# ====================================================================== #
# Chart: external-secrets
# Repo: https://charts.external-secrets.io
# Docs: https://external-secrets.io/latest/
#
# These values apply to ALL clusters unless overridden per-cluster
# in addons-clusters-values/<cluster-name>.yaml
#
# NOTE: The IRSA role ARN for the ESO service account is injected
# automatically per-cluster via the eso.valuesObject helper in the
# ApplicationSet template. No need to set it here.
# NOTE: The ClusterSecretStore is deployed as a separate multi-source
# chart (charts/eso-configuration) alongside ESO.
# ====================================================================== #

# Deploy into a dedicated namespace
namespaceOverride: external-secrets

# ---- Operator Deployment ---- #

# Number of operator pod replicas (set to 2+ for HA in production)
replicaCount: 1

# Number of ExternalSecret reconciliations running in parallel
# Increase if you have many ExternalSecrets and sync is slow
# concurrent: 1

# Enable leader election (required when replicaCount > 1)
# leaderElect: false

# ---- CRDs ---- #

# Install/upgrade CRDs via Helm (disable if managing CRDs separately)
installCRDs: true

# Control which CRD types are created
# crds:
#   createClusterExternalSecret: true
#   createClusterSecretStore: true
#   createPushSecret: true

# ---- Scope & RBAC ---- #

# Restrict ESO to only reconcile secrets in a specific namespace
# (leave empty for cluster-wide operation)
# scopedNamespace: ""

# Create scoped RBAC instead of cluster-wide (pair with scopedNamespace)
# scopedRBAC: false

# Process cluster-scoped resources (ClusterSecretStore, ClusterExternalSecret)
# processClusterStore: true
# processClusterExternalSecret: true

# ---- Service Account ---- #
serviceAccount:
  create: true
  # Annotations are injected per-cluster by the ApplicationSet template
  # (IRSA role ARN for AWS Secrets Manager access)
  annotations: {}

# ---- Webhook (validates ExternalSecret resources) ---- #
# webhook:
#   create: true
#   replicaCount: 1
#   # What happens when the webhook is unavailable (Fail = block, Ignore = allow)
#   failurePolicy: Fail
#   # Use cert-manager for webhook TLS instead of built-in cert controller
#   certManager:
#     enabled: false
#   resources: {}
#   #   requests:
#   #     cpu: 50m
#   #     memory: 64Mi
#   #   limits:
#   #     memory: 128Mi

# ---- Certificate Controller ---- #
# Manages TLS certificates for the webhook (not needed if using cert-manager)
# certController:
#   create: true
#   replicaCount: 1
#   # How often to re-validate certificates
#   requeueInterval: 5m
#   resources: {}

# ---- Operator Resources ---- #
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

# ---- Pod Scheduling ---- #
# nodeSelector: {}
# tolerations: []
# affinity: {}
# topologySpreadConstraints: []

# Priority class to ensure ESO pods survive resource pressure
# priorityClassName: ""

# ---- Pod Disruption Budget ---- #
# podDisruptionBudget:
#   enabled: false
#   minAvailable: 1

# ---- Logging ---- #
# log:
#   level: info       # debug, info, warn, error
#   timeEncoding: epoch  # epoch, millis, nano, iso8601

# ---- Metrics / Monitoring ---- #
# ESO metrics collection is configured on the HOST cluster only (via ArgoFleet bootstrap),
# not on remote clusters. Remote clusters' ESO just fetches Datadog secrets —
# if that fails, the addon deployment monitors catch it.
# serviceMonitor:
#   enabled: false
#   interval: 30s
# metrics:
#   listen:
#     port: 8080
#   service:
#     enabled: false

# ====================================================================== #
# Cluster-Specific Overrides Reference
# ====================================================================== #
# Copy the relevant sections below into your cluster values file:
#   addons-clusters-values/<cluster-name>.yaml
#
# NOTE: IRSA role ARN is injected automatically by the ApplicationSet
# template (eso.valuesObject helper). The section below is only needed
# if you want to override other per-cluster settings.
#
# external-secrets:
#   serviceAccount:
#     annotations:
#       eks.amazonaws.com/role-arn: "arn:aws:iam::<accountId>:role/EKS-ESO-<clusterName>"
