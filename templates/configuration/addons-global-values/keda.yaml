# ====================================================================== #
# KEDA Global Values
# ====================================================================== #
# Chart: keda
# Repo: https://kedacore.github.io/charts
# Version: 2.14.2
# Docs: https://keda.sh/docs/
#
# These values apply to ALL clusters unless overridden per-cluster
# in addons-clusters-values/<cluster-name>.yaml
#
# KEDA (Kubernetes Event-Driven Autoscaling) extends HPA with
# event-driven scaling from 0-to-N based on external metrics
# (SQS, Kafka, Prometheus, Cron, etc.).
# ====================================================================== #

# ---- CRDs ---- #
crds:
  install: true

# ---- Operator ---- #
operator:
  replicaCount: 1

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 1
      memory: 1000Mi

  # Logging
  logging:
    level: info
    format: console
    timeEncoding: rfc3339

  # Pod scheduling
  # nodeSelector: {}
  # tolerations: []
  # affinity: {}
  # topologySpreadConstraints: []

# ---- Metrics Server ---- #
metricsServer:
  replicaCount: 1

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 1
      memory: 1000Mi

  # Logging
  # logging:
  #   level: 0

  # Pod scheduling
  # nodeSelector: {}
  # tolerations: []
  # affinity: {}

# ---- Admission Webhooks ---- #
webhooks:
  enabled: true
  replicaCount: 1
  failurePolicy: Ignore

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 1
      memory: 1000Mi

  # Pod scheduling
  # nodeSelector: {}
  # tolerations: []

# ---- Service Account ---- #
serviceAccount:
  operator:
    create: true
    name: keda-operator-sa
    annotations: {}
  metricServer:
    create: true
    annotations: {}
  webhooks:
    create: true
    annotations: {}

# ---- RBAC ---- #
rbac:
  create: true
  # aggregateToDefaultRoles: false

# ---- Security ---- #
# All components enforce: drop ALL caps, no privilege escalation,
# read-only root FS, RuntimeDefault seccomp, runAsNonRoot.
# Chart defaults are secure — only override if needed.

# ---- Certificates ---- #
certificates:
  autoGenerated: true
  # cert-manager integration:
  # certManager:
  #   enabled: false
  #   generateCA: true

# ---- Prometheus ---- #
# prometheus:
#   metricServer:
#     enabled: false
#     serviceMonitor:
#       enabled: false
#   operator:
#     enabled: false
#     serviceMonitor:
#       enabled: false
#   webhooks:
#     enabled: false

# ---- Pod Disruption Budget ---- #
# podDisruptionBudget:
#   operator: {}
#   metricServer: {}
#   webhooks: {}

# ---- Network Policy ---- #
# networkPolicy:
#   enabled: false

# ====================================================================== #
# Cluster-Specific Overrides Reference
# ====================================================================== #
# Copy the relevant sections below into your cluster values file:
#   addons-clusters-values/<cluster-name>.yaml
#
# keda:
#   operator:
#     # Override resources per cluster
#     resources:
#       requests:
#         cpu: 200m
#         memory: 256Mi
#       limits:
#         cpu: 1
#         memory: 1000Mi
#   metricsServer:
#     resources:
#       requests:
#         cpu: 200m
#         memory: 256Mi
#   # IRSA for AWS scalers (SQS, CloudWatch, etc.)
#   serviceAccount:
#     operator:
#       annotations:
#         eks.amazonaws.com/role-arn: arn:aws:iam::<accountId>:role/keda-<clusterName>
#   # Enable Prometheus metrics per cluster
#   prometheus:
#     operator:
#       enabled: true
#       serviceMonitor:
#         enabled: true
