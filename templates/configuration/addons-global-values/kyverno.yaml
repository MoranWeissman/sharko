# ====================================================================== #
# Kyverno Global Values
# ====================================================================== #
# Chart: kyverno
# Repo: https://kyverno.github.io/kyverno
# Version: 3.3.4
# Docs: https://kyverno.io/docs/
#
# These values apply to ALL clusters unless overridden per-cluster
# in addons-clusters-values/<cluster-name>.yaml
#
# Kyverno is a Kubernetes-native policy engine. It validates, mutates,
# generates, and cleans up resources using policies as K8s resources.
# ====================================================================== #

# ---- CRDs ---- #
crds:
  install: true

# ---- Features ---- #
features:
  admissionReports:
    enabled: true
  policyReports:
    enabled: true
  autoUpdateWebhooks:
    enabled: true
  logging:
    format: text
    verbosity: 2
  # omitEvents:
  #   - PolicyApplied
  #   - PolicySkipped

# ---- Config ---- #
config:
  # Include specific namespaces for policy enforcement
  resourceFiltersIncludeNamespaces:
    - "[*/*,argocd,*]"
    - "[*/*,akuity,*]"
    - "[*/*,datadog,*]"
    - "[*/*,amazon-guardduty,*]"
    - "[*/*,external-secrets,*]"

  # Additional resource filters (chart ships with sensible defaults:
  # Events, Nodes, APIServices, TokenReviews, kyverno own resources, etc.)
  # resourceFiltersExclude: []

# ---- Metrics Config ---- #
metricsConfig:
  namespaces:
    exclude:
      - argocd
      - akuity
      - datadog
      - amazon-guardduty
      - external-secrets

# ---- Admission Controller ---- #
admissionController:
  replicas: 1

  # Resources
  container:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 384Mi

  # Security (chart defaults are hardened: drop ALL, no escalation,
  # read-only root FS, seccomp RuntimeDefault, runAsNonRoot)

  # Pod scheduling
  # nodeSelector: {}
  # tolerations: []
  # topologySpreadConstraints: []

  # Pod Disruption Budget
  # podDisruptionBudget:
  #   minAvailable: 1

  # Service Monitor
  # serviceMonitor:
  #   enabled: false

# ---- Background Controller ---- #
backgroundController:
  # Background scanning interval and workers
  # backgroundScan:
  #   interval: 1h
  #   workers: 2

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      memory: 128Mi

  serviceMonitor:
    interval: "1m"

  # nodeSelector: {}
  # tolerations: []

# ---- Cleanup Controller ---- #
cleanupController:
  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      memory: 128Mi

  # nodeSelector: {}
  # tolerations: []

# ---- Reports Controller ---- #
reportsController:
  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      memory: 128Mi

  # nodeSelector: {}
  # tolerations: []

# ---- ArgoCD Resource Exclusions ---- #
# Exclude Kyverno reports from ArgoCD diff to avoid noise
resource:
  exclusions: |
    - apiGroups:
        - kyverno.io
      kinds:
        - AdmissionReport
        - BackgroundScanReport
        - ClusterAdmissionReport
        - ClusterBackgroundScanReport
      clusters:
        - '*'
  compareoptions:
    ignoreAggregatedRoles: true

# ---- Webhooks Cleanup ---- #
# webhooksCleanup:
#   enabled: true

# ---- Network Policy ---- #
# networkPolicy:
#   enabled: false

# ====================================================================== #
