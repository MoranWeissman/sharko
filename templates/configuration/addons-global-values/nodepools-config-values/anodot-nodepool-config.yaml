# ---- Anodot EKS Auto Mode infra-karpenter Overrides ---- #
#
# IMPORTANT: The Anodot agent DaemonSet must run on ALL nodes (not just infrastructure)
# because it collects cost and resource metrics from pods on every node.
# Only add toleration (no nodeSelector) so it schedules everywhere.
#
# Components and their scheduling:
#   agent DaemonSet    → ALL nodes (no nodeSelector, only toleration)
#

# Anodot Agent DaemonSet - must run on ALL nodes
tolerations:
  - key: infrastructure
    operator: Equal
    value: "true"
    effect: NoSchedule
