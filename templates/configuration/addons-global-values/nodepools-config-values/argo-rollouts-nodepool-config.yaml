# ---- Argo Rollouts EKS Auto Mode infra-karpenter Overrides ---- #
#
# Components and their scheduling:
#   controller    → infrastructure nodes (nodeSelector + toleration)
#

# Rollouts Controller
controller:
  nodeSelector:
    node-type: infrastructure
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule
