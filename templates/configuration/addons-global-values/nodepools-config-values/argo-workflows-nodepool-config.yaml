# ---- Argo Workflows EKS Auto Mode infra-karpenter Overrides ---- #
#
# Components and their scheduling:
#   controller    → infrastructure nodes (nodeSelector + toleration)
#   server        → infrastructure nodes (nodeSelector + toleration)
#

# Workflow Controller
controller:
  nodeSelector:
    node-type: infrastructure
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule

# Argo Server (UI)
server:
  nodeSelector:
    node-type: infrastructure
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule
