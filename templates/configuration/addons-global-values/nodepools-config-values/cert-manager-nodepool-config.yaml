# ---- Cert-Manager EKS Auto Mode infra-karpenter Overrides ---- #
#
# Components and their scheduling:
#   controller    → infrastructure nodes (nodeSelector + toleration)
#   webhook       → infrastructure nodes (nodeSelector + toleration)
#   cainjector    → infrastructure nodes (nodeSelector + toleration)
#

# Cert-Manager Controller
nodeSelector:
  node-type: infrastructure
tolerations:
  - key: infrastructure
    operator: Equal
    value: "true"
    effect: NoSchedule

# Webhook
webhook:
  nodeSelector:
    node-type: infrastructure
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule

# CA Injector
cainjector:
  nodeSelector:
    node-type: infrastructure
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule

# Startup API Check (Job)
startupapicheck:
  nodeSelector:
    node-type: infrastructure
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule
