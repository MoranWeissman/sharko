# ---- Datadog EKS Auto Mode infra-karpenter Overrides ---- #
#
# IMPORTANT: Datadog agent DaemonSet is an EXCEPTION to the infrastructure-node pattern.
# Unlike other addons, the agent DaemonSet must run on ALL nodes (not just infrastructure)
# because it collects logs and metrics from pods on every node. Restricting it to
# infrastructure nodes means no log/metric collection from workload nodes.
#
# Components and their scheduling:
#   agents (DaemonSet)   → ALL nodes (no nodeSelector, only toleration)
#   clusterAgent         → infrastructure nodes only (nodeSelector + toleration)
#   datadog-operator     → infrastructure nodes only (nodeSelector + toleration)
#

# Datadog Agent DaemonSet - must run on ALL nodes for log/metric collection
# Only add toleration (no nodeSelector) so it schedules everywhere
agents:
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule

# Cluster Agent - target infrastructure nodes
clusterAgent:
  nodeSelector:
    node-type: infrastructure
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule

# Datadog Operator - target infrastructure nodes (subchart values)
datadog-operator:
  nodeSelector:
    node-type: infrastructure
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule
