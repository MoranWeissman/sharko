# ---- Istio Ingress Gateway EKS Auto Mode infra-karpenter Overrides ---- #
#
# Components and their scheduling:
#   gateway    → infrastructure nodes (nodeSelector + toleration)
#

# Istio Ingress Gateway
nodeSelector:
  node-type: infrastructure
tolerations:
  - key: infrastructure
    operator: Equal
    value: "true"
    effect: NoSchedule
