# ---- Secrets Store CSI Driver EKS Auto Mode infra-karpenter Overrides ---- #
#
# IMPORTANT: The CSI driver DaemonSet must run on ALL nodes (not just infrastructure)
# because pods on any node may need to mount secrets via the CSI driver.
# Only add toleration (no nodeSelector) so it schedules everywhere.
#
# Components and their scheduling:
#   linux DaemonSet    → ALL nodes (no nodeSelector, only toleration)
#

# CSI Driver DaemonSet - must run on ALL nodes
linux:
  tolerations:
    - key: infrastructure
      operator: Equal
      value: "true"
      effect: NoSchedule
