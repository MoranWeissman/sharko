# ====================================================================== #
# RedisInsight Global Values
# ====================================================================== #
# Chart: redisinsight
# Repo: https://your-org.github.io/redisinsight-chart
# Docs: https://redis.io/docs/connect/insight/
#
# These values apply to ALL clusters unless overridden per-cluster
# in addons-clusters-values/<cluster-name>.yaml
#
# RedisInsight is a Redis management UI for monitoring and debugging.
# This is an internal Helm chart hosted on S3.
# ====================================================================== #

# Refer to the chart's values.yaml in the S3 repo for available options.

# ---- Resources ---- #
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# ====================================================================== #
# Cluster-Specific Overrides Reference
# ====================================================================== #
# Copy the relevant sections below into your cluster values file:
#   addons-clusters-values/<cluster-name>.yaml
#
# redisinsight:
#   # Ingress for cluster-specific hostname
#   ingress:
#     enabled: true
#     host: redisinsight.<cluster>.example.com
#   # Resources override
#   resources:
#     requests:
#       cpu: 100m
#       memory: 128Mi
