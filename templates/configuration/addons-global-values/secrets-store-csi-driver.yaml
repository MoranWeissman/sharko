# ====================================================================== #
# Secrets Store CSI Driver Global Values
# ====================================================================== #
# Chart: secrets-store-csi-driver
# Repo: https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
# Docs: https://secrets-store-csi-driver.sigs.k8s.io/
#
# These values apply to ALL clusters unless overridden per-cluster
# in addons-clusters-values/<cluster-name>.yaml
#
# Mounts secrets from external stores (AWS Secrets Manager, etc.)
# as volumes into pods. Used together with sscdp-aws provider.
# ====================================================================== #

# ---- Sync as K8s Secrets ---- #
# Create K8s Secret objects mirroring the mounted secrets
syncSecret:
  enabled: true

# ---- Secret Rotation ---- #
# Automatically rotate secrets when they change in the external store
enableSecretRotation: true

# ---- Linux DaemonSet ---- #
linux:
  # CRDs bundled with the driver
  crds:
    enabled: true
  driver:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 200Mi
  # Tolerations (default: run on all nodes)
  # tolerations:
  #   - operator: "Exists"
  # nodeSelector: {}

# ---- Windows (disabled) ---- #
# windows:
#   enabled: false

# ====================================================================== #
# Cluster-Specific Overrides Reference
# ====================================================================== #
# Copy the relevant sections below into your cluster values file:
#   addons-clusters-values/<cluster-name>.yaml
#
# secrets-store-csi-driver:
#   # Override rotation interval per cluster
#   rotationPollInterval: 2m
#   linux:
#     driver:
#       resources:
#         requests:
#           cpu: 50m
#           memory: 100Mi
#         limits:
#           cpu: 200m
#           memory: 200Mi
