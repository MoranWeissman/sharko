# ====================================================================== #
# Secrets Store CSI Driver Provider AWS Global Values
# ====================================================================== #
# Chart: secrets-store-csi-driver-provider-aws
# Repo: https://aws.github.io/secrets-store-csi-driver-provider-aws
# Version: 0.3.11
# Docs: https://github.com/aws/secrets-store-csi-driver-provider-aws
#
# These values apply to ALL clusters unless overridden per-cluster
# in addons-clusters-values/<cluster-name>.yaml
#
# AWS provider for the Secrets Store CSI Driver. Runs as a DaemonSet
# and fetches secrets from AWS Secrets Manager / SSM Parameter Store.
# ====================================================================== #

# ---- Sub-chart: secrets-store-csi-driver ---- #
# Disable the bundled CSI driver — we install it as a separate addon
secrets-store-csi-driver:
  install: false

# ---- RBAC ---- #
rbac:
  install: true

# ---- Resources ---- #
resources:
  requests:
    cpu: 50m
    memory: 100Mi
  limits:
    cpu: 50m
    memory: 100Mi

# ---- Security ---- #
# DaemonSet pods run unprivileged by default
# privileged: false
# allowPrivilegeEscalation: false

# ---- Storage Paths ---- #
# providerVolume: /etc/kubernetes/secrets-store-csi-providers
# kubeletPath: /var/lib/kubelet

# ---- Update Strategy ---- #
# updateStrategy: RollingUpdate

# ---- Pod Scheduling ---- #
# nodeSelector: {}
# tolerations: []
# affinity: {}
# priorityClassName: ""

# ---- FIPS ---- #
# useFipsEndpoint: false

# ====================================================================== #
# Cluster-Specific Overrides Reference
# ====================================================================== #
# Copy the relevant sections below into your cluster values file:
#   addons-clusters-values/<cluster-name>.yaml
#
# sscdp-aws:
#   # Override resources per cluster
#   resources:
#     requests:
#       cpu: 50m
#       memory: 100Mi
#     limits:
#       cpu: 100m
#       memory: 200Mi
#   # Node scheduling (e.g. for Bottlerocket or custom kubelet paths)
#   tolerations: []
#   kubeletPath: /var/lib/kubelet
