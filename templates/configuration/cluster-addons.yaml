# ================================================================ #
# Clusters and Addons Management
# ================================================================ #
# Add or remove clusters and assign addons via labels
#
# Structure:
#   - name: cluster-name              # Required: EKS cluster name
#     labels:                         # Required: addon assignments
#       <addon-name>: enabled         # Enable addon with default version
#       <addon-name>-version: "X.Y.Z" # Override addon version
#
# Note: AWS Secrets Manager secret name is automatically prefixed with "k8s-"
#       Example: cluster name "feedlot-dev" → secret "k8s-feedlot-dev"
#
# Example cluster configuration
# - name: cluster-name
#   labels:
#     datadog: enabled
#     datadog-version: "3.70.7"
#
# See docs/VALUES_GUIDE.md for detailed documentation
# ================================================================ #

