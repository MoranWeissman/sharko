# ================================================================ #
# Datadog API Key Project Name Mappings
# ================================================================ #
# This file maps cluster names to their Datadog project names and environments
# for API key lookups in AWS Secrets Manager.
#
# Purpose: Datadog API keys are stored in AWS Secrets Manager secret
# "datadog-api-keys-integration" with JSON properties following the pattern:
#   {
#     "<projectName>-<env>": "dd-api-key-value",
#     "my-app-dev": "...",
#     "my-service-staging": "...",
#     ...
#   }
#
# How it works:
# 1. Each cluster values file sets clusterGlobalValues.projectName and
#    clusterGlobalValues.env
# 2. The datadog-apikey chart uses these values to construct the property
#    name: "{projectName}-{env}"
# 3. An ExternalSecret fetches the API key from AWS Secrets Manager
# 4. Datadog reads the API key from the resulting K8s secret
#
# Since cluster names don't always match project names (e.g., "my-svc-dev-eks"
# belongs to project "my-service"), each cluster values file must set the correct
# projectName in clusterGlobalValues.
#
# When adding a new cluster:
# 1. Set clusterGlobalValues.projectName and env in the cluster values file
# 2. Ensure AWS Secrets Manager secret "datadog-api-keys-integration" contains
#    a JSON property: "<projectName>-<env>": "api-key-value"
# ================================================================ #

datadogProjectMappings:
  # Example: cluster name -> Datadog project mapping
  cluster-dev-eks:
    projectName: my-app
    env: dev

  cluster-staging-eks:
    projectName: my-app
    env: staging

  # Example: when cluster name differs from project name
  # my-svc-dev-eks:
  #   projectName: my-service
  #   env: dev

  # Example: management cluster
  your-argocd-cluster:
    projectName: argocd-cluster-addons
    env: dev
