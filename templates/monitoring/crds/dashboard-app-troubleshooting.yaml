apiVersion: datadoghq.com/v1alpha1
kind: DatadogDashboard
metadata:
  name: app-troubleshooting
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  title: "ArgoCD Cluster Addons Application Troubleshooting"
  description: "Deep-dive troubleshooting for specific ArgoCD Applications — sync history, reconciliation, error logs"
  layoutType: ordered
  tags:
    - "platform:devex"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-appops"
  notifyList: []
  templateVariables:
    - name: cluster_name
      prefix: kube_cluster_name
      availableValues:
        - your-argocd-cluster
      default: "your-argocd-cluster"
    - name: environment
      prefix: env
      availableValues: []
      default: "*"
    - name: app_name
      prefix: name
      availableValues: []
      default: "*"
  widgets: |
    [
      {"id":2000000001,"definition":{"title":"Application Status","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"id":2000000002,"definition":{"title":"Health Status","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"avg:argocd.app_controller.app.info{$cluster_name,$app_name,$environment} by {health_status}","aggregator":"last"}],"formulas":[{"formula":"q1"}]}],"autoscale":false,"precision":0},"layout":{"x":0,"y":0,"width":3,"height":2}},
        {"id":2000000003,"definition":{"title":"Sync Status","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"avg:argocd.app_controller.app.info{$cluster_name,$app_name,$environment} by {sync_status}","aggregator":"last"}],"formulas":[{"formula":"q1"}]}],"autoscale":false,"precision":0},"layout":{"x":3,"y":0,"width":3,"height":2}},
        {"id":2000000004,"definition":{"title":"Syncs Succeeded (24h)","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:argocd.app_controller.app.sync.count{$cluster_name,phase:succeeded,$app_name,$environment}.as_count()","aggregator":"sum"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":">","value":0,"palette":"white_on_green"}]}]}],"autoscale":true,"precision":0,"time":{"live_span":"1d"}},"layout":{"x":6,"y":0,"width":3,"height":2}},
        {"id":2000000005,"definition":{"title":"Syncs Failed (24h)","type":"query_value","requests":[{"response_format":"scalar","queries":[{"name":"q1","data_source":"metrics","query":"sum:argocd.app_controller.app.sync.count{$cluster_name,phase:error,$app_name,$environment}.as_count()","aggregator":"sum"}],"formulas":[{"formula":"default_zero(q1)","conditional_formats":[{"comparator":"=","value":0,"palette":"white_on_green"},{"comparator":">","value":0,"palette":"white_on_red"}]}]}],"autoscale":true,"precision":0,"time":{"live_span":"1d"}},"layout":{"x":9,"y":0,"width":3,"height":2}}
      ]},"layout":{"x":0,"y":0,"width":12,"height":4}},

      {"id":2000000010,"definition":{"title":"Sync History","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"id":2000000011,"definition":{"title":"Sync Operations Over Time","show_legend":true,"legend_layout":"auto","time":{"live_span":"1d"},"type":"timeseries","requests":[{"response_format":"timeseries","queries":[{"name":"succeeded","data_source":"metrics","query":"sum:argocd.app_controller.app.sync.count{$cluster_name,phase:succeeded,$app_name,$environment}.as_count()"},{"name":"failed","data_source":"metrics","query":"sum:argocd.app_controller.app.sync.count{$cluster_name,phase:error,$app_name,$environment}.as_count()"}],"formulas":[{"alias":"Succeeded","formula":"succeeded","style":{"palette":"green"}},{"alias":"Failed","formula":"failed","style":{"palette":"red"}}],"style":{"palette":"dog_classic","line_type":"solid","line_width":"normal"},"display_type":"bars"}],"yaxis":{"include_zero":true,"min":"0"}},"layout":{"x":0,"y":0,"width":12,"height":3}},
        {"id":2000000012,"definition":{"title":"Health Status Timeline","show_legend":true,"legend_layout":"auto","time":{"live_span":"1d"},"type":"timeseries","requests":[{"response_format":"timeseries","queries":[{"name":"q1","data_source":"metrics","query":"avg:argocd.app_controller.app.info{$cluster_name,$app_name,$environment} by {health_status}"}],"formulas":[{"formula":"q1"}],"style":{"palette":"dog_classic","line_type":"solid","line_width":"normal"},"display_type":"area"}]},"layout":{"x":0,"y":3,"width":12,"height":3}}
      ]},"layout":{"x":0,"y":4,"width":12,"height":8}},

      {"id":2000000020,"definition":{"title":"Reconciliation Performance","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"id":2000000021,"definition":{"title":"Reconciliation Duration","show_legend":true,"legend_layout":"auto","time":{"live_span":"1d"},"type":"timeseries","requests":[{"response_format":"timeseries","queries":[{"name":"p50","data_source":"metrics","query":"p50:argocd.app_controller.app.reconcile{$cluster_name,$app_name,$environment}"},{"name":"p95","data_source":"metrics","query":"p95:argocd.app_controller.app.reconcile{$cluster_name,$app_name,$environment}"},{"name":"p99","data_source":"metrics","query":"p99:argocd.app_controller.app.reconcile{$cluster_name,$app_name,$environment}"}],"formulas":[{"alias":"p50","formula":"p50"},{"alias":"p95","formula":"p95"},{"alias":"p99","formula":"p99"}],"style":{"palette":"purple","line_type":"solid","line_width":"normal"},"display_type":"line"}],"yaxis":{"include_zero":true,"min":"0"},"markers":[{"label":"Warning (10s)","value":"y = 10","display_type":"warning dashed"},{"label":"Critical (30s)","value":"y = 30","display_type":"error dashed"}]},"layout":{"x":0,"y":0,"width":6,"height":3}},
        {"id":2000000022,"definition":{"title":"Reconciliation Count","show_legend":false,"time":{"live_span":"1d"},"type":"timeseries","requests":[{"response_format":"timeseries","queries":[{"name":"q1","data_source":"metrics","query":"sum:argocd.app_controller.app.reconcile.count{$cluster_name,$app_name,$environment}.as_count()"}],"formulas":[{"alias":"Reconciliations","formula":"q1"}],"style":{"palette":"dog_classic","line_type":"solid","line_width":"normal"},"display_type":"bars"}],"yaxis":{"include_zero":true,"min":"0"}},"layout":{"x":6,"y":0,"width":6,"height":3}}
      ]},"layout":{"x":0,"y":12,"width":12,"height":5}},

      {"id":2000000030,"definition":{"title":"Error Conditions & Logs","show_title":true,"type":"group","layout_type":"ordered","widgets":[
        {"id":2000000031,"definition":{"title":"App Error Conditions","type":"query_table","requests":[{"response_format":"scalar","queries":[{"data_source":"metrics","name":"q1","query":"avg:argocd.app_controller.app.condition{$cluster_name,$app_name,$environment} by {name,condition}","aggregator":"last"}],"formulas":[{"alias":"Active","formula":"q1","conditional_formats":[{"comparator":">=","value":1,"palette":"white_on_red"},{"comparator":"<","value":1,"palette":"white_on_green"}]}]}]},"layout":{"x":0,"y":0,"width":12,"height":3}},
        {"id":2000000032,"definition":{"title":"ArgoCD Controller Error Logs","requests":[{"response_format":"event_list","query":{"data_source":"logs_stream","query_string":"source:argocd status:error $app_name $cluster_name $environment","event_size":"s"},"columns":[]}],"type":"list_stream","time":{"live_span":"1d"}},"layout":{"x":0,"y":3,"width":12,"height":4}},
        {"id":2000000033,"definition":{"title":"Kubernetes Events","requests":[{"response_format":"event_list","query":{"data_source":"event_stream","query_string":"source:kubernetes status:error $app_name $cluster_name $environment","event_size":"s"},"columns":[]}],"type":"list_stream","time":{"live_span":"1d"}},"layout":{"x":0,"y":7,"width":12,"height":4}}
      ]},"layout":{"x":0,"y":17,"width":12,"height":13}}
    ]
