apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: appops-health-degraded
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Application Operations] Application health degraded"
  type: query alert
  query: "avg(last_15m):count:argocd.app_controller.app.info{health_status:degraded,kube_cluster_name:your-argocd-cluster} by {name,dest_server} > 0"
  message: |-
    {{#is_alert}}
    🔴 [P2 WARNING] Application {{name.name}} is Degraded on {{dest_server.name}}

    The application has been in Degraded health status for more than 15 minutes.
    This means deployed resources are not healthy.

    Actions:
    1. Open Application Troubleshooting dashboard filtered to {{name.name}}
    2. Check app status: argocd app get {{name.name}}
    3. Review resource health: argocd app resources {{name.name}}
    4. Check controller logs for errors related to this app
    {{/is_alert}}
    {{#is_recovery}}
    ✅ RECOVERED: Application {{name.name}} is healthy on {{dest_server.name}}
    {{/is_recovery}}

    @team@example.com @slack-platform-alerts
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-appops"
  priority: 2
  options:
    thresholds:
      critical: "0"
    notifyAudit: false
    onMissingData: default
    includeTags: true
    newGroupDelay: 300
