apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: appops-queue-depth-growing
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Application Operations] Work queue depth growing"
  type: query alert
  query: "avg(last_15m):avg:argocd.app_controller.workqueue.depth{kube_cluster_name:your-argocd-cluster} > 100"
  message: |-
    {{#is_alert}}
    🔴 [P1 CRITICAL] ArgoCD work queue depth is above 100

    Queue depth: {{value}}
    The controller is falling behind processing applications. This indicates the controller cannot keep up with the number of apps or reconciliation events.

    Actions:
    1. Check controller pod resources (CPU/memory) on Host Cluster dashboard
    2. Check if reconciliation is slow (p95 duration)
    3. Look for a surge in git changes or ApplicationSet generator changes
    4. Consider scaling controller resources or sharding
    {{/is_alert}}
    {{#is_warning}}
    🟡 [P2 WARNING] ArgoCD work queue depth is above 50

    Queue depth: {{value}}
    The controller is processing slower than normal.
    {{/is_warning}}
    {{#is_recovery}}
    ✅ RECOVERED: Work queue depth is back to normal
    {{/is_recovery}}

    @team@example.com @slack-platform-alerts
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-appops"
  priority: 2
  options:
    thresholds:
      critical: "100"
      warning: "50"
    notifyAudit: false
    onMissingData: default
    includeTags: true
    newGroupDelay: 60
