apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: appops-reconciliation-slow
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Application Operations] Reconciliation slow"
  type: query alert
  query: "avg(last_10m):p95:argocd.app_controller.app.reconcile{kube_cluster_name:devops-argocd-addons-dev-eks} > 30"
  message: |-
    {{#is_alert}}
    🔴 [P1 CRITICAL] Reconciliation p95 is above 30 seconds

    p95 duration: {{value}}s
    The ArgoCD controller is taking too long to reconcile applications.
    This may indicate cluster API slowness, too many resources, or controller resource starvation.

    Actions:
    1. Check controller CPU/memory on the Host Cluster dashboard
    2. Check work queue depth: should not be growing
    3. Review controller logs for timeout errors
    4. Check if specific apps are causing slow reconciliation
    {{/is_alert}}
    {{#is_warning}}
    🟡 [P2 WARNING] Reconciliation p95 is above 10 seconds

    p95 duration: {{value}}s
    Monitor for further degradation.
    {{/is_warning}}
    {{#is_recovery}}
    ✅ RECOVERED: Reconciliation duration is back to normal
    {{/is_recovery}}

    @moran.weissman@msd.com @microsoft-teams-ArgocdClusterAddonsNonProd
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-appops"
  priority: 2
  options:
    thresholds:
      critical: "30"
      warning: "10"
    notifyAudit: false
    onMissingData: default
    includeTags: true
    newGroupDelay: 60
