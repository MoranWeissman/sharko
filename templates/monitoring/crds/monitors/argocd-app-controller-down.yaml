apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: host-cluster-argocd-app-controller-down
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Host Cluster] ArgoCD application-controller pod down"
  type: query alert
  query: "avg(last_5m):avg:kubernetes_state.statefulset.replicas_ready{kube_namespace:argocd,kube_stateful_set:argocd-*-application-cont*} by {kube_cluster_name} < 1"
  message: |-
    {{#is_alert}}
    🔴 [P1 CRITICAL] ArgoCD application-controller is DOWN on {{kube_cluster_name.name}}

    Application sync and reconciliation is completely stopped. All ArgoCD apps are frozen.
    Ready replicas: {{value}}

    Actions:
    1. kubectl get pods -n argocd -l app.kubernetes.io/name=application-controller
    2. kubectl describe pod -n argocd <pod-name>
    3. kubectl logs -n argocd <pod-name> --tail=100
    {{/is_alert}}
    {{#is_recovery}}
    ✅ RECOVERED: ArgoCD application-controller is back on {{kube_cluster_name.name}}
    {{/is_recovery}}
    {{#is_no_data}}
    ⚠️ NO DATA from {{kube_cluster_name.name}} — Cluster Agent may be down
    {{/is_no_data}}

    @team@example.com
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-host"
  priority: 1
  options:
    thresholds:
      critical: "1"
    notifyAudit: false
    onMissingData: show_and_notify_no_data
    includeTags: true
    newGroupDelay: 60
