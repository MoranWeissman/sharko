apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: host-cluster-component-cpu-utilization
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Host Cluster] Component CPU utilization (% of limit)"
  type: query alert
  query: "avg(last_10m):(avg:kubernetes.cpu.usage.total{kube_namespace IN (argocd,external-secrets)} by {kube_cluster_name,kube_namespace,pod_name,kube_container_name} / avg:kubernetes.cpu.limits{kube_namespace IN (argocd,external-secrets)} by {kube_cluster_name,kube_namespace,pod_name,kube_container_name}) * 100 > 95"
  message: |-
    {{#is_alert}}
    🔴 [P1 CRITICAL] {{kube_container_name.name}} CPU at {{value}}% of limit — throttling imminent
    Pod: {{pod_name.name}} | Namespace: {{kube_namespace.name}} | Cluster: {{kube_cluster_name.name}}
    {{/is_alert}}
    {{#is_warning}}
    🟡 [P2 WARNING] {{kube_container_name.name}} CPU above 80% of limit — {{value}}%
    Pod: {{pod_name.name}} | Namespace: {{kube_namespace.name}}
    {{/is_warning}}
    {{#is_recovery}}
    ✅ RECOVERED: {{kube_container_name.name}} CPU is below threshold
    {{/is_recovery}}

    {{#is_alert}}
    Actions:
    1. kubectl top pods -n {{kube_namespace.name}}
    2. Check for unusual workload (large sync batch, many secrets)
    3. Consider increasing CPU limits in Helm values
    {{/is_alert}}

    @moran.weissman@msd.com
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-host"
  priority: 2
  options:
    thresholds:
      critical: "95"
      warning: "80"
    notifyAudit: false
    onMissingData: default
    includeTags: true
    newGroupDelay: 60
