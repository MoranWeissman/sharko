apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: host-cluster-component-memory-utilization
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Host Cluster] Component memory utilization (% of limit)"
  type: query alert
  # Uses kubernetes.memory.working_set (not usage) — this is what the kernel uses for OOMKill decisions.
  query: "avg(last_10m):(avg:kubernetes.memory.working_set{kube_namespace IN (argocd,external-secrets)} by {kube_cluster_name,kube_namespace,pod_name,kube_container_name} / avg:kubernetes.memory.limits{kube_namespace IN (argocd,external-secrets)} by {kube_cluster_name,kube_namespace,pod_name,kube_container_name}) * 100 > 90"
  message: |-
    {{#is_alert}}
    🔴 [P1 CRITICAL] {{kube_container_name.name}} memory at {{value}}% of limit — OOMKill risk
    Pod: {{pod_name.name}} | Namespace: {{kube_namespace.name}} | Cluster: {{kube_cluster_name.name}}
    {{/is_alert}}
    {{#is_warning}}
    🟡 [P2 WARNING] {{kube_container_name.name}} memory above 80% of limit — {{value}}%
    Pod: {{pod_name.name}} | Namespace: {{kube_namespace.name}}
    {{/is_warning}}
    {{#is_recovery}}
    ✅ RECOVERED: {{kube_container_name.name}} memory is below threshold
    {{/is_recovery}}

    {{#is_alert}}
    Actions:
    1. kubectl top pods -n {{kube_namespace.name}}
    2. kubectl logs {{pod_name.name}} -n {{kube_namespace.name}} --tail=200
    3. Check for memory leak pattern
    4. Increase memory limits in Helm values
    {{/is_alert}}

    @moran.weissman@msd.com
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-host"
  priority: 2
  options:
    thresholds:
      critical: "90"
      warning: "80"
    notifyAudit: false
    onMissingData: default
    includeTags: true
    newGroupDelay: 60
