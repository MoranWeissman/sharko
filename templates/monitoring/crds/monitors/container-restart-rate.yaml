apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: host-cluster-container-restart-rate
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Host Cluster] Container restart rate (CrashLoop signal)"
  type: query alert
  query: "avg(last_15m):avg:kubernetes_state.container.restarts{kube_namespace IN (argocd,external-secrets,kube-system)} by {kube_cluster_name,kube_namespace,pod_name,kube_container_name} > 5"
  message: |-
    {{#is_alert}}
    🔴 [P1 CRITICAL] {{kube_container_name.name}} in {{pod_name.name}} is crash-looping
    Restarts (15m): {{value}} | Namespace: {{kube_namespace.name}} | Cluster: {{kube_cluster_name.name}}
    {{/is_alert}}
    {{#is_warning}}
    🟡 [P2 WARNING] {{kube_container_name.name}} in {{pod_name.name}} is restarting frequently
    Restarts (15m): {{value}} | Namespace: {{kube_namespace.name}}
    {{/is_warning}}
    {{#is_recovery}}
    ✅ RECOVERED: {{kube_container_name.name}} in {{pod_name.name}} is stable
    {{/is_recovery}}

    {{#is_alert}}
    Actions:
    1. kubectl describe pod {{pod_name.name}} -n {{kube_namespace.name}}
    2. kubectl logs {{pod_name.name}} -n {{kube_namespace.name}} --previous
    3. Check for OOMKill in pod events
    {{/is_alert}}

    @moran.weissman@msd.com
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-host"
  priority: 2
  options:
    thresholds:
      critical: "5"
      warning: "3"
    notifyAudit: false
    onMissingData: default
    includeTags: true
    newGroupDelay: 60
