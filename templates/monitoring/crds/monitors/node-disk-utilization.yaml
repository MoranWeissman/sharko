apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: host-cluster-node-disk-utilization
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Host Cluster] Node disk utilization"
  type: query alert
  # Excludes virtual/ephemeral filesystems and Bottlerocket's immutable OS partition (/dev/root).
  # Scoped to your-argocd-cluster-* to cover dev + prod without hardcoding.
  query: "avg(last_5m):avg:system.disk.in_use{kube_cluster_name:your-argocd-cluster-*,!fstype:tmpfs,!fstype:overlay,!fstype:squashfs,!fstype:devtmpfs,!device:/dev/root} by {kube_cluster_name,host,device} > 0.85"
  message: |-
    {{#is_alert}}
    🔴 [P1 CRITICAL] Disk {{device.name}} on {{host.name}} is above 85% — {{value}}
    {{/is_alert}}
    {{#is_warning}}
    🟡 [P2 WARNING] Disk {{device.name}} on {{host.name}} is above 75% — {{value}}
    {{/is_warning}}
    {{#is_recovery}}
    ✅ RECOVERED: Disk {{device.name}} on {{host.name}} is below threshold
    {{/is_recovery}}

    Node: {{host.name}} | Cluster: {{kube_cluster_name.name}}

    {{#is_alert}}
    Actions:
    1. df -h  (on the node)
    2. du -sh /var/log/containers/*
    3. crictl rmi --prune
    4. Consider increasing EBS volume in Karpenter NodeClass blockDeviceMappings
    {{/is_alert}}

    @team@example.com
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-host"
  priority: 2
  options:
    thresholds:
      critical: "0.85"
      warning: "0.75"
    notifyAudit: false
    onMissingData: default
    includeTags: true
    newGroupDelay: 60
