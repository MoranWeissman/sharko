apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: host-cluster-node-memory-utilization
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Host Cluster] Node memory utilization"
  type: query alert
  # system.mem.pct_usable is AVAILABLE memory (0-1). Thresholds are inverted:
  # alert when pct_usable < 0.10 (i.e. >90% used), warn when < 0.20 (>80% used).
  query: "avg(last_5m):avg:system.mem.pct_usable{kube_cluster_name:your-argocd-cluster-*} by {kube_cluster_name,host} < 0.10"
  message: |-
    {{#is_alert}}
    🔴 [P1 CRITICAL] Node {{host.name}} memory above 90% on {{kube_cluster_name.name}}
    Memory pressure is high. OOMKill and pod evictions may occur.
    Available (pct_usable): {{value}}
    {{/is_alert}}
    {{#is_warning}}
    🟡 [P2 WARNING] Node {{host.name}} memory above 80% on {{kube_cluster_name.name}}
    Available (pct_usable): {{value}}
    {{/is_warning}}
    {{#is_recovery}}
    ✅ RECOVERED: Node {{host.name}} memory is below threshold
    {{/is_recovery}}

    {{#is_alert}}
    Actions:
    1. kubectl top pods -n argocd --sort-by=memory
    2. kubectl top pods -n external-secrets --sort-by=memory
    3. Check for memory leaks in component logs
    {{/is_alert}}

    @team@example.com
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-host"
  priority: 2
  options:
    thresholds:
      critical: "0.1"
      warning: "0.2"
    notifyAudit: false
    onMissingData: default
    includeTags: true
    newGroupDelay: 60
