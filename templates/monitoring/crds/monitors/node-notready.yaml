apiVersion: datadoghq.com/v1alpha1
kind: DatadogMonitor
metadata:
  name: host-cluster-node-notready
  namespace: datadog
  labels:
    app.kubernetes.io/part-of: argocd-cluster-addons
    app.kubernetes.io/component: monitoring
spec:
  name: "[ArgoCD Cluster Addons Host Cluster] Node NotReady"
  type: query alert
  query: "max(last_5m):max:kubernetes_state.node.status{condition:ready,status:false} by {kube_cluster_name,host} >= 1"
  message: |-
    {{#is_alert}}
    🔴 [P1 CRITICAL] Node {{host.name}} is NotReady on {{kube_cluster_name.name}}

    The node is not accepting new workloads. Pods may be evicted.

    Actions:
    1. kubectl get node {{host.name}}
    2. kubectl describe node {{host.name}}
    3. Check EC2 instance health in AWS console
    4. kubectl get pods --all-namespaces --field-selector=spec.nodeName={{host.name}}
    {{/is_alert}}
    {{#is_recovery}}
    ✅ RECOVERED: Node {{host.name}} is Ready again on {{kube_cluster_name.name}}
    {{/is_recovery}}

    @moran.weissman@msd.com
  tags:
    - "platform:devex"
    - "kubernetes"
    - "service:argocd-cluster-addons"
    - "component:argocd-cluster-addons-host"
  priority: 1
  options:
    thresholds:
      critical: "1"
    notifyAudit: false
    onMissingData: default
    includeTags: true
    newGroupDelay: 60
